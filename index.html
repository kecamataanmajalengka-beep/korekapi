<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:#0f1923;color:#e8ecf1;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#182538}::-webkit-scrollbar-thumb{background:#2a3f5f;border-radius:3px}
.login-bg{background:linear-gradient(135deg,#0f1923 0%,#1a2744 40%,#182538 100%);position:relative;overflow:hidden}
.login-bg::before{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(201,168,76,0.08) 0%,transparent 70%);top:-100px;right:-100px;border-radius:50%;animation:floatBlob 8s ease-in-out infinite}
.login-bg::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(6,182,212,0.06) 0%,transparent 70%);bottom:-50px;left:-50px;border-radius:50%;animation:floatBlob 10s ease-in-out infinite reverse}
@keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.1)}}
.glass{background:rgba(24,37,56,0.8);backdrop-filter:blur(20px);border:1px solid rgba(42,63,95,0.5)}
.sidebar{width:260px;min-height:100vh;background:linear-gradient(180deg,#1a2744 0%,#0f1923 100%);border-right:1px solid #2a3f5f;position:fixed;left:0;top:0;z-index:40;transition:transform .3s ease}
.main-content{margin-left:260px;transition:margin-left .3s ease}
.nav-item{padding:10px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:12px;font-size:14px;color:#7a8ba5;user-select:none}
.nav-item:hover{background:rgba(42,63,95,0.3);color:#e8ecf1}
.nav-item.active{background:rgba(201,168,76,0.1);border-left-color:#c9a84c;color:#c9a84c}
.btn-primary{background:linear-gradient(135deg,#c9a84c,#b8943f);color:#1a2744;font-weight:700;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:14px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(201,168,76,0.3)}
.btn-secondary{background:transparent;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 24px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:14px}
.btn-secondary:hover{border-color:#c9a84c;color:#c9a84c}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:white;font-weight:600;padding:8px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px}
.btn-danger:hover{box-shadow:0 4px 12px rgba(239,68,68,0.3)}
.input-field{background:#0f1923;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 14px;border-radius:8px;width:100%;font-size:14px;transition:border-color .2s}
.input-field:focus{outline:none;border-color:#c9a84c;box-shadow:0 0 0 2px rgba(201,168,76,0.15)}
.input-field::placeholder{color:#4a6080}
textarea.input-field{resize:vertical;min-height:80px;line-height:1.6}
.card{background:#182538;border:1px solid #2a3f5f;border-radius:12px;padding:24px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-success{background:rgba(34,197,94,0.15);color:#22c55e}
.badge-warning{background:rgba(245,158,11,0.15);color:#f59e0b}
.badge-info{background:rgba(6,182,212,0.15);color:#06b6d4}
.badge-danger{background:rgba(239,68,68,0.15);color:#ef4444}
.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:600;animation:slideIn .3s ease;max-width:400px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.toast-success{background:linear-gradient(135deg,#166534,#15803d);color:white;border:1px solid #22c55e}
.toast-error{background:linear-gradient(135deg,#7f1d1d,#991b1b);color:white;border:1px solid #ef4444}
.toast-info{background:linear-gradient(135deg,#164e63,#155e75);color:white;border:1px solid #06b6d4}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease}
.question-item{background:#0f1923;border:1px solid #2a3f5f;border-radius:8px;padding:16px;margin-bottom:12px}
.table-container{overflow-x:auto;border-radius:10px;border:1px solid #2a3f5f}
.table-container table{width:100%;border-collapse:collapse;font-size:13px}
.table-container th{background:#1a2744;color:#c9a84c;padding:12px 14px;text-align:left;font-weight:700;border-bottom:2px solid #2a3f5f}
.table-container td{padding:10px 14px;border-bottom:1px solid rgba(42,63,95,0.5);vertical-align:top}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-content{background:#182538;border:1px solid #2a3f5f;border-radius:16px;padding:32px;max-width:600px;width:100%;animation:fadeIn .3s ease;max-height:90vh;overflow-y:auto}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:35;display:none}.sidebar-overlay.active{display:block}
@media(max-width:1023px){.sidebar{transform:translateX(-260px)}.sidebar.mobile-open{transform:translateX(0)}.main-content{margin-left:0!important}}
.stat-card{background:linear-gradient(135deg,#182538,#1f3050);border:1px solid #2a3f5f;border-radius:12px;padding:20px;text-align:center}
.stat-card .stat-num{font-size:32px;font-weight:900;color:#c9a84c;font-family:'Playfair Display',serif}
.stat-card .stat-label{font-size:12px;color:#7a8ba5;margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;background:rgba(42,63,95,0.5);color:#7a8ba5}
.field-error{color:#ef4444;font-size:11px;margin-top:4px;display:none}.field-error.show{display:block}
.img-preview{max-width:100%;max-height:150px;border-radius:6px;margin-top:8px;border:1px solid #2a3f5f}
.img-preview-small{max-width:60px;max-height:60px;border-radius:4px;border:1px solid #2a3f5f}
.drop-zone{border:2px dashed #2a3f5f;border-radius:12px;padding:30px;text-align:center;transition:all .3s;cursor:pointer}
.drop-zone:hover{border-color:#c9a84c;background:rgba(201,168,76,0.05)}
.drop-zone.dragover{border-color:#c9a84c;background:rgba(201,168,76,0.1)}

<h1 class="font-display text-2xl font-bold text-kopAccent tracking-wide">KOREK API</h1>
<p class="text-muted text-sm mt-1">Sistem Asesmen Tengah Semester (Online)</p>

<div class="space-y-4">
<div>
<label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Pilih Mapel</label>
<select id="loginMapel" class="input-field"><option value="">-- Memuat Data --</option></select>

<label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Pilih Kelas</label>
<select id="loginKelas" class="input-field" disabled><option value="">-- Pilih Kelas --</option></select>
</div>
<div>
<label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Password</label>
<div class="relative">
<input type="password" id="loginPass" class="input-field pr-10" placeholder="Masukkan password" onkeydown="if(event.key==='Enter')doLogin()">
<button onclick="togglePassVis()" class="absolute right-3 top-1/2 -translate-y-1/2 text-muted hover:text-light transition-colors" type="button"><i id="passEye" class="fas fa-eye text-sm"></i></button>
</div>
<p id="loginError" class="field-error"></p>
</div>
<button onclick="doLogin()" class="btn-primary w-full text-center mt-2" type="button"><i class="fas fa-sign-in-alt mr-2"></i>Masuk</button>
</div>
</div>
</div>

<!-- MAIN APP -->
<div id="mainPage" class="hidden">
<aside id="sidebar" class="sidebar">
<div class="p-5 border-b border-border">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-gradient-to-br from-kopAccent to-yellow-600 flex items-center justify-center flex-shrink-0"><i class="fas fa-fire text-kop text-lg"></i></div>
<div><h2 class="font-display text-kopAccent font-bold text-sm leading-tight">KOREK API</h2><p class="text-muted text-xs">Online Mode</p></div>
</div>
</div>
<nav class="py-4" id="sidebarNav">

<div class="flex items-center gap-3 mb-3">
<div class="w-8 h-8 rounded-full bg-kopAccent/20 flex items-center justify-center"><i id="sidebarAvatar" class="fas fa-user text-kopAccent text-xs"></i></div>

<div id="mainArea" class="main-content min-h-screen">

<div class="flex items-center gap-3">
<button onclick="toggleSidebar()" class="text-muted hover:text-light transition-colors" type="button"><i class="fas fa-bars text-lg"></i></button>
<h2 id="pageTitle" class="font-display text-base md:text-lg font-bold text-light">Dashboard</h2>
</div>
<div class="flex items-center gap-3"><span id="topbarInfo" class="tag"></span><span class="w-2 h-2 rounded-full bg-success animate-pulse"></span></div>
</header>

</div>
</div>

<div id="printArea" style="display:none"></div>
<div id="modalOverlay" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
<div class="modal-content" id="modalBody"></div>
</div>

<script>
// ================================================================
// FIREBASE CONFIG & INIT
// ================================================================
const firebaseConfig = {
  apiKey: "AIzaSyC0Hs7SUgPAeQ_JaotHUJL5m6nIhCRif-8",
  authDomain: "pembuatan-soal.firebaseapp.com",
  projectId: "pembuatan-soal",
  storageBucket: "pembuatan-soal.firebasestorage.app",
  messagingSenderId: "56200686194",
  appId: "1:56200686194:web:eb2de00c9d152d87bcf0eb",
  measurementId: "G-5V2CLKCE5J"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

const MAPEL_LIST=[
    {id:'ppkn',nama:'Pendidikan Pancasila',singkat:'PPKn'},
    {id:'mat',nama:'Matematika',singkat:'Mat'},
    {id:'bin',nama:'Bahasa Indonesia',singkat:'B.Indo'},
    {id:'sbd',nama:'Seni Budaya',singkat:'Seni'},
    {id:'ipas',nama:'IPAS',singkat:'IPAS'},
    {id:'bsd',nama:'Bahasa Sunda',singkat:'B.Sunda'},
    {id:'bing',nama:'Bahasa Inggris',singkat:'B.Inggris'},
    {id:'pai',nama:'PAI',singkat:'PAI'},
    {id:'pjok',nama:'PJOK',singkat:'PJOK'}
];
const KELAS_LIST=['Kelas 1','Kelas 2','Kelas 3','Kelas 4','Kelas 5','Kelas 6'];

function getMaxOpt(kelas){ const n=parseInt(kelas.replace('Kelas ',''))||0; return n<=2?3:4; }
function getOptLetters(kelas){ return ['A','B','C','D'].slice(0,getMaxOpt(kelas)); }
function getValidAnswers(kelas){ return getOptLetters(kelas); }
const COGNITIVE_LEVELS=['Mengingat (C1)','Memahami (C2)','Menerapkan (C3)','Menganalisis (C4)','Mengevaluasi (C5)','Mencipta (C6)'];

// STATE
let currentUser=null;
let questions=[]; 
let tujuanPembelajaran=[];
let accounts=[];
let currentEditId=null;
let currentEditTPId=null;
let unsubQ=null, unsubTP=null; 

// UTILS
function getMapelName(id){return MAPEL_LIST.find(m=>m.id===id)?.nama||id;}
function getMapelSingkat(id){return MAPEL_LIST.find(m=>m.id===id)?.singkat||id;}
function genId(){return db.collection('questions').doc().id;} 
function escHtml(s){if(!s)return '';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}
function shortCognitive(c){ if(!c)return '-'; const m={'Mengingat (C1)':'C1','Memahami (C2)':'C2','Menerapkan (C3)':'C3','Menganalisis (C4)':'C4','Mengevaluasi (C5)':'C5','Mencipta (C6)':'C6'}; return m[c]||c; }

function showToast(msg,type='success'){ const c=document.getElementById('toastContainer'); const t=document.createElement('div'); t.className=`toast toast-${type}`; t.innerHTML=`<i class="fas fa-${type==='success'?'check':type==='error'?'times':'info'}-circle flex-shrink-0"></i><span>${msg}</span>`; c.appendChild(t); setTimeout(()=>{t.style.animation='slideOut .3s ease forwards';setTimeout(()=>t.remove(),300);},3000); }
function closeModal(){document.getElementById('modalOverlay').classList.add('hidden');document.getElementById('modalBody').innerHTML='';}
function openModal(html){document.getElementById('modalOverlay').classList.remove('hidden');document.getElementById('modalBody').innerHTML=html;}
function togglePassVis(){const p=document.getElementById('loginPass');const e=document.getElementById('passEye');if(p.type==='password'){p.type='text';e.className='fas fa-eye-slash text-sm';}else{p.type='password';e.className='fas fa-eye text-sm';}}

// ================================================================
// FIREBASE LOGIC
// ================================================================

async function initApp(){
    const accSnap = await db.collection('accounts').limit(1).get();
    if(accSnap.empty){
        showToast('Inisialisasi akun awal...','info');
        const batch = db.batch();
        batch.set(db.collection('accounts').doc('admin'), {mapel:'admin', kelas:'Semua', password:'admin123'});
        MAPEL_LIST.forEach(m=>{ KELAS_LIST.forEach(k=>{ batch.set(db.collection('accounts').doc(`${m.id}_${k.replace(' ','')}`), {mapel:m.id, kelas:k, password:'guru123'}); }); });
        await batch.commit();
    }
    db.collection('accounts').onSnapshot(snap => { accounts = snap.docs.map(d => ({id:d.id, ...d.data()})); populateLoginDropdown(); });
}

function populateLoginDropdown(){
    const sel=document.getElementById('loginMapel');
    sel.innerHTML='<option value="">-- Pilih Mata Pelajaran --</option>';
    sel.innerHTML+='<option value="admin">Admin (Semua Akses)</option>';
    MAPEL_LIST.forEach(m=>{sel.innerHTML+=`<option value="${m.id}">${m.nama}</option>`;});
    sel.onchange=function(){
        const ks=document.getElementById('loginKelas');
        document.getElementById('loginError').classList.remove('show');
        if(this.value==='admin'){ks.innerHTML='<option value="Semua">Semua Kelas</option>';ks.disabled=false;}
        else if(this.value){ks.disabled=false;ks.innerHTML='<option value="">-- Pilih Kelas --</option>';KELAS_LIST.forEach(k=>{ks.innerHTML+=`<option value="${k}">${k}</option>`;});}
        else{ks.innerHTML='<option value="">-- Pilih Kelas --</option>';ks.disabled=true;}
    };
    sel.disabled = false;
}

function doLogin(){
    const mapel=document.getElementById('loginMapel').value; const kelas=document.getElementById('loginKelas').value; const pass=document.getElementById('loginPass').value; const errEl=document.getElementById('loginError');
    if(!mapel){errEl.textContent='Pilih mata pelajaran';errEl.classList.add('show');return;} if(!kelas){errEl.textContent='Pilih kelas';errEl.classList.add('show');return;} if(!pass){errEl.textContent='Masukkan password';errEl.classList.add('show');return;}
    const acc = accounts.find(a => a.mapel === mapel && a.kelas === kelas && a.password === pass);
    if(!acc){errEl.textContent='Password salah';errEl.classList.add('show');return;}
    currentUser={mapel:acc.mapel,kelas:acc.kelas,isAdmin:acc.mapel==='admin'};
    document.getElementById('loginPage').classList.add('hidden'); document.getElementById('mainPage').classList.remove('hidden');
    initMainPage();
    showToast('Selamat datatang, '+(currentUser.isAdmin?'Administrator':getMapelName(currentUser.mapel)));
}

function doLogout(){ currentUser=null; currentEditId=null; if(unsubQ) unsubQ(); if(unsubTP) unsubTP(); document.getElementById('mainPage').classList.add('hidden'); document.getElementById('loginPage').classList.remove('hidden'); document.getElementById('loginPass').value=''; closeSidebar(); }

function initMainPage(){
    const un=currentUser.isAdmin?'Administrator':getMapelName(currentUser.mapel);
    document.getElementById('sidebarUser').textContent=un; document.getElementById('sidebarRole').textContent=currentUser.isAdmin?'Akses Semua':currentUser.kelas;
    document.getElementById('topbarInfo').innerHTML=currentUser.isAdmin?'<i class="fas fa-crown mr-1" style="color:#c9a84c"></i>Admin':`<i class="fas fa-graduation-cap mr-1"></i>${getMapelSingkat(currentUser.mapel)} - ${currentUser.kelas}`;
    document.querySelector('.nav-item[data-page="manage"]').style.display=currentUser.isAdmin?'flex':'none';
    
    let qRef = db.collection('questions');
    if(!currentUser.isAdmin) qRef = qRef.where('mapel','==',currentUser.mapel).where('kelas','==',currentUser.kelas);
    unsubQ = qRef.onSnapshot(snap => { questions = snap.docs.map(d => ({id:d.id, ...d.data()})); navigateTo('dashboard'); });

    let tpRef = db.collection('tps');
    if(!currentUser.isAdmin) tpRef = tpRef.where('mapel','==',currentUser.mapel).where('kelas','==',currentUser.kelas);
    unsubTP = tpRef.onSnapshot(snap => { tujuanPembelajaran = snap.docs.map(d => ({id:d.id, ...d.data()})); });
}

// ================================================================
// NAVIGASI
// ================================================================
function navigateTo(page){
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    const t=document.querySelector(`.nav-item[data-page="${page}"]`); if(t)t.classList.add('active');
    const titles={dashboard:'Dashboard', tp:'Data TP', create:'Buat Soal', import:'Import JSON', questions:'Bank Soal', print:'Cetak Soal', kisi:'Kisi-Kisi', scoring:'Kunci & Skor', manage:'Kelola Akun'};
    document.getElementById('pageTitle').textContent=titles[page]||page; closeSidebar();
    const c=document.getElementById('pageContent');
    switch(page){
        case 'dashboard':renderDashboard(c);break; case 'tp':renderTP(c);break; case 'create':renderCreate(c);break; case 'import':renderImport(c);break;
        case 'questions':renderQuestions(c);break; case 'print':renderPrint(c);break; case 'kisi':renderKisi(c);break; case 'scoring':renderScoring(c);break; case 'manage':renderManage(c);break;
    }
}
document.getElementById('sidebarNav').addEventListener('click',e=>{const item=e.target.closest('.nav-item');if(item)navigateTo(item.dataset.page);});
function toggleSidebar(){const sb=document.getElementById('sidebar');const ov=document.getElementById('sidebarOverlay');sb.classList.toggle('mobile-open');ov.classList.toggle('active',sb.classList.contains('mobile-open'));}

    </div>`;
}

// ================================================================
// TP MANAGEMENT
// ================================================================
function renderTP(c){
    currentEditTPId=null;
    c.innerHTML=`<div class="fade-in"><div class="card mb-6">
        <h3 class="font-display text-lg font-bold text-light mb-4"><i class="fas fa-bullseye text-kopAccent mr-2"></i>Data Tujuan Pembelajaran</h3>
        <div class="grid md:grid-cols-2 gap-4 mb-4">
            <div><label>Mapel</label><select id="tpMapel" class="input-field">${makeMapelOpt(currentUser.mapel)}</select></div>
            <div><label>Kelas</label><select id="tpKelas" class="input-field">${makeKelasOpt(currentUser.kelas)}</select></div>
        </div>
        <div class="mb-4"><label>Teks TP</label><textarea id="tpText" class="input-field" rows="2"></textarea></div>
        <button onclick="saveTP()" class="btn-primary"><i class="fas fa-save mr-1"></i>Simpan TP</button>
    </div>
    <div class="card"><h3 class="font-display text-lg font-bold text-light mb-4">Daftar TP (${tujuanPembelajaran.length})</h3><div id="tpList"></div></div></div>`;
    renderTPList();
}
function renderTPList(){
    const el=document.getElementById('tpList'); if(!el) return;
    if(tujuanPembelajaran.length===0) el.innerHTML='<p class="text-muted text-center py-4">Belum ada data</p>';
    else el.innerHTML=`<div class="space-y-2">${tujuanPembelajaran.map(t=>`<div class="flex justify-between items-center p-2 bg-dark/30 rounded"><div><span class="tag">${getMapelSingkat(t.mapel)}</span> <span class="text-sm ml-2">${escHtml(t.text)}</span></div><div class="flex gap-1"><button onclick="editTP('${t.id}')" class="btn-secondary text-xs py-1 px-2"><i class="fas fa-pen"></i></button><button onclick="deleteTP('${t.id}')" class="btn-danger text-xs py-1 px-2"><i class="fas fa-trash"></i></button></div></div>`).join('')}</div>`;
}
async function saveTP(){
    const data = { mapel: document.getElementById('tpMapel').value, kelas: document.getElementById('tpKelas').value, text: document.getElementById('tpText').value.trim() };
    if(!data.text){showToast('Teks kosong','error'); return;}
    try { if(currentEditTPId) await db.collection('tps').doc(currentEditTPId).update(data); else await db.collection('tps').add(data); showToast('TP disimpan'); document.getElementById('tpText').value=''; currentEditTPId=null; } catch(e){ showToast('Gagal: '+e.message,'error'); }
}
function editTP(id){ const t=tujuanPembelajaran.find(x=>x.id===id); if(!t) return; currentEditTPId=id; document.getElementById('tpMapel').value=t.mapel; document.getElementById('tpKelas').value=t.kelas; document.getElementById('tpText').value=t.text; }
async function deleteTP(id){ if(!confirm('Hapus TP?')) return; try { await db.collection('tps').doc(id).delete(); showToast('Dihapus'); } catch(e){ showToast('Gagal','error'); } }

// ================================================================
// CREATE SOAL
// ================================================================
function renderCreate(c){
    currentEditId=null;
    c.innerHTML=`<div class="fade-in"><div class="card max-w-4xl mx-auto">
        <h3 class="font-display text-lg font-bold text-light mb-4">Input Soal Baru</h3>
        <div class="grid md:grid-cols-2 gap-4 mb-4">
            <div><label>Mapel</label><select id="cMapel" class="input-field" onchange="updateTPDropdown()">${makeMapelOpt(currentUser.mapel)}</select></div>
            <div><label>Kelas</label><select id="cKelas" class="input-field" onchange="onCreateKelasChange(); updateTPDropdown();">${makeKelasOpt(currentUser.kelas)}</select></div>
        </div>
        <div class="grid md:grid-cols-3 gap-4 mb-4">
            <div><label>Tipe</label><select id="cType" class="input-field" onchange="toggleOptions()"><option value="pg">Pilihan Ganda</option><option value="uraian">Uraian</option></select></div>
            <div><label>Difficulty</label><select id="cDiff" class="input-field"><option>Mudah</option><option selected>Sedang</option><option>Sulit</option></select></div>
            <div><label>Skor</label><input type="number" id="cScore" class="input-field" value="1"></div>
        </div>
        <div class="mb-4"><label>TP</label><select id="cTPSelect" class="input-field mb-2"><option value="">-- Pilih TP --</option></select><textarea id="cTPManual" class="input-field" rows="2" placeholder="Atau tulis manual..."></textarea></div>
        <div class="mb-4"><label>Teks Soal</label><textarea id="cText" class="input-field" rows="3"></textarea>
            <input type="file" id="cImgQ" accept="image/*" class="hidden" onchange="handleQImage(this)">
            <button onclick="document.getElementById('cImgQ').click()" class="btn-secondary text-xs mt-2"><i class="fas fa-image mr-1"></i>Upload Gambar Soal</button>
            <div id="cImgQPrev" class="mt-2"></div>
        </div>
        <div id="optionsArea" class="mb-4"></div>
        <div class="grid md:grid-cols-2 gap-4 mb-4">
            <div><label>Kunci</label><div class="flex gap-2"><select id="cAnswerSelect" class="input-field" style="width:80px"><option value="">--</option></select><input type="text" id="cAnswer" class="input-field" placeholder="Jawaban"></div></div>
        </div>
        <button onclick="saveSingleQuestion()" class="btn-primary w-full"><i class="fas fa-save mr-1"></i>Simpan ke Cloud</button>
    </div></div>`;
    onCreateKelasChange(); updateTPDropdown(); document.getElementById('cTPSelect').onchange=function(){document.getElementById('cTPManual').value=this.value;};
}
function updateTPDropdown(){ const mapel=document.getElementById('cMapel').value; const kelas=document.getElementById('cKelas').value; const relevantTPs=tujuanPembelajaran.filter(t=>t.mapel===mapel && t.kelas===kelas); const sel=document.getElementById('cTPSelect'); sel.innerHTML='<option value="">-- Pilih TP ('+relevantTPs.length+') --</option>'; relevantTPs.forEach(t=>{ sel.innerHTML+=`<option value="${escHtml(t.text)}">${escHtml(t.text.substring(0,50))}</option>`; }); }
function handleQImage(input){ const file = input.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = function(e){ document.getElementById('cImgQPrev').innerHTML = `<img src="${e.target.result}" class="img-preview"><span class="text-xs text-success ml-2">Siap diunggah</span>`; }; reader.readAsDataURL(file); }
function onCreateKelasChange(){ const kelas=document.getElementById('cKelas').value; const letters=getOptLetters(kelas); const area=document.getElementById('optionsArea'); area.innerHTML=`<label>Pilihan Jawaban</label><div class="space-y-3">${letters.map(l=>`<div class="flex gap-2 items-center"><span class="font-bold text-kopAccent">${l}.</span><input type="text" id="cOpt${l}" class="input-field flex-1"><input type="file" id="cOptImg${l}" accept="image/*" class="hidden" onchange="handleOptImg(this, '${l}')"><button onclick="document.getElementById('cOptImg${l}').click()" class="btn-secondary text-xs py-1"><i class="fas fa-image"></i></button></div><div id="cOptImgPrev${l}" class="ml-6 mb-2"></div>`).join('')}</div>`; const sel=document.getElementById('cAnswerSelect'); sel.innerHTML='<option value="">--</option>'+letters.map(l=>`<option value="${l}">${l}</option>`).join(''); sel.onchange=function(){document.getElementById('cAnswer').value=this.value;}; }
function handleOptImg(input, letter){ const file = input.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = function(e){ document.getElementById('cOptImgPrev'+letter).innerHTML = `<img src="${e.target.result}" class="img-preview-small">`; }; reader.readAsDataURL(file); }

async function saveSingleQuestion(){
    const btn = document.querySelector('button[onclick="saveSingleQuestion()"]'); btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>Menyimpan...';
    const mapel=document.getElementById('cMapel').value; const kelas=document.getElementById('cKelas').value; const type=document.getElementById('cType').value; const text=document.getElementById('cText').value.trim(); const tp=document.getElementById('cTPManual').value || document.getElementById('cTPSelect').value;
    if(!text){ showToast('Soal kosong','error'); btn.disabled=false; btn.innerHTML='Simpan ke Cloud'; return; }
    try {
        let qData = { mapel, kelas, type, text, tp, difficulty: document.getElementById('cDiff').value, score: parseInt(document.getElementById('cScore').value)||1, cognitive: 'C2', answer: document.getElementById('cAnswer').value.trim(), options: [], optionImages: [], image: '', createdAt: firebase.firestore.FieldValue.serverTimestamp() };
        const qImgFile = document.getElementById('cImgQ').files[0];
        if(qImgFile){ const ref = storage.ref(`soal/${Date.now()}_${qImgFile.name}`); await ref.put(qImgFile); qData.image = await ref.getDownloadURL(); }
        if(type==='pg'){ const letters=getOptLetters(kelas); for(let l of letters){ qData.options.push(document.getElementById('cOpt'+l).value.trim()); const optFile = document.getElementById('cOptImg'+l).files[0]; if(optFile){ const ref = storage.ref(`soal/${Date.now()}_${l}_${optFile.name}`); await ref.put(optFile); qData.optionImages.push(await ref.getDownloadURL()); } else { qData.optionImages.push(''); } } }
        if(currentEditId){ await db.collection('questions').doc(currentEditId).update(qData); } else { await db.collection('questions').add(qData); }
        showToast('Soal disimpan!'); resetCreateForm(); navigateTo('questions');
    } catch(e) { console.error(e); showToast('Error: '+e.message, 'error'); }
    btn.disabled=false; btn.innerHTML='<i class="fas fa-save mr-1"></i>Simpan ke Cloud';
}
function resetCreateForm(){ document.getElementById('cText').value=''; document.getElementById('cImgQPrev').innerHTML=''; document.getElementById('cTPManual').value=''; const kelas=document.getElementById('cKelas').value; getOptLetters(kelas).forEach(l=>{ if(document.getElementById('cOpt'+l)) document.getElementById('cOpt'+l).value=''; if(document.getElementById('cOptImgPrev'+l)) document.getElementById('cOptImgPrev'+l).innerHTML=''; }); currentEditId=null; }

// ================================================================
// IMPORT JSON (BATCH UPLOAD)
// ================================================================
function renderImport(c){
    c.innerHTML=`<div class="fade-in">
    <div class="card max-w-3xl mx-auto">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 rounded-lg bg-info/20 flex items-center justify-center"><i class="fas fa-cloud-upload-alt text-info text-xl"></i></div>
            <div><h3 class="font-display text-lg font-bold text-light">Import JSON ke Cloud</h3><p class="text-xs text-muted">Upload banyak soal sekaligus ke Firebase</p></div>
        </div>
        
        <div class="mb-4">
            <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Pilih File JSON</label>
            <input type="file" id="importJsonFile" accept=".json" class="hidden" onchange="handleImportFile(this)">
            <div class="drop-zone" onclick="document.getElementById('importJsonFile').click()" id="dropZone">
                <i class="fas fa-file-code text-4xl text-kopAccent mb-3"></i>
                <p class="font-semibold text-light">Klik atau Drag & Drop File JSON</p>
                <p class="text-xs text-muted mt-1">Format: Array of Objects</p>
            </div>
        </div>

        <div class="mb-4">
            <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Target Mapel & Kelas (Jika tidak ada di JSON)</label>
            <div class="grid grid-cols-2 gap-4">
                <select id="impMapel" class="input-field">${makeMapelOpt(currentUser.mapel)}</select>
                <select id="impKelas" class="input-field">${makeKelasOpt(currentUser.kelas)}</select>
            </div>
        </div>

        <div id="importPreview" class="hidden">
            <h4 class="font-bold text-sm mb-2">Preview Data (<span id="impCount">0</span> soal):</h4>
            <div class="bg-dark/30 p-4 rounded-lg max-h-48 overflow-auto text-xs font-mono" id="impPreviewBody"></div>
            <div class="flex gap-3 mt-4">
                <button onclick="executeImport()" class="btn-primary flex-1"><i class="fas fa-upload mr-1"></i>Upload ke Cloud</button>
                <button onclick="cancelImport()" class="btn-secondary">Batal</button>
            </div>
        </div>
    </div>

    <div class="card max-w-3xl mx-auto mt-6">
        <h4 class="font-bold text-sm mb-2 text-kopAccent">Format JSON yang didukung:</h4>
        <pre class="text-xs bg-dark/50 p-4 rounded overflow-auto">[
  {
    "text": "Teks soal di sini...",
    "type": "pg", 
    "options": ["Opsi A", "Opsi B", "Opsi C"],
    "answer": "A",
    "tp": "TP opsional",
    "score": 1
  }
]</pre>
    </div>
    </div>`;

    // Drag & Drop Logic
    const dz = document.getElementById('dropZone');
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dz.addEventListener(eventName, preventDefaults, false);
    });
    function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }
    ['dragenter', 'dragover'].forEach(eventName => { dz.addEventListener(eventName, () => dz.classList.add('dragover'), false); });
    ['dragleave', 'drop'].forEach(eventName => { dz.addEventListener(eventName, () => dz.classList.remove('dragover'), false); });
    dz.addEventListener('drop', (e) => {
        const dt = e.dataTransfer; const files = dt.files;
        if(files.length) { document.getElementById('importJsonFile').files = files; handleImportFile(document.getElementById('importJsonFile')); }
    }, false);
}

let importData = [];
function handleImportFile(input){
    const file = input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e){
        try {
            const data = JSON.parse(e.target.result);
            const arr = Array.isArray(data) ? data : (data.soal || data.questions || []);
            if(arr.length === 0) throw new Error("Tidak ada data soal ditemukan");
            
            importData = arr;
            document.getElementById('impCount').textContent = arr.length;
            document.getElementById('impPreviewBody').textContent = JSON.stringify(arr.slice(0, 5), null, 2) + (arr.length > 5 ? '\n...(dan seterusnya)' : '');
            document.getElementById('importPreview').classList.remove('hidden');
            showToast(`File valid: ${arr.length} soal terdeteksi`);
        } catch(err) {
            showToast('Error parsing JSON: ' + err.message, 'error');
        }
    };
    reader.readAsText(file);
}

async function executeImport(){
    if(importData.length === 0) return;
    const btn = document.querySelector('button[onclick="executeImport()"]');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>Mengupload...';
    
    const defaultMapel = document.getElementById('impMapel').value;
    const defaultKelas = document.getElementById('impKelas').value;
    
    try {
        const batch = db.batch();
        let count = 0;
        
        importData.forEach(q => {
            const ref = db.collection('questions').doc(); // Auto ID
            const data = {
                text: q.text || q.soal || '',
                type: q.type || (q.options && q.options.length ? 'pg' : 'uraian'),
                options: q.options || [],
                answer: q.answer || q.jawaban || '',
                mapel: q.mapel || defaultMapel,
                kelas: q.kelas || defaultKelas,
                tp: q.tp || q.kd || '',
                score: q.score || 1,
                difficulty: q.difficulty || 'Sedang',
                cognitive: 'Memahami (C2)',
                image: '',
                optionImages: [],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            if(data.text) { // Only add if text exists
                batch.set(ref, data);
                count++;
            }
        });

        await batch.commit();
        showToast(`${count} soal berhasil diimport!`, 'success');
        cancelImport();
        navigateTo('questions');
    } catch(e) {
        console.error(e);
        showToast('Import gagal: ' + e.message, 'error');
    }
    
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-upload mr-1"></i>Upload ke Cloud';
}

function cancelImport(){
    importData = [];
    document.getElementById('importPreview').classList.add('hidden');
    document.getElementById('importJsonFile').value = '';
}

// ================================================================
// BANK SOAL
// ================================================================
function renderQuestions(c){ c.innerHTML=`<div class="fade-in"><div class="card"><h3 class="font-display text-lg font-bold text-light mb-4">Bank Soal (${questions.length})</h3><div id="qList"></div></div></div>`; renderQList(); }
function renderQList(){
    const el=document.getElementById('qList'); if(!el) return;
    if(questions.length===0) el.innerHTML='<p class="text-muted text-center py-8">Tidak ada soal. Buat baru atau Import.</p>';
    else el.innerHTML=`<div class="space-y-2">${questions.map(q=>`<div class="p-3 bg-dark/30 rounded flex justify-between items-center"><div class="flex-1"><p class="text-sm"><span class="text-info font-bold">${q.type.toUpperCase()}</span> - ${escHtml(q.text.substring(0,50))}...</p>${q.image ? `<img src="${q.image}" class="img-preview-small mt-1">` : ''}</div><div class="flex gap-2"><button onclick="editQuestion('${q.id}')" class="btn-secondary text-xs py-1"><i class="fas fa-pen"></i></button><button onclick="deleteQuestion('${q.id}')" class="btn-danger text-xs py-1"><i class="fas fa-trash"></i></button></div></div>`).join('')}</div>`;
}
function editQuestion(id){ const q=questions.find(x=>x.id===id); if(!q) return; currentEditId=id; navigateTo('create'); setTimeout(()=>{ document.getElementById('cMapel').value=q.mapel; document.getElementById('cKelas').value=q.kelas; onCreateKelasChange(); setTimeout(()=>{ document.getElementById('cText').value=q.text; if(q.image) document.getElementById('cImgQPrev').innerHTML=`<img src="${q.image}" class="img-preview-small">`; document.getElementById('cAnswer').value=q.answer; document.getElementById('cDiff').value=q.difficulty; document.getElementById('cScore').value=q.score; document.getElementById('cTPManual').value=q.tp||''; if(q.options){ getOptLetters(q.kelas).forEach((l,i)=>{ if(document.getElementById('cOpt'+l)) document.getElementById('cOpt'+l).value=q.options[i]||''; if(q.optionImages && q.optionImages[i]) document.getElementById('cOptImgPrev'+l).innerHTML=`<img src="${q.optionImages[i]}" class="img-preview-small">`; }); } }, 100); }, 100); }
async function deleteQuestion(id){ if(!confirm('Hapus soal?')) return; try { await db.collection('questions').doc(id).delete(); showToast('Dihapus'); } catch(e){ showToast('Gagal','error'); } }

// ================================================================
// CETAK & HELPERS
// ================================================================
function makeMapelOpt(sel){return currentUser.isAdmin?MAPEL_LIST.map(m=>`<option value="${m.id}"${m.id===sel?' selected':''}>${m.nama}</option>`).join(''):`<option value="${currentUser.mapel}" selected>${getMapelName(currentUser.mapel)}</option>`;}
function makeKelasOpt(sel){return currentUser.isAdmin?KELAS_LIST.map(k=>`<option value="${k}"${k===sel?' selected':''}>${k}</option>`).join(''):`<option value="${currentUser.kelas}" selected>${currentUser.kelas}</option>`;}
function renderPrint(c){ c.innerHTML=`<div class="card"><h3 class="text-kopAccent font-bold mb-2">Cetak Soal</h3><p class="text-muted text-sm">Gunakan fitur ini untuk mencetak soal yang ada di memori lokal (browser). Pastikan data sudah dimuat dari cloud.</p><button onclick="window.print()" class="btn-primary mt-4"><i class="fas fa-print mr-1"></i>Print Halaman</button></div>`; }
function renderKisi(c){ c.innerHTML=`<div class="card"><h3 class="text-kopAccent font-bold mb-2">Kisi-Kisi</h3><p class="text-muted text-sm">Total ${questions.length} soal dimuat.</p></div>`; }
function renderScoring(c){ c.innerHTML=`<div class="card"><h3 class="text-kopAccent font-bold mb-2">Kunci & Skor</h3></div>`; }
function renderManage(c){ if(!currentUser.isAdmin) return; c.innerHTML=`<div class="card"><h3 class="font-display text-lg font-bold text-light mb-4">Manajemen Akun (Firebase)</h3><p class="text-xs text-muted">Data akun disimpan di Firestore collection 'accounts'.</p></div>`; }

// Start
window.onload = initApp;

</script>
