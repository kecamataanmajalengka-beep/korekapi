<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT Generator Online - Kecamatan Majalengka (Clean Print)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
tailwind.config={theme:{extend:{colors:{kop:'#1a2744',kopAccent:'#c9a84c',dark:'#0f1923',card:'#182538',cardHover:'#1f3350',border:'#2a3f5f',muted:'#7a8ba5',light:'#e8ecf1',success:'#22c55e',danger:'#ef4444',warning:'#f59e0b',info:'#06b6d4'},fontFamily:{display:['Playfair Display','serif'],body:['Source Sans 3','sans-serif']}}}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:#0f1923;color:#e8ecf1;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#182538}::-webkit-scrollbar-thumb{background:#2a3f5f;border-radius:3px}

.login-bg{background:linear-gradient(135deg,#0f1923 0%,#1a2744 40%,#182538 100%);position:relative;overflow:hidden;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-bg::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(201,168,76,0.07) 0%,transparent 70%);top:-150px;right:-150px;border-radius:50%;animation:floatBlob 8s ease-in-out infinite}
.login-bg::after{content:'';position:absolute;width:450px;height:450px;background:radial-gradient(circle,rgba(6,182,212,0.05) 0%,transparent 70%);bottom:-80px;left:-80px;border-radius:50%;animation:floatBlob 10s ease-in-out infinite reverse}
@keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.1)}}

.glass{background:rgba(24,37,56,0.85);backdrop-filter:blur(24px);border:1px solid rgba(42,63,95,0.5)}

.sidebar{width:260px;min-height:100vh;background:linear-gradient(180deg,#1a2744 0%,#0f1923 100%);border-right:1px solid #2a3f5f;position:fixed;left:0;top:0;z-index:40;transition:transform .3s ease}
.main-content{margin-left:260px;transition:margin-left .3s ease}
.nav-item{padding:11px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:12px;font-size:14px;color:#7a8ba5;user-select:none}
.nav-item:hover{background:rgba(42,63,95,0.3);color:#e8ecf1}
.nav-item.active{background:rgba(201,168,76,0.08);border-left-color:#c9a84c;color:#c9a84c;font-weight:600}
.nav-item.paj-item { border-left-color: #ef4444; color: #ef4444; font-weight: 600; }

.btn-primary{background:linear-gradient(135deg,#c9a84c,#b8943f);color:#1a2744;font-weight:700;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:14px;font-family:'Source Sans 3',sans-serif;display:inline-flex;align-items:center;justify-content:center}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(201,168,76,0.3)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:transparent;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 24px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:14px;font-family:'Source Sans 3',sans-serif;display:inline-flex;align-items:center;justify-content:center}
.btn-secondary:hover{border-color:#c9a84c;color:#c9a84c}
.btn-danger{background:transparent;border:1px solid #ef4444;color:#ef4444;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:13px;font-family:'Source Sans 3',sans-serif}
.btn-danger:hover{background:#ef4444;color:white}

.input-field{background:#0f1923;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 14px;border-radius:8px;width:100%;font-size:14px;transition:border-color .2s;font-family:'Source Sans 3',sans-serif}
.input-field:focus{outline:none;border-color:#c9a84c;box-shadow:0 0 0 2px rgba(201,168,76,0.15)}
.input-field:disabled{opacity:0.5;cursor:not-allowed}
.input-field option{background:#182538;color:#e8ecf1}
textarea.input-field{resize:vertical;min-height:40px}

.card{background:#182538;border:1px solid #2a3f5f;border-radius:12px;padding:24px}

.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:600;animation:slideIn .3s ease;max-width:420px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.toast-success{background:linear-gradient(135deg,#166534,#15803d);color:white;border:1px solid #22c55e}
.toast-error{background:linear-gradient(135deg,#7f1d1d,#991b1b);color:white;border:1px solid #ef4444}
.toast-info{background:linear-gradient(135deg,#164e63,#155e75);color:white;border:1px solid #06b6d4}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-content{background:#182538;border:1px solid #2a3f5f;border-radius:16px;padding:32px;max-width:600px;width:100%;animation:fadeIn .3s ease;max-height:90vh;overflow-y:auto}

.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:35;display:none}
.sidebar-overlay.active{display:block}
@media(max-width:1023px){.sidebar{transform:translateX(-260px)}.sidebar.mobile-open{transform:translateX(0)}.main-content{margin-left:0!important}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease forwards}

.img-preview{max-width:100%;max-height:180px;object-fit:contain;border-radius:6px;margin-top:8px;border:1px solid #2a3f5f;background:#0f1923}
.loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:#c9a84c;animation:spin 1s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}

    /* ==========================================
       CETAK / PRINT STYLES (NO INDICATOR)
       ========================================== */
    @media print {
        @page { size: A4 portrait; margin: 1.5cm 2cm 2cm 2cm; }
        body { background: white !important; color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-family: 'Times New Roman', Times, serif !important; font-size: 12pt; line-height: 1.4; }
        #sidebar, #mainArea > header, #sidebarOverlay, .no-print, #toastContainer, #modalOverlay, #loginPage, .card { display: none !important; }
        #mainArea { margin: 0 !important; padding: 0 !important; width: 100% !important; height: auto !important; background: white !important; overflow: visible !important; }
        #pageContent { padding: 0 !important; margin: 0 !important; width: 100% !important; background: white !important; color: black !important; overflow: visible !important; }
        .print-page { width: 100%; padding: 0; background: white; color: black; }
        
        /* KOP SURAT RAPI */
        .kop-surat { text-align: center; padding-bottom: 12px; margin-bottom: 24px; border-bottom: 3px double #000; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .kop-surat-row { display: flex; align-items: center; justify-content: center; gap: 16px; width: 100%; }
        .kop-surat img { height: 75px; width: auto; object-fit: contain; }
        .kop-text { text-align: center; line-height: 1.3; flex: 1; }
        .kop-text h1 { font-family: 'Times New Roman', serif; font-size: 13pt; font-weight: bold; text-transform: uppercase; margin: 0; }
        .kop-text h2 { font-family: 'Times New Roman', serif; font-size: 16pt; font-weight: bold; text-transform: uppercase; margin: 0; }
        .kop-text .kop-sub { font-family: 'Times New Roman', serif; font-size: 10pt; margin-top: 2px; font-style: normal; }

        .ujian-title { text-align: center; margin-bottom: 20px; }
        .ujian-title h3 { font-family: 'Times New Roman', serif; font-size: 14pt; font-weight: bold; text-decoration: underline; text-underline-offset: 3px; text-transform: uppercase; margin: 0; }
        .ujian-title p { font-family: 'Times New Roman', serif; font-size: 12pt; margin: 4px 0 0 0; font-weight: bold; }

        .soal-header { margin-bottom: 20px; }
        .soal-header table { width: 100%; font-family: 'Times New Roman', serif; font-size: 12pt; }
        .soal-header td { padding: 2px 0; vertical-align: bottom; }
        .soal-header td.dot-cell { border-bottom: 1px dotted #000; min-width: 200px; }

        .print-tp-section { margin-bottom: 20px; padding: 10px; border-left: 4px solid #000; background-color: #f9f9f9; page-break-inside: avoid; }
        .print-tp-title { font-family: 'Times New Roman', serif; font-weight: bold; font-size: 11pt; margin-bottom: 2px; }
        .print-tp-text { font-family: 'Times New Roman', serif; font-size: 11pt; font-style: italic; text-align: left; line-height: 1.4; }

        .section-heading { font-family: 'Times New Roman', serif; font-weight: bold; font-size: 12pt; border-bottom: 2px solid #000; padding-bottom: 4px; margin-bottom: 15px; margin-top: 10px; text-align: left; }
        .petunjuk-soal { font-size: 11pt; margin-bottom: 12px; font-style: italic; text-align: left; }

        /* --- LAYOUT SOAL (FIXED: NO INDICATOR) --- */
        .soal-item { margin-bottom: 24px; page-break-inside: avoid; width: 100%; display: block; overflow: hidden; }
        
        /* Nomor Soal: Float Left agar teks mengalir di sebelah kanan */
        .soal-num { 
            float: left; 
            font-weight: bold; 
            font-family: 'Times New Roman', serif; 
            font-size: 12pt; 
            width: 35px;  /* Lebar tetap agar rapi */
            flex-shrink: 0;
        }
        
        .soal-text { 
            font-family: 'Times New Roman', serif; 
            font-size: 12pt; 
            line-height: 1.5; 
            text-align: left; 
            display: block; 
            margin-left: 35px; /* Jarak agar teks tidak menabrak nomor */
        }
        
        .soal-img-print { display: block; max-width: 100%; height: auto; max-height: 200px; object-fit: contain; margin: 8px 0; border: 1px solid #ccc; background-color: #eee; }
        
        /* Opsi Grid 2 Kolom */
        .opsi-wrapper { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; column-gap: 24px; row-gap: 6px; margin-left: 35px; /* Supaya sejajar dengan teks soal */ }
        .opsi-row { display: flex; align-items: flex-start; gap: 8px; font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.4; text-align: left; }
        .opsi-label { font-weight: bold; min-width: 20px; flex-shrink: 0; }
        .opsi-label::after { content: "."; }
        .opsi-img-print { max-width: 60px; max-height: 50px; display: inline-block; vertical-align: middle; margin-left: 8px; object-fit: contain; }

        .answer-lines { margin-top: 8px; margin-left: 35px; border: 1px dashed #bbb; height: 80px; border-radius: 4px; background-color: #fafafa; }
        
        /* Clearfix agar layout tidak berantakan jika ada gambar besar */
        .clearfix::after { content: ""; display: table; clear: both; }
        .ttd-section { display: none; } 

        .print-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-family: 'Times New Roman', serif; font-size: 10pt; table-layout: fixed; }
        .print-table th, .print-table td { border: 1px solid #000; padding: 6px 8px; text-align: left; vertical-align: top; overflow: hidden; }
        .print-table th { background-color: #eee !important; -webkit-print-color-adjust: exact; text-align: center; font-weight: bold; font-size: 9pt; text-transform: uppercase; }
        .print-table td.center { text-align: center; vertical-align: middle; }
        .print-table td.wrap-text { word-wrap: break-word; white-space: pre-wrap; word-break: break-word; overflow-wrap: break-word; font-size: 9.5pt; }
    }

    /* ===== PREVIEW STYLES (NO INDICATOR) ===== */
    .print-preview-wrap { background: #e5e7eb; padding: 40px; border-radius: 8px; display: flex; justify-content: center; overflow-x: auto; }
    .print-preview-sheet { background: white; color: black; width: 210mm; max-width: 100%; min-height: 297mm; padding: 1.5cm 2cm 2cm 2cm; box-shadow: 0 4px 20px rgba(0,0,0,0.2); font-family: 'Times New Roman', Times, serif; font-size: 12pt; line-height: 1.4; transform-origin: top center; }

    /* Copy Styles untuk Preview */
    .print-preview-sheet .kop-surat { display: flex; flex-direction: column; align-items: center; text-align: center; padding-bottom: 12px; margin-bottom: 24px; border-bottom: 3px double #000; }
    .print-preview-sheet .kop-surat-row { display: flex; align-items: center; justify-content: center; gap: 16px; width: 100%; }
    .print-preview-sheet .kop-surat img { height: 75px; width: auto; object-fit: contain; }
    .print-preview-sheet .kop-text { text-align: center; line-height: 1.3; flex: 1; }
    .print-preview-sheet .kop-text h1 { font-size: 13pt; font-weight: bold; text-transform: uppercase; margin: 0; }
    .print-preview-sheet .kop-text h2 { font-size: 16pt; font-weight: bold; text-transform: uppercase; margin: 0; }
    .print-preview-sheet .kop-text .kop-sub { font-size: 10pt; margin-top: 2px; color: #555; }
    .print-preview-sheet .ujian-title { text-align: center; margin-bottom: 20px; }
    .print-preview-sheet .ujian-title h3 { font-size: 14pt; font-weight: bold; text-decoration: underline; text-transform: uppercase; margin: 0; }
    .print-preview-sheet .ujian-title p { font-size: 12pt; margin: 4px 0 0 0; font-weight: bold; }
    .print-preview-sheet .soal-header { margin-bottom: 20px; }
    .print-preview-sheet .soal-header table { width: 100%; font-size: 12pt; }
    .print-preview-sheet .soal-header td { padding: 2px 0; vertical-align: bottom; }
    .print-preview-sheet .soal-header td.dot-cell { border-bottom: 1px dotted #000; min-width: 200px; }
    .print-preview-sheet .print-tp-section { margin-bottom: 20px; padding: 10px; border-left: 4px solid #000; background-color: #f9f9f9; }
    .print-preview-sheet .print-tp-title { font-weight: bold; font-size: 11pt; margin-bottom: 2px; }
    .print-preview-sheet .print-tp-text { font-size: 11pt; font-style: italic; text-align: left; }
    .print-preview-sheet .section-heading { font-weight: bold; font-size: 12pt; border-bottom: 2px solid #000; padding-bottom: 4px; margin-bottom: 15px; margin-top: 10px; text-align: left; }
    .print-preview-sheet .petunjuk-soal { font-size: 11pt; margin-bottom: 12px; font-style: italic; text-align: left; }

    /* Preview Soal Item (NO INDICATOR) */
    .print-preview-sheet .soal-item { margin-bottom: 24px; page-break-inside: avoid; width: 100%; display: block; overflow: hidden; }
    
    .print-preview-sheet .soal-num { 
        float: left; 
        font-weight: bold; 
        font-size: 12pt; 
        width: 35px; 
        flex-shrink: 0; 
    }

    .print-preview-sheet .soal-text { 
        font-size: 12pt; 
        line-height: 1.5; 
        text-align: left; 
        display: block; 
        margin-left: 35px;
        margin-bottom: 8px; 
    }
    
    .print-preview-sheet .soal-img-print { display: block; max-width: 100%; height: auto; max-height: 200px; object-fit: contain; margin: 8px 0; border: 1px solid #ddd; background-color: #f9f9f9; }

    /* Opsi Preview */
    .print-preview-sheet .opsi-wrapper { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; column-gap: 24px; row-gap: 6px; margin-left: 35px; }
    .print-preview-sheet .opsi-row { display: flex; align-items: flex-start; gap: 8px; font-size: 12pt; line-height: 1.4; text-align: left; }
    .print-preview-sheet .opsi-label { font-weight: bold; min-width: 20px; flex-shrink: 0; }
    .print-preview-sheet .opsi-label::after { content: '.'; } 
    .print-preview-sheet .opsi-img-print { max-width: 60px; max-height: 50px; display: inline-block; vertical-align: middle; margin-left: 8px; object-fit: contain; border: 1px solid #eee; }
    .print-preview-sheet .answer-lines { margin-top: 8px; margin-left: 35px; border: 1px dashed #ccc; height: 80px; border-radius: 4px; background-color: #fafafa; }
    .print-preview-sheet .ttd-section { display: none; }
    
    /* Clearfix Preview */
    .print-preview-sheet .clearfix::after { content: ""; display: table; clear: both; }
    
    .print-preview-sheet .print-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 10pt; table-layout: fixed; }
    .print-preview-sheet .print-table th, .print-preview-sheet .print-table td { border: 1px solid #000; padding: 6px 8px; text-align: left; vertical-align: top; overflow: hidden; }
    .print-preview-sheet .print-table th { background-color: #eee; text-align: center; font-weight: bold; font-size: 9pt; text-transform: uppercase; }
    .print-preview-sheet .print-table td.center { text-align: center; vertical-align: middle; }
    .print-preview-sheet .print-table td.wrap-text { word-wrap: break-word; white-space: pre-wrap; word-break: break-word; overflow-wrap: break-word; font-size: 9.5pt;}

.modal-body-content { max-height: 60vh; overflow-y: auto; }
</style>
</head>
<body>

<div id="toastContainer"></div>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- LOGIN -->
<div id="loginPage" class="login-bg">
<div class="glass rounded-2xl p-10 w-full max-w-md relative z-10 fade-in">
    <div class="text-center mb-8">
        <div class="w-20 h-20 mx-auto mb-4 rounded-full overflow-hidden border-4 border-kopAccent shadow-lg shadow-kopAccent/20 flex items-center justify-center bg-white">
            <img src="https://www.image2url.com/r2/default/images/1776680731558-aaedfd5c-6674-4989-a7a4-c15f6291acac.jpeg" alt="Logo" class="w-full h-full object-cover">
        </div>
        <h1 class="font-display text-2xl font-bold text-kopAccent tracking-wide">KOREK API</h1>
        <p class="text-muted text-sm mt-1">Sistem Sumatif Akhir Tahun</p>
        <p class="text-muted text-xs mt-0.5 opacity-60">KOREK API KECAMATAN MAJALENGKA</p>
    </div>
    <div class="space-y-4">
        <div>
            <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Pilih Mapel</label>
            <select id="loginMapel" class="input-field"><option value="">-- Memuat Data --</option></select>
        </div>
        <div>
            <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Pilih Kelas</label>
            <select id="loginKelas" class="input-field" disabled><option value="">-- Pilih Kelas --</option></select>
        </div>
        <div>
            <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Password</label>
            <div class="relative">
                <input type="password" id="loginPass" class="input-field pr-10" placeholder="Masukkan password" onkeydown="if(event.key==='Enter')doLogin()">
                <button onclick="togglePassVis()" class="absolute right-3 top-1/2 -translate-y-1/2 text-muted hover:text-light transition-colors" type="button"><i id="passEye" class="fas fa-eye text-sm"></i></button>
            </div>
            <p id="loginError" class="text-danger text-xs mt-1 hidden"></p>
        </div>
        <button onclick="doLogin()" class="btn-primary w-full mt-2" type="button"><i class="fas fa-sign-in-alt mr-2"></i>Masuk</button>
    </div>
</div>
</div>

<!-- MAIN APP -->
<div id="mainPage" class="hidden">
<aside id="sidebar" class="sidebar">
    <div class="p-5 border-b border-border">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-kopAccent to-yellow-600 flex items-center justify-center flex-shrink-0"><i class="fas fa-fire text-kop text-lg"></i></div>
            <div><h2 class="font-display text-kopAccent font-bold text-sm leading-tight">KOREK API</h2><p class="text-muted text-xs">Online Mode</p></div>
        </div>
    </div>
    <nav class="py-4" id="sidebarNav">
        <div class="px-5 mb-2"><span class="text-xs text-muted uppercase tracking-wider font-semibold">Menu Utama</span></div>
        <div class="nav-item active" data-page="dashboard"><i class="fas fa-th-large w-5 text-center"></i>Dashboard</div>
        <div class="nav-item" data-page="tp"><i class="fas fa-bullseye w-5 text-center"></i>Kelola TP</div>
        <div class="nav-item" data-page="create"><i class="fas fa-plus-circle w-5 text-center"></i>Buat Soal</div>
        <div class="nav-item" data-page="questions"><i class="fas fa-list w-5 text-center"></i>Bank Soal</div>
        
        <!-- MENU KHUSUS KELAS 6 (PAJ) -->
        <div class="paj-menu-container hidden mt-4 border-t border-border">
            <div class="px-5 mb-2"><span class="text-xs text-danger font-semibold uppercase tracking-wider"><i class="fas fa-graduation-cap mr-1"></i>Kelas 6 (PAJ)</span></div>
            <div class="nav-item paj-item" data-page="create-paj"><i class="fas fa-plus-square w-5 text-center"></i>Buat Soal PAJ</div>
            <div class="nav-item paj-item" data-page="questions-paj"><i class="fas fa-folder-open w-5 text-center"></i>Bank Soal PAJ</div>
            <div class="nav-item paj-item" data-page="print-paj"><i class="fas fa-print w-5 text-center"></i>Cetak PAJ</div>
        </div>

        <div class="px-5 mt-4 mb-2"><span class="text-xs text-muted uppercase tracking-wider font-semibold">Output Dokumen</span></div>
        <div class="nav-item" data-page="print"><i class="fas fa-print w-5 text-center"></i>Cetak Soal</div>
        <div class="nav-item" data-page="kisi"><i class="fas fa-table w-5 text-center"></i>Kisi-Kisi</div>
        <div class="nav-item" data-page="scoring"><i class="fas fa-key w-5 text-center"></i>Kunci & Skor</div>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-border">
        <div class="flex items-center gap-3 mb-3">

<script>
// ================================================================
// FIREBASE CONFIG
// ================================================================
var firebaseConfig = {
    apiKey: "AIzaSyC0Hs7SUgPAeQ_JaotHUJL5m6nIhCRif-8",
    authDomain: "pembuatan-soal.firebaseapp.com",
    projectId: "pembuatan-soal",
    storageBucket: "pembuatan-soal.firebasestorage.app",
    messagingSenderId: "56200686194",
    appId: "1:56200686194:web:eb2de00c9d152d87bcf0eb"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var storage = firebase.storage();

// ================================================================
// DATA MASTER
// ================================================================
var MAPEL_LIST = [
    {id:'ppkn',nama:'Pendidikan Pancasila',singkat:'PPKn'},
    {id:'mat',nama:'Matematika',singkat:'Mat'},
    {id:'bin',nama:'Bahasa Indonesia',singkat:'B.Indo'},
    {id:'sbd',nama:'Seni Budaya',singkat:'Seni'},
    {id:'ipas',nama:'IPAS',singkat:'IPAS'},
    {id:'bsd',nama:'Bahasa Sunda',singkat:'B.Sunda'},
    {id:'bing',nama:'Bahasa Inggris',singkat:'B.Inggris'},
    {id:'pai',nama:'PAI',singkat:'PAI'},
    {id:'pjok',nama:'PJOK',singkat:'PJOK'}
];
var KELAS_LIST = ['Kelas 1','Kelas 2','Kelas 3','Kelas 4','Kelas 5','Kelas 6'];

// Logika Opsi Jawaban (Kelas 6: 5 Opsi, Lainnya: 3/4 Opsi)
function getMaxOpt(k){ var n=parseInt((k||'').replace('Kelas ',''))||0; return n<=2?3:4; }
function getOptLetters(k){ return ['a','b','c','d','e'].slice(0,getMaxOpt(k)); }

function getMapelName(id){ var m=MAPEL_LIST.find(function(x){return x.id===id;}); return m?m.nama:id; }
function getMapelSingkat(id){ var m=MAPEL_LIST.find(function(x){return x.id===id;}); return m?m.singkat:id; }
function escHtml(s){ if(!s) return ''; var d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }

// ================================================================
// STATE
// ================================================================
var currentUser = null;
var questions = [];
var pajQuestions = []; 
var tujuanPembelajaran = [];
var accounts = [];
var currentEditId = null;
var currentEditType = null; 
var unsubQ = null;
var unsubTP = null;
var unsubPAJ = null;

// ================================================================
// UTILITAS UI
// ================================================================
function showToast(msg, type){
    type = type || 'success';
    var c = document.getElementById('toastContainer');
    var t = document.createElement('div');
    var icon = type==='success'?'check-circle':type==='error'?'times-circle':'info-circle';
    t.className = 'toast toast-' + type;
    t.innerHTML = '<i class="fas fa-' + icon + ' flex-shrink-0"></i><span>' + msg + '</span>';
    c.appendChild(t);
    setTimeout(function(){ if(t.parentNode) t.remove(); }, 3500);
}

function closeModal(){
    document.getElementById('modalOverlay').classList.add('hidden');
    document.getElementById('modalBody').innerHTML = '';
}

function openModal(html){
    document.getElementById('modalOverlay').classList.remove('hidden');
    document.getElementById('modalBody').innerHTML = '<div class="modal-body-content">' + html + '</div>';
}

function togglePassVis(){
    var inp = document.getElementById('loginPass');
    var icon = document.getElementById('passEye');
    if(inp.type==='password'){ inp.type='text'; icon.className='fas fa-eye-slash text-sm'; }
    else { inp.type='password'; icon.className='fas fa-eye text-sm'; }
}

function toggleSidebar(){
    var sb = document.getElementById('sidebar');
    var ov = document.getElementById('sidebarOverlay');
    sb.classList.toggle('mobile-open');
    ov.classList.toggle('active', sb.classList.contains('mobile-open'));
}

function closeSidebar(){
    document.getElementById('sidebar').classList.remove('mobile-open');
    document.getElementById('sidebarOverlay').classList.remove('active');
}

function makeMapelOpt(sel){
    if(currentUser && currentUser.isAdmin){
        var h = '<option value="">-- Pilih --</option>';
        MAPEL_LIST.forEach(function(m){ h += '<option value="'+m.id+'"'+(m.id===sel?' selected':'')+'>'+m.nama+'</option>'; });
        return h;
    }
    if(currentUser) return '<option value="'+currentUser.mapel+'" selected>'+getMapelName(currentUser.mapel)+'</option>';
    return '<option value="">-- Pilih --</option>';
}

function makeKelasOpt(sel){
    if(currentUser && currentUser.isAdmin){
        var h = '<option value="">-- Pilih --</option>';
        KELAS_LIST.forEach(function(k){ h += '<option value="'+k+'"'+(k===sel?' selected':'')+'>'+k+'</option>'; });
        return h;
    }
    if(currentUser) return '<option value="'+currentUser.kelas+'" selected>'+currentUser.kelas+'</option>';
    return '<option value="">-- Pilih --</option>';
}

// ================================================================
// FIREBASE INIT
// ================================================================
function initApp(){
    db.collection('accounts').limit(1).get().then(function(snap){
        if(snap.empty){
            var batch = db.batch();
            batch.set(db.collection('accounts').doc('admin'), {mapel:'admin', kelas:'Semua', password:'admin123'});
            MAPEL_LIST.forEach(function(m){
                KELAS_LIST.forEach(function(k){
                    batch.set(db.collection('accounts').doc(m.id+'_'+k.replace(' ','')), {mapel:m.id, kelas:k, password:'guru123'});
                });
            });
            return batch.commit();
        }
    }).then(function(){
        showToast('Data akun siap','info');
    }).catch(function(){});

    db.collection('accounts').onSnapshot(function(snap){
        accounts = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        populateLoginDropdown();
    });

    unsubTP = db.collection('tps').orderBy('createdAt','asc').onSnapshot(function(snap){
        tujuanPembelajaran = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        if(document.getElementById('tpListContainer')) renderTPList();
        if(document.getElementById('cMapel')) updateTPDropdown();
    });
}

function populateLoginDropdown(){
    var sel = document.getElementById('loginMapel');
    sel.innerHTML = '<option value="">-- Pilih Mata Pelajaran --</option>';
    sel.innerHTML += '<option value="admin">Admin (Semua Akses)</option>';
    MAPEL_LIST.forEach(function(m){ sel.innerHTML += '<option value="'+m.id+'">'+m.nama+'</option>'; });
    sel.disabled = false;
    sel.onchange = function(){
        var ks = document.getElementById('loginKelas');
        document.getElementById('loginError').classList.add('hidden');
        if(this.value==='admin'){
            ks.innerHTML = '<option value="Semua">Semua Kelas</option>'; ks.disabled = false;
        } else if(this.value){
            ks.disabled = false;
            ks.innerHTML = '<option value="">-- Pilih Kelas --</option>';
            KELAS_LIST.forEach(function(k){ ks.innerHTML += '<option value="'+k+'">'+k+'</option>'; });
        } else {
            ks.innerHTML = '<option value="">-- Pilih Kelas --</option>'; ks.disabled = true;
        }
    };
}

// ================================================================
// AUTH
// ================================================================
function doLogin(){
    var mapel = document.getElementById('loginMapel').value;
    var kelas = document.getElementById('loginKelas').value;
    var pass  = document.getElementById('loginPass').value;
    var errEl = document.getElementById('loginError');
    if(!mapel){ errEl.textContent='Pilih mapel terlebih dahulu'; errEl.classList.remove('hidden'); return; }
    if(!kelas){ errEl.textContent='Pilih kelas terlebih dahulu'; errEl.classList.remove('hidden'); return; }
    var acc = null;
    for(var i=0;i<accounts.length;i++){
        if(accounts[i].mapel===mapel && accounts[i].kelas===kelas && accounts[i].password===pass){ acc=accounts[i]; break; }
    }
    if(!acc){ errEl.textContent='Password salah!'; errEl.classList.remove('hidden'); return; }
    
    currentUser = { mapel:acc.mapel, kelas:acc.kelas, isAdmin:acc.mapel==='admin' };
    var isKelas6 = currentUser.kelas === 'Kelas 6';

    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainPage').classList.remove('hidden');
    
    var pajMenu = document.querySelector('.paj-menu-container');
    if(isKelas6 || currentUser.isAdmin){
        pajMenu.classList.remove('hidden');
    } else {
        pajMenu.classList.add('hidden');
    }

    initMainPage();
    showToast('Selamat datang, ' + (currentUser.isAdmin ? 'Admin' : getMapelName(currentUser.mapel)));
}

function doLogout(){
    currentUser = null; currentEditId = null;
    if(unsubQ) unsubQ();
    if(unsubPAJ) unsubPAJ();
    document.getElementById('mainPage').classList.add('hidden');
    document.getElementById('loginPage').style.display = '';
    document.getElementById('loginPass').value = '';
    closeSidebar();
}

function initMainPage(){
    document.getElementById('sidebarUser').textContent = currentUser.isAdmin ? 'Administrator' : getMapelName(currentUser.mapel);
    document.getElementById('sidebarRole').textContent = currentUser.isAdmin ? 'Akses Semua' : currentUser.kelas;
    document.getElementById('topbarInfo').innerHTML = currentUser.isAdmin
        ? '<i class="fas fa-crown mr-1 text-kopAccent"></i>Admin'
        : '<i class="fas fa-graduation-cap mr-1"></i>' + getMapelSingkat(currentUser.mapel) + ' - ' + currentUser.kelas;

    unsubQ = db.collection('questions').orderBy('createdAt','asc').onSnapshot(function(snap){
        questions = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        if(document.querySelector('.nav-item.active')?.dataset.page === 'dashboard') renderDashboard(document.getElementById('pageContent'));
        if(document.querySelector('.nav-item.active')?.dataset.page === 'questions') renderBankFiltered();
    });

    unsubPAJ = db.collection('questions_paj').orderBy('createdAt','asc').onSnapshot(function(snap){
        pajQuestions = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        if(document.querySelector('.nav-item.active')?.dataset.page === 'dashboard' && (currentUser.kelas==='Kelas 6'||currentUser.isAdmin)) renderDashboard(document.getElementById('pageContent'));
        if(document.querySelector('.nav-item.active')?.dataset.page === 'questions-paj') renderBankPAJFiltered();
    });

    navigateTo('dashboard');
}

// ================================================================
// NAVIGASI
// ================================================================
function navigateTo(page){
    document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
    var t = document.querySelector('.nav-item[data-page="'+page+'"]');
    if(t) t.classList.add('active');
    var titles = {
        dashboard:'Dashboard', tp:'Kelola Tujuan Pembelajaran', create:'Buat Soal', questions:'Bank Soal',
        print:'Cetak Soal', kisi:'Kisi-Kisi', scoring:'Kunci & Skor',
        'create-paj':'Buat Soal PAJ', 'questions-paj':'Bank Soal PAJ', 'print-paj':'Cetak Soal PAJ'
    };
    document.getElementById('pageTitle').textContent = titles[page] || page;
    closeSidebar();
    var c = document.getElementById('pageContent');
    switch(page){
        case 'dashboard': renderDashboard(c); break;
        case 'tp':        renderTP(c); break;
        case 'create':    renderCreate(c); break;
        case 'questions': renderQuestions(c); break;
        case 'print':     renderPrint(c); break;
        case 'kisi':      renderKisi(c); break;
        case 'scoring':   renderScoring(c); break;
        case 'create-paj':    renderCreate(c, 'paj'); break;
        case 'questions-paj': renderQuestions(c, 'paj'); break;
        case 'print-paj':     renderPrint(c, 'paj'); break;
    }
}

document.getElementById('sidebarNav').addEventListener('click', function(e){
    var item = e.target.closest('.nav-item');
    if(item) navigateTo(item.dataset.page);
});

// ================================================================
// DASHBOARD
// ================================================================
function renderDashboard(c){
    var isKelas6 = currentUser.kelas === 'Kelas 6';
    var myQ = currentUser.isAdmin ? questions : questions.filter(function(q){ return q.mapel===currentUser.mapel && q.kelas===currentUser.kelas; });
    var myPAJQ = (currentUser.isAdmin || isKelas6) ? pajQuestions.filter(function(q){ return q.mapel===currentUser.mapel && q.kelas==='Kelas 6'; }) : [];
    
    var totalSkor=0, byPg=0, byUr=0;
    myQ.forEach(function(q){ totalSkor+=(q.score||0); if(q.type==='pg') byPg++; else byUr++; });
    
    var pajSkor=0, pajTotal=0;
    myPAJQ.forEach(function(q){ pajSkor+=(q.score||0); pajTotal++; });

    var pajCards = '';
    if(isKelas6 || currentUser.isAdmin){
        pajCards = 
        '<div class="card text-center border-l-4 border-danger"><div class="text-3xl font-bold text-danger">'+pajTotal+'</div><div class="text-xs text-muted mt-1">Soal PAJ</div></div>' +
        '<div class="card text-center border-l-4 border-info"><div class="text-3xl font-bold text-info">'+pajSkor+'</div><div class="text-xs text-muted mt-1">Skor PAJ</div></div>';
    }

    c.innerHTML = '<div class="fade-in grid grid-cols-2 md:grid-cols-4 gap-4">' +
        '<div class="card text-center border-l-4 border-kopAccent"><div class="text-3xl font-bold text-kopAccent">'+myQ.length+'</div><div class="text-xs text-muted mt-1">Total Soal</div></div>' +
        '<div class="card text-center border-l-4 border-info"><div class="text-3xl font-bold text-info">'+byPg+'</div><div class="text-xs text-muted mt-1">Pilihan Ganda</div></div>' +
        '<div class="card text-center border-l-4 border-warning"><div class="text-3xl font-bold text-warning">'+byUr+'</div><div class="text-xs text-muted mt-1">Uraian</div></div>' +
        '<div class="card text-center border-l-4 border-success"><div class="text-3xl font-bold text-success">'+totalSkor+'</div><div class="text-xs text-muted mt-1">Total Skor</div></div>' +
        pajCards +
    '</div>';
}

// ================================================================
// KELOLA TP (Tidak Berubah)
// ================================================================
function renderTP(c){
    var filterHtml = '';
    if(currentUser.isAdmin){
        filterHtml = '<div class="flex flex-wrap gap-4 mb-4 p-4 bg-dark/30 rounded-lg">' +
            '<div class="w-44"><label class="text-xs text-muted">Filter Mapel</label><select id="tpFilterMapel" class="input-field" onchange="renderTPList()">'+makeMapelOpt('')+'</select></div>' +
            '<div class="w-44"><label class="text-xs text-muted">Filter Kelas</label><select id="tpFilterKelas" class="input-field" onchange="renderTPList()"><option value="">Semua</option>'+KELAS_LIST.map(function(k){return '<option value="'+k+'">'+k+'</option>';}).join('')+'</select></div>' +
        '</div>';
    }
    c.innerHTML = '<div class="fade-in card">' +
        '<div class="flex flex-wrap justify-between items-center mb-4 gap-3">' +
            '<h3 class="font-display text-lg font-bold text-light">Tujuan Pembelajaran</h3>' +
            '<button onclick="openAddTPModal()" class="btn-primary text-sm"><i class="fas fa-plus mr-1"></i>Tambah TP</button>' +
        '</div>' + filterHtml +
        '<div id="tpListContainer" class="space-y-2 max-h-[70vh] overflow-y-auto pr-2"></div></div>';
    renderTPList();
}

function renderTPList(){
    var container = document.getElementById('tpListContainer');
    if(!container) return;
    var list = tujuanPembelajaran.slice();
    if(currentUser.isAdmin){
        var fm = document.getElementById('tpFilterMapel');
        var fk = document.getElementById('tpFilterKelas');
        if(fm && fm.value) list = list.filter(function(t){return t.mapel===fm.value;});
        if(fk && fk.value) list = list.filter(function(t){return t.kelas===fk.value;});
    } else {
        list = list.filter(function(t){return t.mapel===currentUser.mapel && t.kelas===currentUser.kelas;});
    }
    if(list.length===0){ container.innerHTML = '<p class="text-center text-muted py-10"><i class="fas fa-inbox text-3xl mb-3 block opacity-30"></i>Belum ada data TP</p>'; return; }
    container.innerHTML = list.map(function(t){
        return '<div class="p-3 bg-dark/30 rounded-lg flex justify-between items-start border-l-4 border-kopAccent hover:bg-dark/50 transition-colors">' +
            '<div class="flex-1 pr-4"><div class="flex gap-2 mb-1 flex-wrap"><span class="text-xs px-2 py-0.5 rounded bg-kopAccent/20 text-kopAccent font-semibold">'+getMapelSingkat(t.mapel)+'</span><span class="text-xs text-muted">'+t.kelas+'</span></div><p class="text-sm leading-relaxed">'+escHtml(t.text)+'</p></div>' +
            '<button onclick="editTP(\''+t.id+'\')" class="text-info/60 hover:text-info mr-2 p-1"><i class="fas fa-pen text-xs"></i></button>' +
            '<button onclick="deleteTP(\''+t.id+'\')" class="text-danger/60 hover:text-danger flex-shrink-0 p-1"><i class="fas fa-trash text-xs"></i></button></div>';
    }).join('');
}

function openAddTPModal(){
    openModal('<h3 class="font-display text-lg font-bold text-light mb-4">Tambah Tujuan Pembelajaran</h3><div class="space-y-4">' +
        '<div class="grid grid-cols-2 gap-4"><div><label class="text-xs text-muted mb-1 block">Mapel</label><select id="mTPMapel" class="input-field"'+(currentUser.isAdmin?'':' disabled')+'>'+makeMapelOpt(currentUser.mapel)+'</select></div><div><label class="text-xs text-muted mb-1 block">Kelas</label><select id="mTPKelas" class="input-field"'+(currentUser.isAdmin?'':' disabled')+'>'+makeKelasOpt(currentUser.kelas)+'</select></div></div>' +
        '<div><label class="text-xs text-muted mb-1 block">Isi Tujuan Pembelajaran</label><textarea id="mTPText" class="input-field" rows="4" placeholder="Contoh: Peserta didik mampu menjelaskan..."></textarea></div>' +
        '<div class="flex justify-end gap-3 pt-2"><button onclick="closeModal()" class="btn-secondary">Batal</button><button onclick="saveTP()" class="btn-primary">Simpan</button></div></div>');
}

function editTP(id){
    var t = tujuanPembelajaran.find(function(x){return x.id===id;});
    if(!t) return;
    openModal('<h3 class="font-display text-lg font-bold text-light mb-4">Edit Tujuan Pembelajaran</h3><div class="space-y-4">' +
        '<div><label class="text-xs text-muted mb-1 block">Isi Tujuan Pembelajaran</label><textarea id="mTPTextEdit" class="input-field" rows="4" placeholder="Contoh: Peserta didik mampu menjelaskan...">'+escHtml(t.text)+'</textarea></div>' +
        '<div class="flex justify-end gap-3 pt-2"><button onclick="closeModal()" class="btn-secondary">Batal</button><button onclick="updateTP(\''+id+'\')" class="btn-primary">Simpan Perubahan</button></div></div>');
}

function saveTP(){
    var text = document.getElementById('mTPText').value.trim();
    if(!text){ showToast('Isi TP tidak boleh kosong','error'); return; }
    db.collection('tps').add({ mapel:document.getElementById('mTPMapel').value, kelas:document.getElementById('mTPKelas').value, text:text, createdAt:firebase.firestore.FieldValue.serverTimestamp() })
    .then(function(){ showToast('TP berhasil disimpan!'); closeModal(); }).catch(function(){ showToast('Gagal menyimpan TP','error'); });
}

function updateTP(id){
    var text = document.getElementById('mTPTextEdit').value.trim();
    if(!text){ showToast('Isi TP tidak boleh kosong','error'); return; }
    db.collection('tps').doc(id).update({ text: text })
    .then(function(){ showToast('TP diperbarui!'); closeModal(); }).catch(function(){ showToast('Gagal memperbarui TP','error'); });
}

function deleteTP(id){
    if(!confirm('Hapus TP ini?')) return;
    db.collection('tps').doc(id).delete().then(function(){ showToast('TP dihapus'); }).catch(function(){ showToast('Gagal menghapus','error'); });
}

function updateTPDropdown(){
    var mapelEl = document.getElementById('cMapel');
    var kelasEl = document.getElementById('cKelas');
    if(!mapelEl || !kelasEl) return;
    var mapel = mapelEl.value, kelas = kelasEl.value;
    if(!mapel || !kelas) return;
    var relevant = tujuanPembelajaran.filter(function(t){ return t.mapel===mapel && t.kelas===kelas; });
    var sel = document.getElementById('cTPSelect');
    if(!sel) return;
    sel.innerHTML = '<option value="">-- Pilih TP (Dari Database) --</option>';
    relevant.forEach(function(t){
        var short = t.text.length > 80 ? t.text.substring(0,80) + '...' : t.text;
        sel.innerHTML += '<option value="'+escHtml(t.text)+'">'+escHtml(short)+'</option>';
    });
}

// ================================================================
// BUAT SOAL (SAT & PAJ)
// ================================================================
function renderCreate(c, mode){
    currentEditId = null;
    currentEditType = mode || 'sat';
    var isPAJ = currentEditType === 'paj';
    
    c.innerHTML = '<div class="fade-in max-w-4xl mx-auto">' +
        '<div class="flex gap-4 mb-5 border-b border-border pb-2">' +
            '<button onclick="switchCreateTab(\'single\')" id="tabSingle" class="text-kopAccent border-b-2 border-kopAccent pb-2 font-bold text-sm"><i class="fas fa-edit mr-1"></i>Input Satu</button>' +
            '<button onclick="switchCreateTab(\'json\')" id="tabJson" class="text-muted hover:text-light pb-2 text-sm"><i class="fas fa-file-code mr-1"></i>Import JSON (Banyak)</button>' +
        '</div>' +
        '<div id="panelSingle" class="card"></div>' +
        '<div id="panelJson" class="hidden card"></div></div>';
    
    if(isPAJ){
        document.querySelector('#panelSingle').insertAdjacentHTML('afterbegin', '<div class="mb-4 p-3 bg-danger/10 border border-danger/30 rounded text-danger font-bold text-center"><i class="fas fa-exclamation-triangle mr-2"></i>Mode Penilaian Akhir Jenjang (Kelas 6) - Soal akan disimpan terpisah.</div>');
    }

    buildSingleForm(isPAJ);
    buildJsonForm(isPAJ);
}

function buildSingleForm(isPAJ){
    var html = '<h3 class="font-display text-lg font-bold text-light mb-4">Input Soal Manual '+(isPAJ?'(PAJ)':'(SAT)')+'</h3>' +

function handleImageUpload(input, targetInputId, previewId){
    var file = input.files[0];
    if(!file) return;
    var targetInput = document.getElementById(targetInputId);
    var previewContainer = document.getElementById(previewId);
    if(!targetInput || !previewContainer) return;
    previewContainer.innerHTML = '<span class="text-xs text-kopAccent"><i class="fas fa-spinner fa-spin mr-1"></i>Mengupload...</span>';
    var fileName = Date.now() + '_' + file.name;
    var ref = storage.ref('soal/' + fileName);
    ref.put(file).then(function(snapshot){ return snapshot.ref.getDownloadURL(); })
    .then(function(url){
        targetInput.value = url;
        previewContainer.innerHTML = '<img src="'+url+'" class="img-preview">';
        showToast('Gambar berhasil diupload', 'success');
    }).catch(function(error){
        previewContainer.innerHTML = '<span class="text-xs text-danger">Gagal: '+error.message+'</span>';
        showToast('Gagal upload gambar','error');
    });
}

function saveSingleQuestion(){
    var btn = document.getElementById('btnSaveSingle');
    if(!btn) return;
    btn.disabled = true; btn.innerHTML = '<span class="loading-spinner mr-2"></span>Menyimpan...';
    
    var mapel = document.getElementById('cMapel').value;
    var kelas = document.getElementById('cKelas').value;
    var type  = document.getElementById('cType').value;
    var text  = document.getElementById('cText').value.trim();
    if(!text){ showToast('Teks soal tidak boleh kosong','error'); btn.disabled=false; btn.innerHTML='<i class="fas fa-save mr-2"></i>Simpan Soal'; return; }

    var qData = {
        mapel:mapel, kelas:kelas, type:type, text:text,
        tp: (document.getElementById('cTPManual').value || document.getElementById('cTPSelect').value || '').trim(),
        indicator: (document.getElementById('cIndicator').value || '').trim(),
        difficulty: document.getElementById('cDiff').value,
        score: parseInt(document.getElementById('cScore').value) || 1,
        answer: document.getElementById('cAnswer').value.trim(),
        image: (document.getElementById('cImgUrl').value || '').trim(),
        options: [], optionImages: [],
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    if(type==='pg'){
        var letters = getOptLetters(kelas);
        letters.forEach(function(l){
            var L = l.toUpperCase();
            qData.options.push((document.getElementById('cOpt'+L) ? document.getElementById('cOpt'+L).value : '').trim());
            qData.optionImages.push((document.getElementById('cOptImgUrl'+L) ? document.getElementById('cOptImgUrl'+L).value : '').trim());
        });
    }

    var targetCollection = currentEditType === 'paj' ? 'questions_paj' : 'questions';

    db.collection(targetCollection).add(qData).then(function(){
        showToast('Soal berhasil disimpan ('+targetCollection+')');
        document.getElementById('cText').value='';
        document.getElementById('cImgUrl').value='';
        document.getElementById('cImgPrev').innerHTML='';
        document.getElementById('cAnswer').value='';
        document.getElementById('cIndicator').value='';
        if(document.getElementById('cTPManual')) document.getElementById('cTPManual').value='';
        if(document.getElementById('cTPSelect')) document.getElementById('cTPSelect').value='';
        if(type==='pg'){
            var letters = getOptLetters(kelas);
            letters.forEach(function(l){
                var L = l.toUpperCase();
                var o=document.getElementById('cOpt'+L); if(o) o.value='';
                var u=document.getElementById('cOptImgUrl'+L); if(u) u.value='';
                var p=document.getElementById('cOptImgPrev'+L); if(p) p.innerHTML='';
            });
        }   
    })
    .finally(function(){ btn.disabled=false; btn.innerHTML='<i class="fas fa-save mr-2"></i>Simpan Soal'; });
}

function processJSON(){
    var btn = document.getElementById('btnProcessJson');
    btn.disabled=true; btn.innerHTML='<span class="loading-spinner mr-2"></span>Memproses...';
    var txt = document.getElementById('jsonInput').value;
    var defMapel = currentUser.isAdmin ? '' : currentUser.mapel;
    var defKelas = currentUser.isAdmin ? '' : currentUser.kelas;
    if(currentEditType === 'paj') defKelas = 'Kelas 6';

    if(!txt.trim()){ showToast('JSON kosong','error'); btn.disabled=false; btn.innerHTML='<i class="fas fa-file-import mr-2"></i>Proses & Import JSON'; return; }
    try {
        var data = JSON.parse(txt);
        if(!Array.isArray(data)) throw new Error('Format harus Array');
        var batch = db.batch(); var count = 0;
        var targetCollection = currentEditType === 'paj' ? 'questions_paj' : 'questions';
        
        data.forEach(function(item){
            var qText = item.soal || item.text || '';
            if(!qText) return;
            var qOpts = item.options || [item.opsi_a,item.opsi_b,item.opsi_c,item.opsi_d,item.opsi_e].filter(Boolean);
            batch.set(db.collection(targetCollection).doc(), {
                mapel:item.mapel||defMapel, kelas:item.kelas||defKelas,
                type:item.tipe||item.type||'pg', text:qText, options:qOpts,
                answer:item.kunci||item.answer||'', difficulty:item.difficulty||'Sedang',
                score:item.skor||item.score||1, tp:item.tp||'', indicator:item.indicator||'',
                image:item.image||'', optionImages:item.optionImages||[],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            count++;
        });
        batch.commit().then(function(){ showToast(count+' soal berhasil diimport ke '+targetCollection+'!'); document.getElementById('jsonInput').value=''; }).catch(function(e){ showToast('Gagal: '+(e.message||e),'error'); });
    } catch(e){ showToast('JSON Salah: '+(e.message||e),'error'); }
    btn.disabled=false; btn.innerHTML='<i class="fas fa-file-import mr-2"></i>Proses & Import JSON';
}

function doUpdateQuestion(id, type, kelas, mode){
    var d = { 
        tp:document.getElementById('eTP').value, 
        indicator: document.getElementById('eIndicator').value,
        text:document.getElementById('eText').value, 
        image:document.getElementById('eImg').value, 
        answer:document.getElementById('eAnswer').value, 
        score:parseInt(document.getElementById('eScore').value)||1 
    };

    if(type==='pg'){
        d.options=[]; d.optionImages=[];
        var letters = getOptLetters(kelas);
        letters.forEach(function(l){
            var L = l.toUpperCase();
            d.options.push(document.getElementById('eOptVal'+L).value.trim());
            d.optionImages.push(document.getElementById('eOptImgUrl'+L).value.trim());
        });
    }

    var targetCollection = mode === 'paj' ? 'questions_paj' : 'questions';
    db.collection(targetCollection).doc(id).update(d).then(function(){ showToast('Soal diperbarui!'); closeModal(); }).catch(function(){ showToast('Gagal update','error'); });
}

function deleteQuestion(id, mode){
    if(!confirm('Hapus soal ini?')) return;
    var targetCollection = mode === 'paj' ? 'questions_paj' : 'questions';
    db.collection(targetCollection).doc(id).delete().then(function(){ showToast('Soal dihapus'); }).catch(function(){ showToast('Gagal menghapus','error'); });
}

function doPrintSoal(){
    var sheet = document.querySelector('.print-preview-sheet');
    if(!sheet){ showToast('Tidak ada preview untuk dicetak','error'); return; }
    
    var iframe = document.createElement('iframe');
    iframe.style.position = 'fixed';
    iframe.style.left = '-9999px';
    iframe.style.top = '0';
    iframe.style.width = '210mm';
    iframe.style.height = '297mm';
    document.body.appendChild(iframe);
    
    var doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open();
    doc.write('<!DOCTYPE html><html><head>');
    doc.write('<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght+700&display=swap" rel="stylesheet">');
    doc.write('<style>');
    doc.write('@page { size: A4 portrait; margin: 1.5cm 2cm 2cm 2cm; }');
    doc.write('body { margin: 0; padding: 0; font-family: "Times New Roman", Times, serif; font-size: 12pt; line-height: 1.4; color: black; background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }');
    doc.write('.print-page { padding: 0; }');
    
    // CSS KOP SURAT
    doc.write('.kop-surat { text-align: center; padding-bottom: 12px; margin-bottom: 24px; border-bottom: 3px double #000; display: flex; flex-direction: column; align-items: center; gap: 8px; }');
    doc.write('.kop-surat-row { display: flex; align-items: center; justify-content: center; gap: 16px; width: 100%; }');
    doc.write('.kop-surat img { height: 75px; width: auto; object-fit: contain; }');
    doc.write('.kop-text { text-align: center; line-height: 1.3; flex: 1; }');
    doc.write('.kop-text h1 { font-family: "Times New Roman", serif; font-size: 13pt; font-weight: bold; text-transform: uppercase; margin: 0; }');
    doc.write('.kop-text h2 { font-family: "Times New Roman", serif; font-size: 16pt; font-weight: bold; text-transform: uppercase; margin: 0; }');
    doc.write('.kop-text .kop-sub { font-family: "Times New Roman", serif; font-size: 10pt; margin-top: 2px; font-style: normal; }');
    
    doc.write('.ujian-title { text-align: center; margin-bottom: 20px; }');
    doc.write('.ujian-title h3 { font-family: "Times New Roman", serif; font-size: 14pt; font-weight: bold; text-decoration: underline; text-transform: uppercase; margin: 0; }');
    doc.write('.ujian-title p { font-family: "Times New Roman", serif; font-size: 12pt; margin: 4px 0 0 0; font-weight: bold; }');
    doc.write('.soal-header { margin-bottom: 20px; }');
    doc.write('.soal-header table { width: 100%; font-family: "Times New Roman", serif; font-size: 12pt; }');
    doc.write('.soal-header td { padding: 2px 0; vertical-align: bottom; }');
    doc.write('.soal-header td.dot-cell { border-bottom: 1px dotted #000; min-width: 200px; }');
    doc.write('.print-tp-section { margin-bottom: 20px; padding: 10px; border-left: 4px solid #000; background-color: #f9f9f9; page-break-inside: avoid; }');
    doc.write('.print-tp-title { font-family: "Times New Roman", serif; font-weight: bold; font-size: 11pt; margin-bottom: 2px; }');
    doc.write('.print-tp-text { font-family: "Times New Roman", serif; font-size: 11pt; font-style: italic; text-align: left; line-height: 1.4; }');
    doc.write('.section-heading { font-family: "Times New Roman", serif; font-weight: bold; font-size: 12pt; border-bottom: 2px solid #000; padding-bottom: 4px; margin-bottom: 15px; margin-top: 10px; text-align: left; }');
    doc.write('.petunjuk-soal { font-size: 11pt; margin-bottom: 12px; font-style: italic; text-align: left; }');
    
    /* CSS SOAL (FIXED: NO INDICATOR) */
    doc.write('.soal-item { margin-bottom: 24px; page-break-inside: avoid; width: 100%; display: block; overflow: hidden; }');
    doc.write('.soal-num { float: left; font-weight: bold; font-family: "Times New Roman", serif; font-size: 12pt; width: 35px; flex-shrink: 0; }');
    doc.write('.soal-text { font-family: "Times New Roman", serif; font-size: 12pt; line-height: 1.5; text-align: left; display: block; margin-left: 35px; }');
    doc.write('.soal-img-print { display: block; max-width: 100%; height: auto; max-height: 200px; object-fit: contain; margin: 8px 0; border: 1px solid #ccc; background-color: #eee; }');
    doc.write('.opsi-wrapper { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; column-gap: 24px; row-gap: 6px; margin-left: 35px; }');
    doc.write('.opsi-row { display: flex; align-items: flex-start; gap: 8px; font-family: "Times New Roman", serif; font-size: 12pt; line-height: 1.4; text-align: left; }');
    doc.write('.opsi-label { font-weight: bold; min-width: 20px; flex-shrink: 0; }');
    doc.write('.opsi-label::after { content: "."; }');
    doc.write('.opsi-img-print { max-width: 60px; max-height: 50px; display: inline-block; vertical-align: middle; margin-left: 8px; object-fit: contain; }');
    doc.write('.answer-lines { margin-top: 8px; margin-left: 35px; border: 1px dashed #bbb; height: 80px; border-radius: 4px; background-color: #fafafa; }');
    doc.write('.clearfix::after { content: ""; display: table; clear: both; }');
    doc.write('.ttd-section { display: none; }'); 

    doc.write('</style></head><body>');
    doc.write(sheet.innerHTML);
    doc.write('</body></html>');
    doc.close();

    setTimeout(function(){
        var imgs = doc.querySelectorAll('img');
        var loaded = 0, total = imgs.length;
        
        if(total === 0){
            iframe.contentWindow.focus(); iframe.contentWindow.print();
            setTimeout(function(){ document.body.removeChild(iframe); }, 3000); return;
        }
        
        imgs.forEach(function(img){
            if(img.complete){ loaded++; checkAll(); }
            else { img.onload = function(){ loaded++; checkAll(); }; img.onerror = function(){ loaded++; checkAll(); }; }
        });
        
        function checkAll(){
            if(loaded >= total){
                setTimeout(function(){
                    iframe.contentWindow.focus(); iframe.contentWindow.print();
                    setTimeout(function(){ document.body.removeChild(iframe); }, 3000);
                }, 500);
            }
        }
        setTimeout(function(){
            try{ iframe.contentWindow.focus(); iframe.contentWindow.print(); } catch(e){}
            setTimeout(function(){ try{ document.body.removeChild(iframe); }catch(e){} }, 3000);
        }, 5000);
    }, 300);
}

function refreshPrintPreview(){
    var mapelEl = document.getElementById('pMapelPrint');
    var kelasEl = document.getElementById('pKelasPrint');
    if(!mapelEl || !kelasEl) return;
    var mapel = mapelEl.value, kelas = kelasEl.value;
    var container = document.getElementById('printPreviewContainer');
    if(!mapel || !kelas){ container.innerHTML='<p class="text-center text-muted py-20">Pilih mapel dan kelas terlebih dahulu</p>'; return; }

    var globalTP = (document.getElementById('printTPGlobal').value || '').trim();
    
    var dataSource = (currentEditType === 'paj') ? pajQuestions : questions;
    
    var data = dataSource.filter(function(q){ return q.mapel===mapel && q.kelas===kelas; });
    var pg = data.filter(function(q){ return q.type==='pg'; });
    var uraian = data.filter(function(q){ return q.type==='uraian'; });
    var logoUrl = 'https://www.image2url.com/r2/default/images/1776680731558-aaedfd5c-6674-4989-a7a4-c15f6291acac.jpeg';

    var html = '<div class="print-preview-wrap"><div class="print-preview-sheet"><div class="print-page">';

    html += '<div class="kop-surat"><div class="kop-surat-row"><img src="'+logoUrl+'" alt="Logo"><div class="kop-text"><h1>Pemerintah Kabupaten Majalengka</h1><h1>Dinas Pendidikan</h1><h2>Korek Api Kecamatan Majalengka</h2></div></div><p class="kop-sub">Jl. KH. Abdul Halim No. 123, Kec. Majalengka, Kab. Majalengka 45411</p></div>';

    var examTitle = (currentEditType === 'paj') ? 'Penilaian Akhir Jenjang (PAJ)' : 'Sumatif Akhir Tahun';
    html += '<div class="ujian-title"><h3>'+examTitle+'</h3><p>'+getMapelName(mapel)+'</p></div>';

    html += '<div class="soal-header"><table><tr><td width="100">Nama</td><td width="12">:</td><td class="dot-cell"></td></tr><tr><td>Kelas</td><td>:</td><td>'+kelas+'</td></tr><tr><td>Hari / Tanggal</td><td>:</td><td class="dot-cell"></td></tr></table></div>';

    if(globalTP){
        html += '<div class="print-tp-section"><div class="print-tp-title">Tujuan Pembelajaran:</div><div class="print-tp-text">'+escHtml(globalTP)+'</div></div>';
    }

    if(pg.length > 0){
        html += '<div class="section-heading">I. Pilihan Ganda</div>';
        html += '<p class="petunjuk-soal">Pilihlah satu jawaban yang paling tepat!</p>';
        pg.forEach(function(q, i){
            html += '<div class="soal-item clearfix">'; // Added clearfix class
            html += '<div class="soal-num">'+(i+1)+'.</div>';
            html += '<div class="soal-text">'+escHtml(q.text)+'</div>';
            if(q.image) html += '<div style="margin-left:35px"><img src="'+q.image+'" class="soal-img-print"></div>';
            
            html += '<div class="opsi-wrapper">';
            (q.options||[]).forEach(function(opt, oi){
                var letter = getOptLetters(kelas)[oi]; 
                var optImg = (q.optionImages && q.optionImages[oi]) ? '<img src="'+q.optionImages[oi]+'" class="opsi-img-print">' : '';
                html += '<div class="opsi-row"><span class="opsi-label">'+letter+'</span><span>'+escHtml(opt)+'</span>'+optImg+'</div>';
            });
            html += '</div>'; 
            html += '</div>';
        });
    }

    if(uraian.length > 0){
        html += '<div class="section-heading" style="margin-top:30px">II. Uraian</div>';
        html += '<p class="petunjuk-soal">Jawablah pertanyaan berikut dengan jelas dan benar!</p>';
        uraian.forEach(function(q, i){
            html += '<div class="soal-item clearfix">'; // Added clearfix class
            html += '<div class="soal-num">'+(i+1)+'.</div>';
            html += '<div class="soal-text">'+escHtml(q.text)+'</div>';
            if(q.image) html += '<div style="margin-left:35px"><img src="'+q.image+'" class="soal-img-print"></div>';
            html += '<div class="answer-lines"></div></div>';
        });
    }

    html += '<div class="ttd-section"></div>';
    html += '</div></div></div>';
    container.innerHTML = html;
}
