</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:#0f1923;color:#e8ecf1;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#182538}::-webkit-scrollbar-thumb{background:#2a3f5f;border-radius:3px}
.login-bg{background:linear-gradient(135deg,#0f1923 0%,#1a2744 40%,#182538 100%);position:relative;overflow:hidden}
.login-bg::before{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(201,168,76,0.08) 0%,transparent 70%);top:-100px;right:-100px;border-radius:50%;animation:floatBlob 8s ease-in-out infinite}
.login-bg::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(6,182,212,0.06) 0%,transparent 70%);bottom:-50px;left:-50px;border-radius:50%;animation:floatBlob 10s ease-in-out infinite reverse}
@keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.1)}}
.glass{background:rgba(24,37,56,0.8);backdrop-filter:blur(20px);border:1px solid rgba(42,63,95,0.5)}
.sidebar{width:260px;min-height:100vh;background:linear-gradient(180deg,#1a2744 0%,#0f1923 100%);border-right:1px solid #2a3f5f;position:fixed;left:0;top:0;z-index:40;transition:transform .3s ease}
.main-content{margin-left:260px;transition:margin-left .3s ease}
.nav-item{padding:10px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:12px;font-size:14px;color:#7a8ba5;user-select:none}
.nav-item:hover{background:rgba(42,63,95,0.3);color:#e8ecf1}
.nav-item.active{background:rgba(201,168,76,0.1);border-left-color:#c9a84c;color:#c9a84c}
.btn-primary{background:linear-gradient(135deg,#c9a84c,#b8943f);color:#1a2744;font-weight:700;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:14px;font-family:'Source Sans 3',sans-serif}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(201,168,76,0.3)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:transparent;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 24px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:14px;font-family:'Source Sans 3',sans-serif}
.btn-secondary:hover{border-color:#c9a84c;color:#c9a84c}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:white;font-weight:600;padding:8px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:13px}
.btn-danger:hover{box-shadow:0 4px 12px rgba(239,68,68,0.3)}
.btn-info{background:linear-gradient(135deg,#06b6d4,#0891b2);color:white;font-weight:600;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:14px}
.btn-info:hover{box-shadow:0 4px 12px rgba(6,182,212,0.3)}
.input-field{background:#0f1923;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 14px;border-radius:8px;width:100%;font-size:14px;transition:border-color .2s}
.input-field:focus{outline:none;border-color:#c9a84c;box-shadow:0 0 0 2px rgba(201,168,76,0.15)}
.input-field::placeholder{color:#4a6080}
textarea.input-field{resize:vertical;min-height:80px;line-height:1.6}
.card{background:#182538;border:1px solid #2a3f5f;border-radius:12px;padding:24px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-success{background:rgba(34,197,94,0.15);color:#22c55e}
.badge-warning{background:rgba(245,158,11,0.15);color:#f59e0b}
.badge-info{background:rgba(6,182,212,0.15);color:#06b6d4}
.badge-danger{background:rgba(239,68,68,0.15);color:#ef4444}
.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:600;animation:slideIn .3s ease;max-width:420px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.toast-success{background:linear-gradient(135deg,#166534,#15803d);color:white;border:1px solid #22c55e}
.toast-error{background:linear-gradient(135deg,#7f1d1d,#991b1b);color:white;border:1px solid #ef4444}
.toast-info{background:linear-gradient(135deg,#164e63,#155e75);color:white;border:1px solid #06b6d4}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease}
.table-container{overflow-x:auto;border-radius:10px;border:1px solid #2a3f5f}
.table-container table{width:100%;border-collapse:collapse;font-size:13px}
.table-container th{background:#1a2744;color:#c9a84c;padding:12px 14px;text-align:left;font-weight:700;border-bottom:2px solid #2a3f5f}
.table-container td{padding:10px 14px;border-bottom:1px solid rgba(42,63,95,0.5);vertical-align:top}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-content{background:#182538;border:1px solid #2a3f5f;border-radius:16px;padding:32px;max-width:700px;width:100%;animation:fadeIn .3s ease;max-height:90vh;overflow-y:auto}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:35;display:none}
.sidebar-overlay.active{display:block}
@media(max-width:1023px){.sidebar{transform:translateX(-260px)}.sidebar.mobile-open{transform:translateX(0)}.main-content{margin-left:0!important}}
.stat-card{background:linear-gradient(135deg,#182538,#1f3050);border:1px solid #2a3f5f;border-radius:12px;padding:20px;text-align:center}
.stat-card .stat-num{font-size:32px;font-weight:900;color:#c9a84c;font-family:'Playfair Display',serif}
.stat-card .stat-label{font-size:12px;color:#7a8ba5;margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;background:rgba(42,63,95,0.5);color:#7a8ba5}
.field-error{color:#ef4444;font-size:11px;margin-top:4px;display:none}.field-error.show{display:block}
.img-preview{max-width:100%;max-height:150px;border-radius:6px;margin-top:8px;border:1px solid #2a3f5f}
.img-preview-small{max-width:60px;max-height:60px;border-radius:4px;border:1px solid #2a3f5f}
.loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:#c9a84c;animation:spin 1s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.upload-zone{border:2px dashed #2a3f5f;border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.upload-zone:hover,.upload-zone.drag-over{border-color:#c9a84c;background:rgba(201,168,76,0.05)}
.upload-zone.has-file{border-color:#22c55e;border-style:solid;background:rgba(34,197,94,0.05)}
.upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
.progress-bar-track{width:100%;height:8px;background:#0f1923;border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#c9a84c,#22c55e);border-radius:4px;transition:width .3s ease}
.preview-scroll{max-height:350px;overflow-y:auto;border-radius:8px;border:1px solid #2a3f5f}
.preview-scroll table{width:100%;border-collapse:collapse;font-size:12px}
.preview-scroll th{background:#1a2744;color:#c9a84c;padding:8px 10px;text-align:left;position:sticky;top:0;z-index:1;font-weight:700}
.preview-scroll td{padding:6px 10px;border-bottom:1px solid rgba(42,63,95,0.4);color:#e8ecf1}
.preview-scroll tr:hover td{background:rgba(42,63,95,0.2)}
.checkbox-custom{appearance:none;width:18px;height:18px;border:2px solid #2a3f5f;border-radius:4px;cursor:pointer;transition:all .2s;position:relative;flex-shrink:0}
.checkbox-custom:checked{background:#c9a84c;border-color:#c9a84c}
.checkbox-custom:checked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#1a2744;font-size:12px;font-weight:900}

/* ============================================= */
/* A4 PRINT STYLES - VERY PRECISE               */
/* ============================================= */
.a4-page{
    width:210mm;
    min-height:297mm;
    padding:18mm 20mm 20mm 20mm;
    background:white;
    color:#1a1a1a;
    font-family:'Times New Roman','Source Sans 3',serif;
    font-size:11pt;
    line-height:1.5;
    position:relative;
    box-sizing:border-box;
    margin:0 auto 24px auto;
    box-shadow:0 4px 24px rgba(0,0,0,0.4);
}

/* Kop Surat */
.kop-surat{
    display:flex;
    align-items:center;
    border-bottom:3px double #1a2744;
    padding-bottom:10px;
    margin-bottom:16px;
}
.kop-logo{
    width:72px;height:72px;
    border-radius:50%;
    object-fit:cover;
    border:2.5px solid #1a2744;
    flex-shrink:0;
    margin-right:14px;
}
.kop-text{
    flex:1;
    text-align:center;
}
.kop-text h1{
    font-family:'Times New Roman',serif;
    font-size:16pt;
    font-weight:900;
    color:#1a2744;
    letter-spacing:1.5px;
    text-transform:uppercase;
    margin:0;
    line-height:1.2;
}
.kop-text h2{
    font-family:'Times New Roman',serif;
    font-size:11pt;
    font-weight:700;
    color:#1a2744;
    margin:2px 0 0 0;
    letter-spacing:0.5px;
}
.kop-text p{
    font-size:9pt;
    color:#444;
    margin:3px 0 0 0;
    line-height:1.3;
}

/* Info Ujian */
.info-ujian{
    margin-bottom:14px;
    border:1.5px solid #1a2744;
    border-radius:4px;
    padding:8px 12px;
    background:#fafafa;
}
.info-ujian table{
    width:100%;
    border-collapse:collapse;
    font-size:10.5pt;
}
.info-ujian td{
    padding:2px 6px;
    vertical-align:top;
}
.info-ujian .lbl{
    font-weight:700;
    width:110px;
    color:#1a2744;
}
.info-ujian .val{
    color:#333;
}
.info-ujian .val-under{
    border-bottom:1px dotted #999;
    min-width:150px;
    display:inline-block;
}

/* Soal PG */
.soal-pg-item{
    margin-bottom:10px;
    page-break-inside:avoid;
}
.soal-pg-num{
    font-weight:700;
    margin-right:4px;
    color:#1a2744;
}
.soal-pg-text{
    display:inline;
    text-align:justify;
}
.soal-pg-img{
    max-width:80%;
    max-height:100px;
    display:block;
    margin:6px auto 6px 24px;
    border:1px solid #ddd;
}
.opsi-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:2px 24px;
    margin:4px 0 0 24px;
    font-size:10.5pt;
}
.opsi-grid.single-col{
    grid-template-columns:1fr;
}
.opsi-item{
    display:flex;
    align-items:flex-start;
    gap:4px;
    padding:1px 0;
}
.opsi-letter{
    font-weight:700;
    color:#1a2744;
    min-width:18px;
    flex-shrink:0;
}
.opsi-text{
    flex:1;
    text-align:justify;
}
.opsi-img{
    max-width:120px;
    max-height:50px;
    margin-left:4px;
    border:1px solid #ddd;
    vertical-align:middle;
}

/* Soal Uraian */
.soal-uraian-item{
    margin-bottom:10px;
    page-break-inside:avoid;
}
.soal-uraian-num{
    font-weight:700;
    color:#1a2744;
}
.soal-uraian-text{
    display:inline;
    text-align:justify;
}
.soal-uraian-img{
    max-width:80%;
    max-height:100px;
    display:block;
    margin:6px auto 6px 24px;
    border:1px solid #ddd;
}
.garis-jawaban{
    border-bottom:1px dotted #ccc;
    height:28px;
    margin:4px 0 4px 24px;
}

/* Bagian Header */
.bagian-header{
    background:#1a2744;
    color:white;
    padding:6px 12px;
    font-weight:700;
    font-size:10.5pt;
    margin:14px 0 10px 0;
    border-radius:3px;
    letter-spacing:0.5px;
}
.bagian-header:first-of-type{margin-top:0;}

/* Footer Halaman */
.page-footer{
    position:absolute;
    bottom:12mm;
    left:20mm;
    right:20mm;
    text-align:center;
    font-size:8pt;
    color:#999;
    border-top:0.5px solid #ddd;
    padding-top:4px;
}

/* Kisi-Kisi Table */
.kisi-table{
    width:100%;
    border-collapse:collapse;
    font-size:9.5pt;
    margin-top:8px;
}
.kisi-table th{
    background:#1a2744;
    color:white;
    padding:6px 5px;
    text-align:center;
    font-weight:700;
    border:1px solid #1a2744;
    font-size:9pt;
}
.kisi-table td{
    padding:5px;
    border:1px solid #999;
    vertical-align:top;
    text-align:left;
    font-size:9pt;
    line-height:1.35;
}
.kisi-table tr:nth-child(even) td{background:#f8f8f8;}
.kisi-table td:nth-child(1),
.kisi-table td:nth-child(5),
.kisi-table td:nth-child(6){text-align:center;}

/* Kunci Jawaban */
.kunci-table{
    width:100%;
    border-collapse:collapse;
    font-size:10pt;
    margin-top:8px;
}
.kunci-table th{
    background:#1a2744;
    color:white;
    padding:7px 8px;
    text-align:center;
    font-weight:700;
    border:1px solid #1a2744;
}
.kunci-table td{
    padding:6px 8px;
    border:1px solid #999;
    text-align:center;
    vertical-align:middle;
}
.kunci-table tr:nth-child(even) td{background:#f8f8f8;}
.kunci-table td.kunci-jawaban{font-weight:900;color:#1a2744;font-size:11pt;}
.kunci-table td.kunci-uraian{text-align:left;font-size:9pt;line-height:1.3;max-width:250px;}
.kunci-uraian-wrap{max-height:60px;overflow:hidden;text-overflow:ellipsis;}

/* Petunjuk */
.petunjuk-box{
    border:1px solid #1a2744;
    border-radius:3px;
    padding:8px 12px;
    margin-bottom:12px;
    background:#fafafa;
    font-size:10pt;
    line-height:1.6;
}
.petunjuk-box ol{
    margin:0;
    padding-left:20px;
}
.petunjuk-box li{
    margin-bottom:2px;
}

/* Print-specific overrides */
@media print{
    body{background:white!important;}
    .a4-page{box-shadow:none;margin:0;padding:15mm 18mm 18mm 18mm;}
    .no-print{display:none!important;}
    .page-break-before{page-break-before:always;}
}
</style>
</head>

<div id="printArea" style="position:fixed;left:-9999px;top:0;z-index:-1;"></div>
<div id="modalOverlay" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()"><div class="modal-content" id="modalBody"></div></div>

<script>
const firebaseConfig={apiKey:"AIzaSyC0Hs7SUgPAeQ_JaotHUJL5m6nIhCRif-8",authDomain:"pembuatan-soal.firebaseapp.com",projectId:"pembuatan-soal",storageBucket:"pembuatan-soal.firebasestorage.app",messagingSenderId:"56200686194",appId:"1:56200686194:web:eb2de00c9d152d87bcf0eb",measurementId:"G-5V2CLKCE5J"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore(),storage=firebase.storage();

const MAPEL_LIST=[{id:'ppkn',nama:'Pendidikan Pancasila',singkat:'PPKn'},{id:'mat',nama:'Matematika',singkat:'Mat'},{id:'bin',nama:'Bahasa Indonesia',singkat:'B.Indo'},{id:'sbd',nama:'Seni Budaya',singkat:'Seni'},{id:'ipas',nama:'IPAS',singkat:'IPAS'},{id:'bsd',nama:'Bahasa Sunda',singkat:'B.Sunda'},{id:'bing',nama:'Bahasa Inggris',singkat:'B.Inggris'},{id:'pai',nama:'PAI',singkat:'PAI'},{id:'pjok',nama:'PJOK',singkat:'PJOK'}];
const KELAS_LIST=['Kelas 1','Kelas 2','Kelas 3','Kelas 4','Kelas 5','Kelas 6'];
const LOGO_URL='https://www.image2url.com/r2/default/images/1776680731558-aaedfd5c-6674-4989-a7a4-c15f6291acac.jpeg';

function getMaxOpt(k){const n=parseInt((k||'').replace('Kelas ',''))||0;return n<=2?3:4;}
function getOptLetters(k){return['A','B','C','D'].slice(0,getMaxOpt(k));}
function getMapelName(id){return MAPEL_LIST.find(m=>m.id===id)?.nama||id||'-';}
function getMapelSingkat(id){return MAPEL_LIST.find(m=>m.id===id)?.singkat||id||'-';}
function escHtml(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}
function makeMapelOpt(s){return currentUser.isAdmin?MAPEL_LIST.map(m=>`<option value="${m.id}"${m.id===s?' selected':''}>${m.nama}</option>`).join(''):`<option value="${currentUser.mapel}" selected>${getMapelName(currentUser.mapel)}</option>`;}
function makeKelasOpt(s){return currentUser.isAdmin?KELAS_LIST.map(k=>`<option value="${k}"${k===s?' selected':''}>${k}</option>`).join(''):`<option value="${currentUser.kelas}" selected>${currentUser.kelas}</option>`;}

let currentUser=null,questions=[],tujuanPembelajaran=[],accounts=[],currentEditId=null,currentEditTPId=null,unsubQ=null,unsubTP=null;
let importParsedData=null,importSelectedIds=new Set(),window._importFile=null,window._currentPage='dashboard';

function showToast(m,t='success'){const c=document.getElementById('toastContainer'),e=document.createElement('div');e.className=`toast toast-${t}`;e.innerHTML=`<i class="fas fa-${t==='success'?'check':t==='error'?'times':'info'}-circle flex-shrink-0"></i><span>${m}</span>`;c.appendChild(e);setTimeout(()=>{e.style.animation='slideOut .3s ease forwards';setTimeout(()=>e.remove(),300);},3500);}
function closeModal(){document.getElementById('modalOverlay').classList.add('hidden');document.getElementById('modalBody').innerHTML='';}
function openModal(h){document.getElementById('modalOverlay').classList.remove('hidden');document.getElementById('modalBody').innerHTML=h;}
function togglePassVis(){const p=document.getElementById('loginPass'),e=document.getElementById('passEye');if(p.type==='password'){p.type='text';e.className='fas fa-eye-slash text-sm';}else{p.type='password';e.className='fas fa-eye text-sm';}}
function closeSidebar(){document.getElementById('sidebar').classList.remove('mobile-open');document.getElementById('sidebarOverlay').classList.remove('active');}
function toggleSidebar(){const s=document.getElementById('sidebar'),o=document.getElementById('sidebarOverlay');s.classList.toggle('mobile-open');o.classList.toggle('active',s.classList.contains('mobile-open'));}

// ================================================================
// FIREBASE
// ================================================================
async function initApp(){
    const s=await db.collection('accounts').limit(1).get();
    if(s.empty){showToast('Inisialisasi...','info');const b=db.batch();b.set(db.collection('accounts').doc('admin'),{mapel:'admin',kelas:'Semua',password:'admin123'});MAPEL_LIST.forEach(m=>KELAS_LIST.forEach(k=>b.set(db.collection('accounts').doc(`${m.id}_${k.replace(' ','')}`),{mapel:m.id,kelas:k,password:'guru123'})));await b.commit();showToast('Akun default dibuat!','success');}
    db.collection('accounts').onSnapshot(sn=>{accounts=sn.docs.map(d=>({id:d.id,...d.data()}));populateLogin();});
}
function populateLogin(){
    const sel=document.getElementById('loginMapel');sel.innerHTML='<option value="">-- Pilih Mata Pelajaran --</option><option value="admin">Admin (Semua Akses)</option>'+MAPEL_LIST.map(m=>`<option value="${m.id}">${m.nama}</option>`).join('');
    sel.onchange=function(){const ks=document.getElementById('loginKelas');document.getElementById('loginError').classList.remove('show');if(this.value==='admin'){ks.innerHTML='<option value="Semua">Semua Kelas</option>';ks.disabled=false;}else if(this.value){ks.disabled=false;ks.innerHTML='<option value="">-- Pilih Kelas --</option>'+KELAS_LIST.map(k=>`<option value="${k}">${k}</option>`).join('');}else{ks.innerHTML='<option value="">-- Pilih Kelas --</option>';ks.disabled=true;}};
    sel.disabled=false;
}
function doLogin(){
    const m=document.getElementById('loginMapel').value,k=document.getElementById('loginKelas').value,p=document.getElementById('loginPass').value,er=document.getElementById('loginError');
    if(!m){er.textContent='Pilih mapel';er.classList.add('show');return;}if(!k){er.textContent='Pilih kelas';er.classList.add('show');return;}if(!p){er.textContent='Masukkan password';er.classList.add('show');return;}
    const a=accounts.find(x=>x.mapel===m&&x.kelas===k&&x.password===p);
    if(!a){er.textContent='Password salah';er.classList.add('show');return;}
    currentUser={mapel:a.mapel,kelas:a.kelas,isAdmin:a.mapel==='admin'};
    document.getElementById('loginPage').classList.add('hidden');document.getElementById('mainPage').classList.remove('hidden');initMain();showToast('Selamat datang, '+(currentUser.isAdmin?'Admin':getMapelName(currentUser.mapel)));
}
function doLogout(){currentUser=null;currentEditId=null;importParsedData=null;importSelectedIds.clear();if(unsubQ)unsubQ();if(unsubTP)unsubTP();document.getElementById('mainPage').classList.add('hidden');document.getElementById('loginPage').classList.remove('hidden');document.getElementById('loginPass').value='';closeSidebar();}
function initMain(){
    document.getElementById('sidebarUser').textContent=currentUser.isAdmin?'Administrator':getMapelName(currentUser.mapel);
    document.getElementById('sidebarRole').textContent=currentUser.isAdmin?'Akses Semua':currentUser.kelas;
    document.getElementById('topbarInfo').innerHTML=currentUser.isAdmin?'<i class="fas fa-crown mr-1" style="color:#c9a84c"></i>Admin':`<i class="fas fa-graduation-cap mr-1"></i>${getMapelSingkat(currentUser.mapel)} - ${currentUser.kelas}`;
    document.querySelector('.nav-item[data-page="manage"]').style.display=currentUser.isAdmin?'flex':'none';
    let qr=db.collection('questions');if(!currentUser.isAdmin)qr=qr.where('mapel','==',currentUser.mapel).where('kelas','==',currentUser.kelas);
    unsubQ=qr.onSnapshot(sn=>{questions=sn.docs.map(d=>({id:d.id,...d.data()}));navigateTo(window._currentPage);});
    let tr=db.collection('tps');if(!currentUser.isAdmin)tr=tr.where('mapel','==',currentUser.mapel).where('kelas','==',currentUser.kelas);
    unsubTP=tr.onSnapshot(sn=>{tujuanPembelajaran=sn.docs.map(d=>({id:d.id,...d.data()}));});
}

// ================================================================
// NAVIGASI
// ================================================================
function navigateTo(p){
    window._currentPage=p;
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    const t=document.querySelector(`.nav-item[data-page="${p}"]`);if(t)t.classList.add('active');
    const tl={dashboard:'Dashboard',tp:'Data TP',create:'Buat Soal',questions:'Bank Soal',import:'Import JSON',export:'Export JSON',print:'Cetak Soal (A4)',kisi:'Kisi-Kisi (A4)',scoring:'Kunci & Skor (A4)',manage:'Kelola Akun'};
    document.getElementById('pageTitle').textContent=tl[p]||p;closeSidebar();
    const c=document.getElementById('pageContent');
    switch(p){case'dashboard':rDash(c);break;case'tp':rTP(c);break;case'create':rCreate(c);break;case'questions':rQ(c);break;case'import':rImport(c);break;case'export':rExport(c);break;case'print':rPrint(c);break;case'kisi':rKisi(c);break;case'scoring':rScoring(c);break;case'manage':rManage(c);break;}
}
document.getElementById('sidebarNav').addEventListener('click',e=>{const i=e.target.closest('.nav-item');if(i)navigateTo(i.dataset.page);});

// ================================================================
// DASHBOARD
// ================================================================
function rDash(c){
    const bt={pg:0,uraian:0},bd={Mudah:0,Sedang:0,Sulit:0},ts=questions.reduce((s,q)=>s+(q.score||0),0);
    questions.forEach(q=>{bt[q.type==='pg'?'pg':'uraian']++;bd[q.difficulty]=(bd[q.difficulty]||0)+1;});
    c.innerHTML=`<div class="fade-in"><div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
    <div class="stat-card"><div class="stat-num">${questions.length}</div><div class="stat-label">Total Soal</div></div>
    <div class="stat-card"><div class="stat-num">${tujuanPembelajaran.length}</div><div class="stat-label">Data TP</div></div>
    <div class="stat-card"><div class="stat-num">${bt.pg}</div><div class="stat-label">Pilihan Ganda</div></div>
    <div class="stat-card"><div class="stat-num">${bt.uraian}</div><div class="stat-label">Uraian</div></div>
    <div class="stat-card"><div class="stat-num">${ts}</div><div class="stat-label">Total Skor</div></div></div>
    <div class="grid md:grid-cols-3 gap-4">
    <div class="card cursor-pointer hover:border-kopAccent transition-colors" onclick="navigateTo('print')"><div class="flex items-center gap-3 mb-2"><div class="w-10 h-10 rounded-lg bg-kopAccent/20 flex items-center justify-center"><i class="fas fa-print text-kopAccent"></i></div><h4 class="font-bold text-light">Cetak Soal A4</h4></div><p class="text-xs text-muted">Cetak soal rapi dengan kop surat profesional format PDF A4.</p></div>
    <div class="card cursor-pointer hover:border-kopAccent transition-colors" onclick="navigateTo('import')"><div class="flex items-center gap-3 mb-2"><div class="w-10 h-10 rounded-lg bg-info/20 flex items-center justify-center"><i class="fas fa-file-import text-info"></i></div><h4 class="font-bold text-light">Import JSON</h4></div><p class="text-xs text-muted">Upload soal dalam jumlah besar sekaligus ke cloud.</p></div>
    <div class="card cursor-pointer hover:border-kopAccent transition-colors" onclick="navigateTo('create')"><div class="flex items-center gap-3 mb-2"><div class="w-10 h-10 rounded-lg bg-success/20 flex items-center justify-center"><i class="fas fa-plus-circle text-success"></i></div><h4 class="font-bold text-light">Input Manual</h4></div><p class="text-xs text-muted">Tambah soal satu per satu dengan form lengkap.</p></div>
    </div></div>`;
}

// ================================================================
// TP
// ================================================================
function rTP(c){currentEditTPId=null;c.innerHTML=`<div class="fade-in"><div class="card mb-6"><h3 class="font-display text-lg font-bold text-light mb-4"><i class="fas fa-bullseye text-kopAccent mr-2"></i>Tambah TP</h3><div class="grid md:grid-cols-2 gap-4 mb-4"><div><label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Mapel</label><select id="tpMapel" class="input-field">${makeMapelOpt(currentUser.mapel)}</select></div><div><label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Kelas</label><select id="tpKelas" class="input-field">${makeKelasOpt(currentUser.kelas)}</select></div></div><div class="mb-4"><label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Teks TP</label><textarea id="tpText" class="input-field" rows="2"></textarea></div><button onclick="saveTP()" class="btn-primary"><i class="fas fa-save mr-1"></i>Simpan</button></div><div class="card"><h3 class="font-display text-lg font-bold text-light mb-4">Daftar TP (${tujuanPembelajaran.length})</h3><div id="tpList"></div></div></div>`;rTPList();}
function rTPList(){const el=document.getElementById('tpList');if(!el)return;if(!tujuanPembelajaran.length)el.innerHTML='<p class="text-muted text-center py-4">Kosong</p>';else el.innerHTML=`<div class="space-y-2">${tujuanPembelajaran.map(t=>`<div class="flex justify-between items-center p-3 bg-dark/30 rounded-lg"><div class="flex-1 min-w-0 mr-3"><span class="tag">${getMapelSingkat(t.mapel)}</span><span class="text-sm ml-2">${escHtml(t.text)}</span></div><div class="flex gap-1 flex-shrink-0"><button onclick="editTP('${t.id}')" class="btn-secondary text-xs py-1 px-2"><i class="fas fa-pen"></i></button><button onclick="deleteTP('${t.id}')" class="btn-danger text-xs py-1 px-2"><i class="fas fa-trash"></i></button></div></div>`).join('')}</div>`;}
async function saveTP(){const id=currentEditTPId||db.collection('tps').doc().id,d={mapel:document.getElementById('tpMapel').value,kelas:document.getElementById('tpKelas').value,text:document.getElementById('tpText').value.trim()};if(!d.text){showToast('Kosong','error');return;}try{if(currentEditTPId)await db.collection('tps').doc(id).update(d);else await db.collection('tps').doc(id).set(d);showToast('TP disimpan');document.getElementById('tpText').value='';currentEditTPId=null;}catch(e){showToast('Gagal','error');}}
function editTP(id){const t=tujuanPembelajaran.find(x=>x.id===id);if(!t)return;currentEditTPId=id;document.getElementById('tpMapel').value=t.mapel;document.getElementById('tpKelas').value=t.kelas;document.getElementById('tpText').value=t.text;}
async function deleteTP(id){if(!confirm('Hapus?'))return;try{await db.collection('tps').doc(id).delete();showToast('Dihapus');}catch(e){showToast('Gagal','error');}}

// ================================================================
// CREATE SOAL
// ================================================================
function rCreate(c){currentEditId=null;c.innerHTML=`<div class="fade-in"><div class="card max-w-4xl mx-auto"><h3 class="font-display text-lg font-bold text-light mb-4">Input Soal Baru</h3><div class="grid md:grid-cols-2 gap-4 mb-4"><div><label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Mapel</label><select id="cMapel" class="input-field" onchange="updTPDD()">${makeMapelOpt(currentUser.mapel)}</select></div><div><label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Kelas</label><select id="cKelas" class="input-field" onchange="onCKC();updTPDD()">${makeKelasOpt(currentUser.kelas)}</select></div></div><div class="grid md:grid-cols-3 gap-4 mb-4"><div><label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Tipe</label><select id="cType" class="input-field" onchange="togOpt()"><option value="pg">Pilihan Ganda</option><option value="uraian">Uraian</option></select></div><div><label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Kesulitan</label><select id="cDiff" class="input-field"><option>Mudah</option><option selected>Sedang</option><option>Sulit</option></select></div><div><label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Skor</label><input type="number" id="cScore" class="input-field" value="1"></div></div><div class="mb-4"><label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">TP</label><select id="cTPS" class="input-field mb-2"><option value="">-- Pilih TP --</option></select><textarea id="cTPM" class="input-field" rows="2" placeholder="Atau tulis manual..."></textarea></div><div class="mb-4"><label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Teks Soal</label><textarea id="cText" class="input-field" rows="3"></textarea><input type="file" id="cImgQ" accept="image/*" class="hidden" onchange="hQI(this)"><button onclick="document.getElementById('cImgQ').click()" class="btn-secondary text-xs mt-2"><i class="fas fa-image mr-1"></i>Upload Gambar</button><div id="cIQP" class="mt-2"></div></div><div id="optArea" class="mb-4"></div><div class="mb-4"><label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Kunci</label><div class="flex gap-2"><select id="cAnsS" class="input-field" style="width:80px"><option value="">--</option></select><input type="text" id="cAns" class="input-field" placeholder="Jawaban"></div></div><button onclick="saveSQ()" class="btn-primary w-full"><i class="fas fa-save mr-1"></i>Simpan ke Cloud</button></div></div>`;onCKC();updTPDD();document.getElementById('cTPS').onchange=function(){document.getElementById('cTPM').value=this.value;};}
function updTPDD(){const m=document.getElementById('cMapel')?.value,k=document.getElementById('cKelas')?.value;if(!m||!k)return;const s=document.getElementById('cTPS');if(!s)return;const r=tujuanPembelajaran.filter(t=>t.mapel===m&&t.kelas===k);s.innerHTML=`<option value="">-- Pilih TP (${r.length}) --</option>`+r.map(t=>`<option value="${escHtml(t.text)}">${escHtml(t.text.substring(0,60))}</option>`).join('');}
function hQI(i){const f=i.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{document.getElementById('cIQP').innerHTML=`<img src="${e.target.result}" class="img-preview">`;};r.readAsDataURL(f);}
function onCKC(){const k=document.getElementById('cKelas')?.value;if(!k)return;const l=getOptLetters(k),a=document.getElementById('optArea');if(!a)return;a.innerHTML=`<label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Pilihan Jawaban</label><div class="space-y-3">${l.map(x=>`<div class="flex gap-2 items-center"><span class="font-bold text-kopAccent w-5">${x}.</span><input type="text" id="cO${x}" class="input-field flex-1"><input type="file" id="cOI${x}" accept="image/*" class="hidden" onchange="hOI(this,'${x}')"><button onclick="document.getElementById('cOI${x}').click()" class="btn-secondary text-xs py-1"><i class="fas fa-image"></i></button></div><div id="cOIP${x}" class="ml-6 mb-2"></div>`).join('')}</div>`;const s=document.getElementById('cAnsS');if(s){s.innerHTML='<option value="">--</option>'+l.map(x=>`<option value="${x}">${x}</option>`).join('');s.onchange=function(){document.getElementById('cAns').value=this.value;};}}
function hOI(i,l){const f=i.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{document.getElementById('cOIP'+l).innerHTML=`<img src="${e.target.result}" class="img-preview-small">`;};r.readAsDataURL(f);}
function togOpt(){const t=document.getElementById('cType').value,a=document.getElementById('optArea');if(a)a.style.display=t==='pg'?'block':'none';}
async function saveSQ(){const btn=document.querySelector('button[onclick="saveSQ()"]');btn.disabled=true;btn.innerHTML='<span class="loading-spinner mr-2"></span>Menyimpan...';const m=document.getElementById('cMapel').value,k=document.getElementById('cKelas').value,tp=document.getElementById('cType').value,tx=document.getElementById('cText').value.trim(),tpv=document.getElementById('cTPM').value||document.getElementById('cTPS').value;if(!tx){showToast('Soal kosong','error');btn.disabled=false;btn.innerHTML='Simpan';return;}try{let d={mapel:m,kelas:k,type:tp,text:tx,tp:tpv,difficulty:document.getElementById('cDiff').value,score:parseInt(document.getElementById('cScore').value)||1,cognitive:'C2',answer:document.getElementById('cAns').value.trim(),options:[],optionImages:[],image:'',createdAt:firebase.firestore.FieldValue.serverTimestamp()};const qf=document.getElementById('cImgQ').files[0];if(qf){const r=storage.ref(`soal/${Date.now()}_${qf.name}`);await r.put(qf);d.image=await r.getDownloadURL();}if(tp==='pg'){const ls=getOptLetters(k);for(let l of ls){d.options.push(document.getElementById('cO'+l).value.trim());const of_=document.getElementById('cOI'+l).files[0];if(of_){const r=storage.ref(`soal/${Date.now()}_${l}_${of_.name}`);await r.put(of_);d.optionImages.push(await r.getDownloadURL());}else d.optionImages.push('');}}if(currentEditId)await db.collection('questions').doc(currentEditId).update(d);else await db.collection('questions').add(d);showToast('Disimpan!');currentEditId=null;navigateTo('questions');}catch(e){showToast('Error: '+e.message,'error');}btn.disabled=false;btn.innerHTML='Simpan';}

// ================================================================
// BANK SOAL
// ================================================================

function rQL(){const el=document.getElementById('qList');if(!el)return;if(!questions.length)el.innerHTML='<div class="text-center py-12"><i class="fas fa-inbox text-4xl text-border mb-3"></i><p class="text-muted">Belum ada soal.</p></div>';else el.innerHTML=`<div class="space-y-2">${questions.map(q=>`<div class="p-3 bg-dark/30 rounded-lg flex justify-between items-start gap-3"><div class="flex-1 min-w-0"><div class="flex items-center gap-2 mb-1"><span class="badge ${q.type==='pg'?'badge-info':'badge-success'}">${q.type==='pg'?'PG':'Uraian'}</span><span class="badge ${q.difficulty==='Mudah'?'badge-success':q.difficulty==='Sulit'?'badge-danger':'badge-warning'}">${q.difficulty||'-'}</span><span class="tag">${q.score||1}pt</span></div><p class="text-sm text-light">${escHtml(q.text.substring(0,80))}${q.text.length>80?'...':''}</p></div><div class="flex gap-1 flex-shrink-0"><button onclick="editQ('${q.id}')" class="btn-secondary text-xs py-1 px-2"><i class="fas fa-pen"></i></button><button onclick="delQ('${q.id}')" class="btn-danger text-xs py-1 px-2"><i class="fas fa-trash"></i></button></div></div>`).join('')}</div>`;}

ss="font-display text-lg font-bold text-light">Preview</h3><p id="prevStats" class="text-xs text-muted mt-1"></p></div><label class="flex items-center gap-2 cursor-pointer text-sm"><input type="checkbox" id="selAllC" class="checkbox-custom" onchange="togSelAll()"><span>Pilih Semua</span></label></div><div id="prevTbl" class="preview-scroll"></div></div><div id="impProgW" class="hidden card mb-4"><div class="flex items-center justify-between mb-2"><span class="text-sm font-semibold text-light">Mengunggah...</span><span id="impProgT" class="text-sm text-kopAccent font-bold">0%</span></div><div class="progress-bar-track"><div id="impProgB" class="progress-bar-fill" style="width:0%"></div></div><p id="impProgD" class="text-xs text-muted mt-2"></p></div><div id="impActW" class="flex gap-3"><button onclick="execImp()" id="impBtn" class="btn-primary flex-1 text-base py-3"><i class="fas fa-cloud-upload-alt mr-2"></i>Import <span id="impCnt">0</span> Soal</button><button onclick="navigateTo('import')" class="btn-secondary"><i class="fas fa-redo mr-1"></i>Reset</button></div></div></div>`;}
function procIF(f){if(!f.name.endsWith('.json')&&f.type!=='application/json'){showToast('Hanya .json','error');return;}document.getElementById('fName').textContent=f.name;document.getElementById('fSize').textContent=(f.size/1024).toFixed(1)+' KB';document.getElementById('fInfo').classList.remove('hidden');document.getElementById('impSet').classList.remove('hidden');document.getElementById('parseWrap').classList.remove('hidden');document.getElementById('uploadZone').classList.add('has-file');document.getElementById('uzContent').innerHTML=`<i class="fas fa-check-circle text-4xl text-success mb-2"></i><p class="text-success font-semibold">${escHtml(f.name)}</p>`;window._importFile=f;}
function clrIF(){window._importFile=null;importParsedData=null;importSelectedIds.clear();['fInfo','impSet','parseWrap','impPreview'].forEach(id=>document.getElementById(id)?.classList.add('hidden'));document.getElementById('uploadZone').classList.remove('has-file');document.getElementById('uzContent').innerHTML=`<i class="fas fa-cloud-upload-alt text-4xl text-border mb-3"></i><p class="text-light font-semibold mb-1">Seret & Lepas file JSON</p><p class="text-xs text-muted">atau klik untuk memilih</p>`;const fi=document.getElementById('jsonFI');if(fi)fi.value='';}
function parseIF(){if(!window._importFile)return;const r=new FileReader();r.onload=function(e){try{let raw=JSON.parse(e.target.result);if(!Array.isArray(raw)){const k=Object.keys(raw).find(k=>Array.isArray(raw[k]));if(k)raw=raw[k];else throw new Error('Bukan array');}if(!raw.length){showToast('Kosong','error');return;}const mp=document.getElementById('impMapel').value,kl=document.getElementById('impKelas').value;let inv=[];importParsedData=raw.map((it,i)=>{if(!it.text||typeof it.text!=='string'||!it.text.trim()){inv.push(i+1);return null;}const tp=(it.type||'pg').toLowerCase()==='uraian'?'uraian':'pg';return{_idx:i,type:tp,text:it.text.trim(),options:Array.isArray(it.options)?it.options.map(o=>String(o||'').trim()):[],optionImages:Array.isArray(it.optionImages)?it.optionImages:[],answer:String(it.answer||'').trim(),image:String(it.image||''),difficulty:['Mudah','Sedang','Sulit'].includes(it.difficulty)?it.difficulty:'Sedang',score:parseInt(it.score)||1,tp:String(it.tp||'').trim(),cognitive:it.cognitive||'C2',mapel:it.mapel||mp,kelas:it.kelas||kl};}).filter(Boolean);if(!importParsedData.length){showToast('Tidak ada soal valid','error');return;}importSelectedIds.clear();importParsedData.forEach(q=>importSelectedIds.add(q._idx));const pg=importParsedData.filter(q=>q.type==='pg').length,ur=importParsedData.filter(q=>q.type==='uraian').length;document.getElementById('prevStats').innerHTML=`<span class="badge badge-info mr-1">PG: ${pg}</span><span class="badge badge-success mr-1">Uraian: ${ur}</span>${inv.length?`<span class="badge badge-danger mr-1">${inv.length} dilewati</span>`:''}`;document.getElementById('impCnt').textContent=importParsedData.length;document.getElementById('selAllC').checked=true;let h=`<table><thead><tr><th style="width:40px"></th><th style="width:35px">No</th><th style="width:45px">Tipe</th><th>Soal</th><th style="width:70px">Kunci</th><th style="width:50px">Skor</th></tr></thead><tbody>`;importParsedData.forEach((q,i)=>{h+=`<tr><td><input type="checkbox" class="checkbox-custom ic" data-idx="${q._idx}" checked onchange="togSel(${q._idx})"></td><td class="text-center text-muted">${i+1}</td><td><span class="badge ${q.type==='pg'?'badge-info':'badge-success'}">${q.type==='pg'?'PG':'UR'}</span></td><td class="text-sm">${escHtml(q.text.substring(0,70))}${q.text.length>70?'...':''}</td><td class="font-bold text-kopAccent">${escHtml(q.answer)||'-'}</td><td class="text-center">${q.score}</td></tr>`;});h+=`</tbody></table>`;document.getElementById('prevTbl').innerHTML=h;document.getElementById('impPreview').classList.remove('hidden');document.getElementById('impProgW').classList.add('hidden');document.getElementById('impBtn').disabled=false;showToast(`${importParsedData.length} soal diparsing!`);}catch(err){showToast('Gagal parse: '+err.message,'error');}};r.readAsText(window._importFile);}
function togSelAll(){const c=document.getElementById('selAllC').checked;document.querySelectorAll('.ic').forEach(cb=>cb.checked=c);importSelectedIds.clear();if(c)importParsedData.forEach(q=>importSelectedIds.add(q._idx));document.getElementById('impCnt').textContent=importSelectedIds.size;document.getElementById('impBtn').disabled=!importSelectedIds.size;}
function togSel(i){if(importSelectedIds.has(i))importSelectedIds.delete(i);else importSelectedIds.add(i);document.getElementById('selAllC').checked=importSelectedIds.size===importParsedData.length;document.getElementById('impCnt').textContent=importSelectedIds.size;document.getElementById('impBtn').disabled=!importSelectedIds.size;}
async function execImp(){const sel=importParsedData.filter(q=>importSelectedIds.has(q._idx));if(!sel.length){showToast('Pilih soal','error');return;}const btn=document.getElementById('impBtn');btn.disabled=true;btn.innerHTML='<span class="loading-spinner mr-2"></span>Mengunggah...';document.getElementById('impProgW').classList.remove('hidden');const tot=sel.length;let ok=0,fail=0;for(let i=0;i<tot;i+=20){const b=db.batch(),ch=sel.slice(i,i+20);ch.forEach(q=>{b.set(db.collection('questions').doc(),{mapel:q.mapel,kelas:q.kelas,type:q.type,text:q.text,options:q.options,optionImages:q.optionImages,answer:q.answer,image:q.image,difficulty:q.difficulty,score:q.score,tp:q.tp,cognitive:q.cognitive,createdAt:firebase.firestore.FieldValue.serverTimestamp()});});try{await b.commit();ok+=ch.length;}catch(e){fail+=ch.length;}const p=Math.min(100,Math.round(((i+Math.min(20,tot-i))/tot)*100));document.getElementById('impProgB').style.width=p+'%';document.getElementById('impProgT').textContent=p+'%';document.getElementById('impProgD').textContent=`${Math.min(i+20,tot)} / ${tot}`;}document.getElementById('impProgB').style.width='100%';document.getElementById('impProgT').textContent='100%';btn.innerHTML='<i class="fas fa-check mr-2"></i>Selesai!';showToast(fail?`${ok} ok, ${fail} gagal`:`${ok} soal berhasil diimport!`,fail?'error':'success');document.getElementById('impProgD').textContent=`Selesai: ${ok} berhasil, ${fail} gagal.`;}

        pg2+=`<div class="bagian-header">BAGIAN II — SOAL URAIAN (Skor: ${urTotal})</div>`;
        pg2+=`<div class="petunjuk-box" style="margin-top:-6px"><strong>PETUNJUK:</strong><ol>
            <li>Jawablah soal berikut dengan jelas dan lengkap.</li>
            <li>Skor tertera di samping setiap soal.</li>
        </ol></div>`;

        urQ.forEach((q,i)=>{
            pg2+=`<div class="soal-uraian-item"><span class="soal-uraian-num">${i+1}.</span> <span class="soal-uraian-text">${escHtml(q.text)}</span> <span style="font-size:9pt;color:#888;">(${q.score||1} poin)</span>`;

            pg2+=`<div class="garis-jawaban"></div><div class="garis-jawaban"></div><div class="garis-jawaban"></div>`;
            pg2+=`</div>`;
        });

        pages.push({html:pg2,label:'Soal Uraian'});
    }

    return pages;
}

function previewSoalA4(){
    const data=getFilteredQ();
    if(!data.pgQ.length&&!data.urQ.length){showToast('Tidak ada soal untuk filter ini','error');return;}

    const cont=document.getElementById('printPreviewContainer');
    cont.innerHTML=pages.map((p,i)=>`<div style="margin-bottom:16px"><p class="text-xs text-muted mb-2 no-print">Halaman ${i+1}: ${p.label}</p><div class="a4-page">${p.html}</div></div>`).join('');

}

function generateSoalPDF(){
    const data=getFilteredQ();
    if(!data.pgQ.length&&!data.urQ.length){showToast('Tidak ada soal','error');return;}
    const pages=buildSoalA4HTML(data);
    const el=document.getElementById('printArea');
    el.innerHTML=pages.map(p=>`<div class="a4-page page-break-before">${p.html}</div>`).join('');
    el.style.left='0';el.style.top='0';el.style.zIndex='9999';el.style.background='white';
    el.style.position='fixed';el.style.right='0';el.style.bottom='0';el.style.overflow='auto';

    const opt={
        margin:[10,12,15,12],
        filename:`Soal_${getMapelSingkat(data.mapel)}_${data.kelas.replace(' ','')}_${new Date().toISOString().slice(0,10)}.pdf`,
        image:{type:'jpeg',quality:0.98},
        html2canvas:{scale:2,useCORS:true,letterRendering:true,logging:false},
        jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
        pagebreak:{mode:['css','legacy'],avoid:['.soal-pg-item','.soal-uraian-item','.opsi-grid','.info-ujian','.petunjuk-box','.bagian-header']}
    };

    html2pdf().set(opt).from(el).save().then(()=>{
        el.style.left='-9999px';el.style.zIndex='-1';el.innerHTML='';
        showToast('PDF berhasil di-generate!','success');
    }).catch(err=>{
        el.style.left='-9999px';el.style.zIndex='-1';

}
