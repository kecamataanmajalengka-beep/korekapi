<script>
// ================================================================
// FIREBASE CONFIG & INIT
// ================================================================
const firebaseConfig = {
  apiKey: "AIzaSyC0Hs7SUgPAeQ_JaotHUJL5m6nIhCRif-8",
  authDomain: "pembuatan-soal.firebaseapp.com",
  projectId: "pembuatan-soal",
  storageBucket: "pembuatan-soal.firebasestorage.app",
  messagingSenderId: "56200686194",
  appId: "1:56200686194:web:eb2de00c9d152d87bcf0eb",
  measurementId: "G-5V2CLKCE5J"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

const MAPEL_LIST=[
    {id:'ppkn',nama:'Pendidikan Pancasila',singkat:'PPKn'},
    {id:'mat',nama:'Matematika',singkat:'Mat'},
    {id:'bin',nama:'Bahasa Indonesia',singkat:'B.Indo'},
    {id:'sbd',nama:'Seni Budaya',singkat:'Seni'},
    {id:'ipas',nama:'IPAS',singkat:'IPAS'},
    {id:'bsd',nama:'Bahasa Sunda',singkat:'B.Sunda'},
    {id:'bing',nama:'Bahasa Inggris',singkat:'B.Inggris'},
    {id:'pai',nama:'PAI',singkat:'PAI'},
    {id:'pjok',nama:'PJOK',singkat:'PJOK'}
];
const KELAS_LIST=['Kelas 1','Kelas 2','Kelas 3','Kelas 4','Kelas 5','Kelas 6'];

function getMaxOpt(kelas){ const n=parseInt(kelas.replace('Kelas ',''))||0; return n<=2?3:4; }
function getOptLetters(kelas){ return ['A','B','C','D'].slice(0,getMaxOpt(kelas)); }

const COGNITIVE_LEVELS=['Mengingat (C1)','Memahami (C2)','Menerapkan (C3)','Menganalisis (C4)','Mengevaluasi (C5)','Mencipta (C6)'];

// STATE
let currentUser=null;
let questions=[];
let tujuanPembelajaran=[];
let accounts=[];
let currentEditId=null;
let currentEditTPId=null;
let unsubQ=null, unsubTP=null;

// State khusus import
let importParsedData=null;
let importSelectedIds=new Set();

// UTILS
function getMapelName(id){return MAPEL_LIST.find(m=>m.id===id)?.nama||id;}
function getMapelSingkat(id){return MAPEL_LIST.find(m=>m.id===id)?.singkat||id;}
function escHtml(s){if(!s)return '';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}
function shortCognitive(c){ if(!c)return '-'; const m={'Mengingat (C1)':'C1','Memahami (C2)':'C2','Menerapkan (C3)':'C3','Menganalisis (C4)':'C4','Mengevaluasi (C5)':'C5','Mencipta (C6)':'C6'}; return m[c]||c; }

function showToast(msg,type='success'){
    const c=document.getElementById('toastContainer');
    const t=document.createElement('div');
    t.className=`toast toast-${type}`;
    t.innerHTML=`<i class="fas fa-${type==='success'?'check':type==='error'?'times':'info'}-circle flex-shrink-0"></i><span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(()=>{t.style.animation='slideOut .3s ease forwards';setTimeout(()=>t.remove(),300);},3500);
}
function closeModal(){document.getElementById('modalOverlay').classList.add('hidden');document.getElementById('modalBody').innerHTML='';}
function openModal(html){document.getElementById('modalOverlay').classList.remove('hidden');document.getElementById('modalBody').innerHTML=html;}
function togglePassVis(){const p=document.getElementById('loginPass');const e=document.getElementById('passEye');if(p.type==='password'){p.type='text';e.className='fas fa-eye-slash text-sm';}else{p.type='password';e.className='fas fa-eye text-sm';}}

// ================================================================
// FIREBASE LOGIC
// ================================================================
async function initApp(){
    const accSnap = await db.collection('accounts').limit(1).get();
    if(accSnap.empty){
        showToast('Inisialisasi data awal...','info');
        const batch = db.batch();
        batch.set(db.collection('accounts').doc('admin'), {mapel:'admin', kelas:'Semua', password:'admin123'});
        MAPEL_LIST.forEach(m=>{
            KELAS_LIST.forEach(k=>{
                batch.set(db.collection('accounts').doc(`${m.id}_${k.replace(' ','')}`), {mapel:m.id, kelas:k, password:'guru123'});
            });
        });
        await batch.commit();
        showToast('Akun default dibuat!', 'success');
    }
    db.collection('accounts').onSnapshot(snap => {
        accounts = snap.docs.map(d => ({id:d.id, ...d.data()}));
        populateLoginDropdown();
    });
}

function populateLoginDropdown(){
    const sel=document.getElementById('loginMapel');
    sel.innerHTML='<option value="">-- Pilih Mata Pelajaran --</option>';
    sel.innerHTML+='<option value="admin">Admin (Semua Akses)</option>';
    MAPEL_LIST.forEach(m=>{sel.innerHTML+=`<option value="${m.id}">${m.nama}</option>`;});
    sel.onchange=function(){
        const ks=document.getElementById('loginKelas');
        document.getElementById('loginError').classList.remove('show');
        if(this.value==='admin'){ks.innerHTML='<option value="Semua">Semua Kelas</option>';ks.disabled=false;}
        else if(this.value){ks.disabled=false;ks.innerHTML='<option value="">-- Pilih Kelas --</option>';KELAS_LIST.forEach(k=>{ks.innerHTML+=`<option value="${k}">${k}</option>`;});}
        else{ks.innerHTML='<option value="">-- Pilih Kelas --</option>';ks.disabled=true;}
    };
    sel.disabled = false;
}

function doLogin(){
    const mapel=document.getElementById('loginMapel').value;
    const kelas=document.getElementById('loginKelas').value;
    const pass=document.getElementById('loginPass').value;
    const errEl=document.getElementById('loginError');
    if(!mapel){errEl.textContent='Pilih mata pelajaran';errEl.classList.add('show');return;}
    if(!kelas){errEl.textContent='Pilih kelas';errEl.classList.add('show');return;}
    if(!pass){errEl.textContent='Masukkan password';errEl.classList.add('show');return;}
    const acc = accounts.find(a => a.mapel === mapel && a.kelas === kelas && a.password === pass);
    if(!acc){errEl.textContent='Password salah';errEl.classList.add('show');return;}
    currentUser={mapel:acc.mapel,kelas:acc.kelas,isAdmin:acc.mapel==='admin'};
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('mainPage').classList.remove('hidden');
    initMainPage();
    showToast('Selamat datang, '+(currentUser.isAdmin?'Administrator':getMapelName(currentUser.mapel)));
}

function doLogout(){

    document.getElementById('loginPass').value='';

function initMainPage(){
    const un=currentUser.isAdmin?'Administrator':getMapelName(currentUser.mapel);
    document.getElementById('sidebarUser').textContent=un;
    document.getElementById('sidebarRole').textContent=currentUser.isAdmin?'Akses Semua':currentUser.kelas;
    document.getElementById('topbarInfo').innerHTML=currentUser.isAdmin?'<i class="fas fa-crown mr-1" style="color:#c9a84c"></i>Admin':`<i class="fas fa-graduation-cap mr-1"></i>${getMapelSingkat(currentUser.mapel)} - ${currentUser.kelas}`;
    document.querySelector('.nav-item[data-page="manage"]').style.display=currentUser.isAdmin?'flex':'none';

    let qRef = db.collection('questions');
    if(!currentUser.isAdmin) qRef = qRef.where('mapel','==',currentUser.mapel).where('kelas','==',currentUser.kelas);
    unsubQ = qRef.onSnapshot(snap => {
        questions = snap.docs.map(d => ({id:d.id, ...d.data()}));
        navigateTo(window._currentPage || 'dashboard');
    });

    let tpRef = db.collection('tps');
    if(!currentUser.isAdmin) tpRef = tpRef.where('mapel','==',currentUser.mapel).where('kelas','==',currentUser.kelas);
    unsubTP = tpRef.onSnapshot(snap => {
        tujuanPembelajaran = snap.docs.map(d => ({id:d.id, ...d.data()}));
    });
}

// ================================================================

// ================================================================
function navigateTo(page){
    window._currentPage = page;
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    const t=document.querySelector(`.nav-item[data-page="${page}"]`);
    if(t)t.classList.add('active');
    const titles={dashboard:'Dashboard',tp:'Data Tujuan Pembelajaran',create:'Buat Soal Baru',questions:'Bank Soal',import:'Import Soal JSON',export:'Export Soal JSON',print:'Cetak Soal SAT',kisi:'Kisi-Kisi Soal',scoring:'Kunci Jawaban & Penskoran',manage:'Kelola Akun'};
    document.getElementById('pageTitle').textContent=titles[page]||page;
    closeSidebar();
    const c=document.getElementById('pageContent');
    switch(page){
        case 'dashboard':renderDashboard(c);break;
        case 'tp':renderTP(c);break;
        case 'create':renderCreate(c);break;
        case 'questions':renderQuestions(c);break;
        case 'import':renderImport(c);break;
        case 'export':renderExport(c);break;
        case 'print':renderPrint(c);break;
        case 'kisi':renderKisi(c);break;
        case 'scoring':renderScoring(c);break;
        case 'manage':renderManage(c);break;
    }
}
document.getElementById('sidebarNav').addEventListener('click',e=>{const item=e.target.closest('.nav-item');if(item)navigateTo(item.dataset.page);});
function toggleSidebar(){const sb=document.getElementById('sidebar');const ov=document.getElementById('sidebarOverlay');sb.classList.toggle('mobile-open');ov.classList.toggle('active',sb.classList.contains('mobile-open'));}
function closeSidebar(){document.getElementById('sidebar').classList.remove('mobile-open');document.getElementById('sidebarOverlay').classList.remove('active');}

function handleOptImg(input,letter){ const file=input.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=function(e){ document.getElementById('cOptImgPrev'+letter).innerHTML=`<img src="${e.target.result}" class="img-preview-small">`; }; reader.readAsDataURL(file); }
function toggleOptions(){ const t=document.getElementById('cType').value; const a=document.getElementById('optionsArea'); if(a) a.style.display=t==='pg'?'block':'none'; }

async function saveSingleQuestion(){
    const btn=document.querySelector('button[onclick="saveSingleQuestion()"]'); btn.disabled=true; btn.innerHTML='<span class="loading-spinner mr-2"></span>Menyimpan...';
    const mapel=document.getElementById('cMapel').value; const kelas=document.getElementById('cKelas').value; const type=document.getElementById('cType').value; const text=document.getElementById('cText').value.trim();
    const tp=document.getElementById('cTPManual').value||document.getElementById('cTPSelect').value;
    if(!text){showToast('Soal kosong','error'); btn.disabled=false; btn.innerHTML='<i class="fas fa-save mr-1"></i>Simpan ke Cloud'; return;}
    try{
        let qData={mapel,kelas,type,text,tp,difficulty:document.getElementById('cDiff').value,score:parseInt(document.getElementById('cScore').value)||1,cognitive:'C2',answer:document.getElementById('cAnswer').value.trim(),options:[],optionImages:[],image:'',createdAt:firebase.firestore.FieldValue.serverTimestamp()};
        const qImgFile=document.getElementById('cImgQ').files[0];
        if(qImgFile){const ref=storage.ref(`soal/${Date.now()}_${qImgFile.name}`);await ref.put(qImgFile);qData.image=await ref.getDownloadURL();}
        if(type==='pg'){const letters=getOptLetters(kelas);for(let l of letters){qData.options.push(document.getElementById('cOpt'+l).value.trim());const of_=document.getElementById('cOptImg'+l).files[0];if(of_){const ref=storage.ref(`soal/${Date.now()}_${l}_${of_.name}`);await ref.put(of_);qData.optionImages.push(await ref.getDownloadURL());}else{qData.optionImages.push('');}}}
        if(currentEditId) await db.collection('questions').doc(currentEditId).update(qData); else await db.collection('questions').add(qData);
        showToast('Soal disimpan!'); currentEditId=null; navigateTo('questions');
    }catch(e){console.error(e);showToast('Error: '+e.message,'error');}
    btn.disabled=false; btn.innerHTML='<i class="fas fa-save mr-1"></i>Simpan ke Cloud';
}

                <p class="text-light font-semibold mb-1">Seret & Lepas file JSON di sini</p>
                <p class="text-xs text-muted">atau klik untuk memilih file</p>
            </div>
        </div>

        <!-- Info file yang dipilih -->
        <div id="fileInfo" class="hidden mt-4 p-3 bg-dark/30 rounded-lg flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-file-alt text-info text-lg"></i>
                <div>
                    <p id="fileName" class="text-sm font-semibold text-light"></p>
                    <p id="fileSize" class="text-xs text-muted"></p>
                </div>
            </div>
            <button onclick="clearImportFile()" class="btn-secondary text-xs py-1 px-3"><i class="fas fa-times mr-1"></i>Batal</button>
        </div>

        <!-- Pengaturan Massal -->
        <div id="importSettings" class="hidden mt-4 grid md:grid-cols-2 gap-4">
            <div>
                <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Mapel Massal <span class="text-warning">(jika tidak ada di JSON)</span></label>
                <select id="importMapel" class="input-field">${makeMapelOpt(currentUser.mapel)}</select>
            </div>
            <div>
                <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Kelas Massal <span class="text-warning">(jika tidak ada di JSON)</span></label>
                <select id="importKelas" class="input-field">${makeKelasOpt(currentUser.kelas)}</select>
            </div>
        </div>

        <!-- Tombol Parse -->
        <div id="parseBtnWrap" class="hidden mt-4 flex gap-3">
            <button onclick="parseImportFile()" class="btn-primary flex-1"><i class="fas fa-search-plus mr-2"></i>Parsing & Preview</button>
        </div>
    </div>

    <!-- Hasil Parsing & Preview -->
    <div id="importPreview" class="hidden">
        <div class="card mb-4">
            <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
                <div>
                    <h3 class="font-display text-lg font-bold text-light">Preview Soal</h3>
                    <p id="previewStats" class="text-xs text-muted mt-1"></p>
                </div>
                <div class="flex items-center gap-3">
                    <label class="flex items-center gap-2 cursor-pointer text-sm">
                        <input type="checkbox" id="selectAllCheck" class="checkbox-custom" onchange="toggleSelectAll()">
                        <span>Pilih Semua</span>
                    </label>
                </div>
            </div>
            <div id="previewTable" class="preview-scroll"></div>
        </div>

        <!-- Progress Area -->
        <div id="importProgressWrap" class="hidden card mb-4">
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-semibold text-light">Mengunggah ke Cloud...</span>
                <span id="importProgressText" class="text-sm text-kopAccent font-bold">0%</span>
            </div>
            <div class="progress-bar-track"><div id="importProgressBar" class="progress-bar-fill" style="width:0%"></div></div>
            <p id="importProgressDetail" class="text-xs text-muted mt-2"></p>
        </div>

        <!-- Tombol Konfirmasi -->
        <div id="importActionWrap" class="flex gap-3">
            <button onclick="executeImport()" id="importBtn" class="btn-primary flex-1 text-base py-3"><i class="fas fa-cloud-upload-alt mr-2"></i>Import <span id="importCount">0</span> Soal ke Cloud</button>
            <button onclick="navigateTo('import')" class="btn-secondary"><i class="fas fa-redo mr-1"></i>Reset</button>
        </div>
    </div>
    </div>`;
}

// --- Drag & Drop Handlers ---
function handleDragOver(e){e.preventDefault();e.stopPropagation();document.getElementById('uploadZone').classList.add('drag-over');}
function handleDragLeave(e){e.preventDefault();e.stopPropagation();document.getElementById('uploadZone').classList.remove('drag-over');}
function handleDrop(e){
    e.preventDefault();e.stopPropagation();
    document.getElementById('uploadZone').classList.remove('drag-over');
    const files=e.dataTransfer.files;
    if(files.length>0) processImportFile(files[0]);
}
function handleFileSelect(e){const files=e.target.files;if(files.length>0) processImportFile(files[0]);}

function processImportFile(file){
    if(!file.name.endsWith('.json')&&file.type!=='application/json'){
        showToast('Hanya file .json yang didukung','error');return;
    }
    if(file.size>10*1024*1024){showToast('File terlalu besar (maks 10MB)','error');return;}

    // Tampilkan info file
    document.getElementById('fileName').textContent=file.name;
    document.getElementById('fileSize').textContent=(file.size/1024).toFixed(1)+' KB';
    document.getElementById('fileInfo').classList.remove('hidden');
    document.getElementById('importSettings').classList.remove('hidden');
    document.getElementById('parseBtnWrap').classList.remove('hidden');
    document.getElementById('uploadZone').classList.add('has-file');
    document.getElementById('uploadZoneContent').innerHTML=`<i class="fas fa-check-circle text-4xl text-success mb-2"></i><p class="text-success font-semibold">${escHtml(file.name)}</p>`;

    // Simpan file untuk diparse nanti
    window._importFile=file;
}

function clearImportFile(){
    window._importFile=null; importParsedData=null; importSelectedIds.clear();
    document.getElementById('fileInfo').classList.add('hidden');
    document.getElementById('importSettings').classList.add('hidden');
    document.getElementById('parseBtnWrap').classList.add('hidden');
    document.getElementById('importPreview').classList.add('hidden');
    document.getElementById('uploadZone').classList.remove('has-file');
    document.getElementById('uploadZoneContent').innerHTML=`<i class="fas fa-cloud-upload-alt text-4xl text-border mb-3"></i><p class="text-light font-semibold mb-1">Seret & Lepas file JSON di sini</p><p class="text-xs text-muted">atau klik untuk memilih file</p>`;
    if(document.getElementById('jsonFileInput')) document.getElementById('jsonFileInput').value='';
}

function parseImportFile(){
    if(!window._importFile) return;
    const reader=new FileReader();
    reader.onload=function(e){
        try{
            let raw=JSON.parse(e.target.result);
            // Normalisasi: bisa berupa array langsung atau objek dengan key "soal"/"questions"/"data"
            if(!Array.isArray(raw)){
                const keys=Object.keys(raw);
                const arrKey=keys.find(k=>Array.isArray(raw[k]));
                if(arrKey) raw=raw[arrKey];
                else throw new Error('JSON harus berisi array soal');
            }
            if(raw.length===0){showToast('File JSON kosong','error');return;}

            // Validasi & normalisasi tiap soal
            const mapel=document.getElementById('importMapel').value;
            const kelas=document.getElementById('importKelas').value;
            let validCount=0, invalidItems=[];

            importParsedData=raw.map((item,idx)=>{
                if(!item.text||typeof item.text!=='string'||item.text.trim()===''){
                    invalidItems.push(idx+1); return null;
                }
                const type=(item.type||'pg').toLowerCase()==='uraian'?'uraian':'pg';
                const q={
                    _idx: idx,
                    type: type,
                    text: item.text.trim(),
                    options: Array.isArray(item.options)?item.options.map(o=>String(o||'').trim()):[],
                    optionImages: Array.isArray(item.optionImages)?item.optionImages:[],
                    answer: String(item.answer||'').trim(),
                    image: String(item.image||''),
                    difficulty: ['Mudah','Sedang','Sulit'].includes(item.difficulty)?item.difficulty:'Sedang',
                    score: parseInt(item.score)||1,
                    tp: String(item.tp||'').trim(),
                    cognitive: item.cognitive||'C2',
                    mapel: item.mapel||mapel,
                    kelas: item.kelas||kelas
                };
                validCount++;
                return q;
            }).filter(Boolean);

            if(importParsedData.length===0){showToast('Tidak ada soal valid ditemukan','error');return;}

            // Tampilkan preview
            importSelectedIds.clear();
            importParsedData.forEach(q=>importSelectedIds.add(q._idx));

            const pgCount=importParsedData.filter(q=>q.type==='pg').length;
            const uraianCount=importParsedData.filter(q=>q.type==='uraian').length;
            document.getElementById('previewStats').innerHTML=`<span class="badge badge-info mr-1">PG: ${pgCount}</span><span class="badge badge-success mr-1">Uraian: ${uraianCount}</span>${invalidItems.length>0?`<span class="badge badge-danger mr-1">${invalidItems.length} item dilewati (no: ${invalidItems.join(', ')})</span>`:''}`;
            document.getElementById('importCount').textContent=importParsedData.length;
            document.getElementById('selectAllCheck').checked=true;

            // Build preview table
            let tableHTML=`<table><thead><tr>
                <th style="width:40px"><i class="fas fa-check"></i></th>
                <th style="width:40px">No</th>
                <th style="width:50px">Tipe</th>
                <th>Teks Soal</th>
                <th style="width:80px">Kunci</th>
                <th style="width:70px">Skor</th>
                <th style="width:70px">Level</th>
            </tr></thead><tbody>`;
            importParsedData.forEach((q,i)=>{
                tableHTML+=`<tr>
                    <td><input type="checkbox" class="checkbox-custom import-check" data-idx="${q._idx}" checked onchange="toggleSelectItem(${q._idx})"></td>
                    <td class="text-center text-muted">${i+1}</td>
                    <td><span class="badge ${q.type==='pg'?'badge-info':'badge-success'}">${q.type==='pg'?'PG':'UR'}</span></td>
                    <td class="text-sm" title="${escHtml(q.text)}">${escHtml(q.text.substring(0,70))}${q.text.length>70?'...':''}</td>
                    <td class="font-bold text-kopAccent">${escHtml(q.answer)||'-'}</td>
                    <td class="text-center">${q.score}</td>
                    <td class="text-center"><span class="tag">${q.difficulty}</span></td>
                </tr>`;
            });
            tableHTML+=`</tbody></table>`;
            document.getElementById('previewTable').innerHTML=tableHTML;

            document.getElementById('importPreview').classList.remove('hidden');
            document.getElementById('importProgressWrap').classList.add('hidden');
            document.getElementById('importBtn').disabled=false;
            showToast(`${importParsedData.length} soal berhasil diparsing!`,'success');

        }catch(err){
            console.error(err);
            showToast('Gagal parse JSON: '+err.message,'error');
        }
    };
    reader.readAsText(window._importFile);
}

function toggleSelectAll(){
    const checked=document.getElementById('selectAllCheck').checked;
    document.querySelectorAll('.import-check').forEach(cb=>{cb.checked=checked;});
    importSelectedIds.clear();
    if(checked) importParsedData.forEach(q=>importSelectedIds.add(q._idx));
    document.getElementById('importCount').textContent=importSelectedIds.size;
    document.getElementById('importBtn').disabled=importSelectedIds.size===0;
}

function toggleSelectItem(idx){
    if(importSelectedIds.has(idx)) importSelectedIds.delete(idx); else importSelectedIds.add(idx);
    document.getElementById('selectAllCheck').checked=importSelectedIds.size===importParsedData.length;
    document.getElementById('importCount').textContent=importSelectedIds.size;
    document.getElementById('importBtn').disabled=importSelectedIds.size===0;
}

async function executeImport(){
    const selected=importParsedData.filter(q=>importSelectedIds.has(q._idx));
    if(selected.length===0){showToast('Tidak ada soal dipilih','error');return;}

    const btn=document.getElementById('importBtn');
    btn.disabled=true; btn.innerHTML='<span class="loading-spinner mr-2"></span>Mengunggah...';
    document.getElementById('importProgressWrap').classList.remove('hidden');

    const total=selected.length;
    let successCount=0, failCount=0;
    const BATCH_SIZE=20; // Firestore batch max 500, tapi 20 aman

    for(let i=0;i<total;i+=BATCH_SIZE){
        const batch=db.batch();
        const chunk=selected.slice(i,i+BATCH_SIZE);
        chunk.forEach(q=>{
            const docRef=db.collection('questions').doc();
            batch.set(docRef,{
                mapel:q.mapel, kelas:q.kelas, type:q.type, text:q.text,
                options:q.options, optionImages:q.optionImages,
                answer:q.answer, image:q.image,
                difficulty:q.difficulty, score:q.score, tp:q.tp, cognitive:q.cognitive,
                createdAt:firebase.firestore.FieldValue.serverTimestamp()
            });
        });
        try{
            await batch.commit();
            successCount+=chunk.length;
        }catch(e){
            console.error('Batch error:',e);
            failCount+=chunk.length;
        }
        // Update progress
        const pct=Math.min(100,Math.round(((i+Math.min(BATCH_SIZE,total-i))/total)*100));
        document.getElementById('importProgressBar').style.width=pct+'%';
        document.getElementById('importProgressText').textContent=pct+'%';
        document.getElementById('importProgressDetail').textContent=`${Math.min(i+BATCH_SIZE,total)} / ${total} soal diproses`;
    }

    // Selesai
    document.getElementById('importProgressBar').style.width='100%';
    document.getElementById('importProgressText').textContent='100%';
    btn.innerHTML='<i class="fas fa-check mr-2"></i>Selesai!';

    if(failCount===0) showToast(`${successCount} soal berhasil diimport ke cloud!`,'success');
    else showToast(`${successCount} berhasil, ${failCount} gagal`,'error');

    document.getElementById('importProgressDetail').textContent=`Selesai: ${successCount} berhasil, ${failCount} gagal dari ${total} soal.`;
}

// ================================================================
// EXPORT JSON
// ================================================================
function renderExport(c){
    if(questions.length===0){
        c.innerHTML=`<div class="fade-in card text-center py-12"><i class="fas fa-inbox text-4xl text-border mb-3"></i><p class="text-muted">Tidak ada soal untuk diexport.</p></div>`;
        return;
    }
    c.innerHTML=`<div class="fade-in">
    <div class="card mb-6">
        <h3 class="font-display text-lg font-bold text-light mb-4"><i class="fas fa-file-export text-kopAccent mr-2"></i>Export Soal ke JSON</h3>
        <p class="text-sm text-muted mb-4">Download semua soal (${questions.length}) sebagai file JSON. Data ini bisa diimport kembali nanti atau digunakan sebagai backup.</p>
        <div class="flex flex-wrap gap-3">
            <button onclick="doExport('all')" class="btn-primary"><i class="fas fa-download mr-2"></i>Export Semua (${questions.length})</button>
            <button onclick="doExport('pg')" class="btn-info"><i class="fas fa-download mr-2"></i>Export PG Saja (${questions.filter(q=>q.type==='pg').length})</button>
            <button onclick="doExport('uraian')" class="btn-secondary"><i class="fas fa-download mr-2"></i>Export Uraian Saja (${questions.filter(q=>q.type==='uraian').length})</button>
        </div>
    </div>
    <div class="card">
        <h4 class="font-bold text-light mb-3">Preview Data</h4>
        <pre id="exportPreview" class="bg-dark p-4 rounded-lg text-xs text-muted overflow-x-auto max-h-96 leading-relaxed"></pre>
    </div>
    </div>`;
    doPreviewExport('all');
}

function getExportData(filter){
    let data=[...questions];
    if(filter==='pg') data=data.filter(q=>q.type==='pg');
    else if(filter==='uraian') data=data.filter(q=>q.type==='uraian');
    // Hapus field internal Firestore
    return data.map(({id,createdAt,...rest})=>rest);
}

function doPreviewExport(filter){
    const data=getExportData(filter);
    const el=document.getElementById('exportPreview');
    if(el) el.textContent=JSON.stringify(data.slice(0,3),null,2)+(data.length>3?'\n\n... ('+data.length+' total soal)':'');
}

function doExport(filter){
    const data=getExportData(filter);
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    const mapel=currentUser.isAdmin?'semua':currentUser.mapel;
    const kelas=currentUser.isAdmin?'semua':currentUser.kelas.replace(' ','_');
    a.download=`soal_${mapel}_${kelas}_${filter}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast(`${data.length} soal berhasil diexport!`);
}

// CETAK, KISI, SCORING, MANAGE (Ringkas)
// ================================================================
function renderPrint(c){
    const myQ=questions;
    c.innerHTML=`<div class="fade-in">
    <div class="card mb-4"><p class="text-muted text-sm">Cetak soal yang tersimpan di cloud. Gunakan export JSON sebagai backup.</p></div>
    <div class="card">${myQ.length===0?'<p class="text-muted text-center py-4">Tidak ada soal</p>':`<p class="text-success"><i class="fas fa-check-circle mr-1"></i>${myQ.length} soal siap cetak</p>`}</div>
    </div>`;
}
function renderKisi(c){
    const myQ=questions;
    c.innerHTML=`<div class="fade-in"><div class="card"><h3 class="font-display text-lg font-bold text-light mb-4">Kisi-Kisi Soal (${myQ.length})</h3>
    ${myQ.length===0?'<p class="text-muted text-center py-4">Tidak ada data</p>':`<div class="table-container"><table><thead><tr><th>No</th><th>TP</th><th>Soal</th><th>Jawaban</th><th>Skor</th><th>Level</th></tr></thead><tbody>
    ${myQ.map((q,i)=>`<tr><td>${i+1}</td><td class="text-xs">${escHtml((q.tp||'-').substring(0,40))}</td><td class="text-xs">${escHtml(q.text.substring(0,50))}</td><td class="font-bold text-kopAccent">${escHtml(q.answer)}</td><td>${q.score}</td><td>${q.difficulty}</td></tr>`).join('')}
    </tbody></table></div>`}</div></div>`;
}
function renderScoring(c){
    const myQ=questions;
    const totalSkor=myQ.reduce((s,q)=>s+(q.score||0),0);
    c.innerHTML=`<div class="fade-in"><div class="card"><h3 class="font-display text-lg font-bold text-light mb-4">Kunci Jawaban & Penskoran</h3>
    <div class="grid grid-cols-2 gap-4 mb-4"><div class="stat-card"><div class="stat-num">${myQ.length}</div><div class="stat-label">Jumlah Soal</div></div><div class="stat-card"><div class="stat-num">${totalSkor}</div><div class="stat-label">Total Skor</div></div></div>
    ${myQ.length===0?'<p class="text-muted text-center py-4">Tidak ada data</p>':`<div class="table-container"><table><thead><tr><th>No</th><th>Tipe</th><th>Kunci</th><th>Skor</th></tr></thead><tbody>
    ${myQ.map((q,i)=>`<tr><td>${i+1}</td><td><span class="badge ${q.type==='pg'?'badge-info':'badge-success'}">${q.type==='pg'?'PG':'Uraian'}</span></td><td class="font-bold text-kopAccent">${escHtml(q.answer)||'-'}</td><td>${q.score}</td></tr>`).join('')}
    </tbody></table></div>`}</div></div>`;
}
function renderManage(c){
    if(!currentUser.isAdmin) return;
    c.innerHTML=`<div class="fade-in"><div class="card">
        <h3 class="font-display text-lg font-bold text-light mb-4">Manajemen Akun</h3>
        <p class="text-xs text-muted mb-4">Total akun terdaftar: <strong class="text-light">${accounts.length}</strong></p>
        <div class="table-container"><table><thead><tr><th>Mapel</th><th>Kelas</th><th>Password</th></tr></thead><tbody>
        ${accounts.slice(0,30).map(a=>`<tr><td>${getMapelName(a.mapel)}</td><td>${a.kelas}</td><td class="font-mono text-kopAccent">${escHtml(a.password)}</td></tr>`).join('')}
        ${accounts.length>30?`<tr><td colspan="3" class="text-center text-muted text-xs">... dan ${accounts.length-30} akun lainnya</td></tr>`:''}
        </tbody></table></div>
    </div></div>`;
}
