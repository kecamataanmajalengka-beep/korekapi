<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:#0f1923;color:#e8ecf1;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#182538}::-webkit-scrollbar-thumb{background:#2a3f5f;border-radius:3px}

/* ===== LOGIN ===== */
.login-bg{background:linear-gradient(135deg,#0f1923 0%,#1a2744 40%,#182538 100%);position:relative;overflow:hidden;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-bg::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(201,168,76,0.07) 0%,transparent 70%);top:-150px;right:-150px;border-radius:50%;animation:floatBlob 8s ease-in-out infinite}
.login-bg::after{content:'';position:absolute;width:450px;height:450px;background:radial-gradient(circle,rgba(6,182,212,0.05) 0%,transparent 70%);bottom:-80px;left:-80px;border-radius:50%;animation:floatBlob 10s ease-in-out infinite reverse}
@keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.1)}}

.glass{background:rgba(24,37,56,0.85);backdrop-filter:blur(24px);border:1px solid rgba(42,63,95,0.5)}

/* ===== SIDEBAR ===== */
.sidebar{width:260px;min-height:100vh;background:linear-gradient(180deg,#1a2744 0%,#0f1923 100%);border-right:1px solid #2a3f5f;position:fixed;left:0;top:0;z-index:40;transition:transform .3s ease}
.main-content{margin-left:260px;transition:margin-left .3s ease}
.nav-item{padding:11px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:12px;font-size:14px;color:#7a8ba5;user-select:none}
.nav-item:hover{background:rgba(42,63,95,0.3);color:#e8ecf1}
.nav-item.active{background:rgba(201,168,76,0.08);border-left-color:#c9a84c;color:#c9a84c;font-weight:600}

/* ===== BUTTONS ===== */
.btn-primary{background:linear-gradient(135deg,#c9a84c,#b8943f);color:#1a2744;font-weight:700;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:14px;font-family:'Source Sans 3',sans-serif;display:inline-flex;align-items:center;justify-content:center}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(201,168,76,0.3)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:transparent;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 24px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:14px;font-family:'Source Sans 3',sans-serif;display:inline-flex;align-items:center;justify-content:center}
.btn-secondary:hover{border-color:#c9a84c;color:#c9a84c}
.btn-danger{background:transparent;border:1px solid #ef4444;color:#ef4444;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:13px;font-family:'Source Sans 3',sans-serif}
.btn-danger:hover{background:#ef4444;color:white}

/* ===== FORM ===== */
.input-field{background:#0f1923;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 14px;border-radius:8px;width:100%;font-size:14px;transition:border-color .2s;font-family:'Source Sans 3',sans-serif}
.input-field:focus{outline:none;border-color:#c9a84c;box-shadow:0 0 0 2px rgba(201,168,76,0.15)}
.input-field:disabled{opacity:0.5;cursor:not-allowed}
.input-field option{background:#182538;color:#e8ecf1}
textarea.input-field{resize:vertical;min-height:40px}

/* ===== CARD ===== */
.card{background:#182538;border:1px solid #2a3f5f;border-radius:12px;padding:24px}

/* ===== TOAST ===== */
.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:600;animation:slideIn .3s ease;max-width:420px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.toast-success{background:linear-gradient(135deg,#166534,#15803d);color:white;border:1px solid #22c55e}
.toast-error{background:linear-gradient(135deg,#7f1d1d,#991b1b);color:white;border:1px solid #ef4444}
.toast-info{background:linear-gradient(135deg,#164e63,#155e75);color:white;border:1px solid #06b6d4}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-content{background:#182538;border:1px solid #2a3f5f;border-radius:16px;padding:32px;max-width:600px;width:100%;animation:fadeIn .3s ease;max-height:90vh;overflow-y:auto}

.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:35;display:none}
.sidebar-overlay.active{display:block}
@media(max-width:1023px){.sidebar{transform:translateX(-260px)}.sidebar.mobile-open{transform:translateX(0)}.main-content{margin-left:0!important}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease forwards}

.img-preview{max-width:100%;max-height:150px;border-radius:6px;margin-top:8px;border:1px solid #2a3f5f}
.loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:#c9a84c;animation:spin 1s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}

    /* ---- SECTION HEADING (I. PG, II. Uraian) ---- */

    /* ---- OPSI ---- */
    .opsi-wrapper {

    }

    /* ---- GARIS UNTUK JAWABAN URAIAN ---- */
    .answer-lines {

    }

    /* ---- TANDA TANGAN ---- */
    .ttd-section {

    .ttd-box .ttd-nip {
        font-size: 10pt;

    /* ---- TABLE (KISI & KUNCI) ---- */

        width: 100%;

    }
    .print-table td.center {
        text-align: center;
    }
}
</style>

<script>
// ================================================================
// FIREBASE CONFIG
// ================================================================
const firebaseConfig = {
    apiKey: "AIzaSyC0Hs7SUgPAeQ_JaotHUJL5m6nIhCRif-8",
    authDomain: "pembuatan-soal.firebaseapp.com",
    projectId: "pembuatan-soal",
    storageBucket: "pembuatan-soal.firebasestorage.app",
    messagingSenderId: "56200686194",
    appId: "1:56200686194:web:eb2de00c9d152d87bcf0eb"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// ================================================================
// DATA MASTER
// ================================================================
const MAPEL_LIST = [
    {id:'ppkn',nama:'Pendidikan Pancasila',singkat:'PPKn'},
    {id:'mat',nama:'Matematika',singkat:'Mat'},
    {id:'bin',nama:'Bahasa Indonesia',singkat:'B.Indo'},
    {id:'sbd',nama:'Seni Budaya',singkat:'Seni'},
    {id:'ipas',nama:'IPAS',singkat:'IPAS'},
    {id:'bsd',nama:'Bahasa Sunda',singkat:'B.Sunda'},
    {id:'bing',nama:'Bahasa Inggris',singkat:'B.Inggris'},
    {id:'pai',nama:'PAI',singkat:'PAI'},
    {id:'pjok',nama:'PJOK',singkat:'PJOK'}
];
const KELAS_LIST = ['Kelas 1','Kelas 2','Kelas 3','Kelas 4','Kelas 5','Kelas 6'];

function getMaxOpt(kelas){ var n=parseInt(kelas.replace('Kelas ',''))||0; return n<=2?3:4; }
function getOptLetters(kelas){ return ['A','B','C','D'].slice(0,getMaxOpt(kelas)); }
function getMapelName(id){ return (MAPEL_LIST.find(function(m){return m.id===id;})||{}).nama||id; }
function getMapelSingkat(id){ return (MAPEL_LIST.find(function(m){return m.id===id;})||{}).singkat||id; }
function escHtml(s){ if(!s) return ''; var d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }

// ================================================================
// STATE
// ================================================================
var currentUser = null;
var questions = [];
var tujuanPembelajaran = [];
var accounts = [];
var currentEditId = null;
var unsubQ = null;
var unsubTP = null;

// ================================================================
// UTILITAS UI
// ================================================================
function showToast(msg, type){
    type = type || 'success';
    var c = document.getElementById('toastContainer');
    var t = document.createElement('div');
    var icon = type==='success'?'check-circle':type==='error'?'times-circle':'info-circle';
    t.className = 'toast toast-' + type;
    t.innerHTML = '<i class="fas fa-' + icon + ' flex-shrink-0"></i><span>' + msg + '</span>';
    c.appendChild(t);
    setTimeout(function(){ if(t.parentNode) t.remove(); }, 3500);
}

function closeModal(){
    document.getElementById('modalOverlay').classList.add('hidden');
    document.getElementById('modalBody').innerHTML = '';
}

function openModal(html){
    document.getElementById('modalOverlay').classList.remove('hidden');
    document.getElementById('modalBody').innerHTML = html;
}

function togglePassVis(){
    var inp = document.getElementById('loginPass');
    var icon = document.getElementById('passEye');
    if(inp.type==='password'){ inp.type='text'; icon.className='fas fa-eye-slash text-sm'; }
    else { inp.type='password'; icon.className='fas fa-eye text-sm'; }
}

function toggleSidebar(){

    var ov = document.getElementById('sidebarOverlay');

// Helper: buat option mapel
function makeMapelOpt(sel){
    if(currentUser && currentUser.isAdmin){
        return MAPEL_LIST.map(function(m){ return '<option value="'+m.id+'"'+(m.id===sel?' selected':'')+'>'+m.nama+'</option>'; }).join('');
    }
    if(currentUser){
        return '<option value="'+currentUser.mapel+'" selected>'+getMapelName(currentUser.mapel)+'</option>';

    return '<option value="">-- Pilih --</option>';

// Helper: buat option kelas
function makeKelasOpt(sel){
    if(currentUser && currentUser.isAdmin){
        return KELAS_LIST.map(function(k){ return '<option value="'+k+'"'+(k===sel?' selected':'')+'>'+k+'</option>'; }).join('');
    }
    if(currentUser){
        return '<option value="'+currentUser.kelas+'" selected>'+currentUser.kelas+'</option>';
    }
    return '<option value="">-- Pilih --</option>';
}

function initApp(){
    // Cek apakah collection accounts sudah ada datanya
    db.collection('accounts').limit(1).get().then(function(snap){
        if(snap.empty){
            var batch = db.batch();
            batch.set(db.collection('accounts').doc('admin'), {mapel:'admin', kelas:'Semua', password:'admin123'});
            MAPEL_LIST.forEach(function(m){
                KELAS_LIST.forEach(function(k){
                    batch.set(db.collection('accounts').doc(m.id+'_'+k.replace(' ','')), {mapel:m.id, kelas:k, password:'guru123'});
                });
            });
            return batch.commit();
        }
    }).then(function(){
        showToast('Data akun siap','info');
    }).catch(function(){});

    // Listener accounts
    db.collection('accounts').onSnapshot(function(snap){
        accounts = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        populateLoginDropdown();
    });

    // Listener TP
    unsubTP = db.collection('tps').orderBy('createdAt','asc').onSnapshot(function(snap){
        tujuanPembelajaran = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        if(document.getElementById('tpListContainer')) renderTPList();
        if(document.getElementById('cMapel')) updateTPDropdown();
    });
}

function populateLoginDropdown(){
    var sel = document.getElementById('loginMapel');
    sel.innerHTML = '<option value="">-- Pilih Mata Pelajaran --</option>';
    sel.innerHTML += '<option value="admin">Admin (Semua Akses)</option>';
    MAPEL_LIST.forEach(function(m){
        sel.innerHTML += '<option value="'+m.id+'">'+m.nama+'</option>';
    });
    sel.disabled = false;
    sel.onchange = function(){
        var ks = document.getElementById('loginKelas');
        document.getElementById('loginError').classList.add('hidden');
        if(this.value==='admin'){
            ks.innerHTML = '<option value="Semua">Semua Kelas</option>';
            ks.disabled = false;
        } else if(this.value){
            ks.disabled = false;
            ks.innerHTML = '<option value="">-- Pilih Kelas --</option>';
            KELAS_LIST.forEach(function(k){
                ks.innerHTML += '<option value="'+k+'">'+k+'</option>';
            });
        } else {
            ks.innerHTML = '<option value="">-- Pilih Kelas --</option>';
            ks.disabled = true;
        }
    };
}

function doLogin(){
    var mapel = document.getElementById('loginMapel').value;
    var kelas = document.getElementById('loginKelas').value;
    var pass  = document.getElementById('loginPass').value;
    var errEl = document.getElementById('loginError');

    if(!mapel){ errEl.textContent='Pilih mapel terlebih dahulu'; errEl.classList.remove('hidden'); return; }
    if(!kelas){ errEl.textContent='Pilih kelas terlebih dahulu'; errEl.classList.remove('hidden'); return; }

    var acc = null;
    for(var i=0; i<accounts.length; i++){
        if(accounts[i].mapel===mapel && accounts[i].kelas===kelas && accounts[i].password===pass){
            acc = accounts[i]; break;
        }
    }
    if(!acc){ errEl.textContent='Password salah!'; errEl.classList.remove('hidden'); return; }

    currentUser = { mapel:acc.mapel, kelas:acc.kelas, isAdmin:acc.mapel==='admin' };
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainPage').classList.remove('hidden');
    initMainPage();
    showToast('Selamat datang, ' + (currentUser.isAdmin ? 'Admin' : getMapelName(currentUser.mapel)));
}

function doLogout(){
    currentUser = null;
    currentEditId = null;
    if(unsubQ) unsubQ();
    document.getElementById('mainPage').classList.add('hidden');
    document.getElementById('loginPage').style.display = '';
    document.getElementById('loginPass').value = '';
    closeSidebar();
}

function initMainPage(){
    document.getElementById('sidebarUser').textContent = currentUser.isAdmin ? 'Administrator' : getMapelName(currentUser.mapel);
    document.getElementById('sidebarRole').textContent = currentUser.isAdmin ? 'Akses Semua' : currentUser.kelas;
    document.getElementById('topbarInfo').innerHTML = currentUser.isAdmin
        ? '<i class="fas fa-crown mr-1 text-kopAccent"></i>Admin'
        : '<i class="fas fa-graduation-cap mr-1"></i>' + getMapelSingkat(currentUser.mapel) + ' - ' + currentUser.kelas;

    unsubQ = db.collection('questions').orderBy('createdAt','asc').onSnapshot(function(snap){
        questions = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        navigateTo('dashboard');

}

function navigateTo(page){
    document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
    var t = document.querySelector('.nav-item[data-page="'+page+'"]');
    if(t) t.classList.add('active');

    var titles = {dashboard:'Dashboard', tp:'Kelola Tujuan Pembelajaran', create:'Buat Soal', questions:'Bank Soal', print:'Cetak Soal', kisi:'Kisi-Kisi', scoring:'Kunci & Skor'};
    document.getElementById('pageTitle').textContent = titles[page] || page;
    closeSidebar();

    var c = document.getElementById('pageContent');
    switch(page){
        case 'dashboard': renderDashboard(c); break;
        case 'tp':        renderTP(c); break;
        case 'create':    renderCreate(c); break;
        case 'questions': renderQuestions(c); break;
        case 'print':     renderPrint(c); break;
        case 'kisi':      renderKisi(c); break;
        case 'scoring':   renderScoring(c); break;
    }
}

    } else {

// Helper: Upload Gambar dan Set URL ke Input Text
function handleImageUpload(input, targetInputId, previewId){
    var file = input.files[0];
    if(!file) return;
    
    var targetInput = document.getElementById(targetInputId);
    var previewContainer = document.getElementById(previewId);
    
    // Tampilkan loading text di preview
    previewContainer.innerHTML = '<span class="text-xs text-kopAccent"><i class="fas fa-spinner fa-spin mr-1"></i>Mengupload...</span>';

    var fileName = Date.now() + '_' + file.name;
    var ref = storage.ref('soal/' + fileName);

    ref.put(file).then(function(snapshot){
        return snapshot.ref.getDownloadURL();
    }).then(function(url){
        // Set URL ke input text
        targetInput.value = url;
        // Tampilkan preview gambar
        previewContainer.innerHTML = '<img src="'+url+'" class="img-preview">';
        showToast('Gambar berhasil diupload', 'success');
    }).catch(function(error){
        console.error(error);
        previewContainer.innerHTML = '<span class="text-xs text-danger">Gagal upload: '+error.message+'</span>';
        showToast('Gagal upload gambar', 'error');
    });
}

function saveSingleQuestion(){
    var btn = document.getElementById('btnSaveSingle');
    if(!btn) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner mr-2"></span>Menyimpan...';

    var mapel = document.getElementById('cMapel').value;
    var kelas = document.getElementById('cKelas').value;
    var type  = document.getElementById('cType').value;
    var text  = document.getElementById('cText').value.trim();
    if(!text){ showToast('Teks soal tidak boleh kosong','error'); btn.disabled=false; btn.innerHTML='<i class="fas fa-save mr-2"></i>Simpan Soal'; return; }

    var qData = {
        mapel: mapel,
        kelas: kelas,
        type: type,
        text: text,
        tp: document.getElementById('cTPManual').value || document.getElementById('cTPSelect').value || '',
        difficulty: document.getElementById('cDiff').value,
        score: parseInt(document.getElementById('cScore').value) || 1,
        answer: document.getElementById('cAnswer').value.trim(),
        // Ambil URL langsung dari input text
        image: document.getElementById('cImgUrl').value.trim() || '',
        options: [],
        optionImages: [],
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    // Jika PG, ambil URL opsi dari input text
    if(type === 'pg'){
        var letters = getOptLetters(kelas);
        letters.forEach(function(l){
            qData.options.push(document.getElementById('cOpt'+l).value.trim());
            // Ambil URL gambar opsi dari input text
            var optImgUrl = document.getElementById('cOptImgUrl'+l) ? document.getElementById('cOptImgUrl'+l).value.trim() : '';
            qData.optionImages.push(optImgUrl);
        });
    }

    db.collection('questions').add(qData).then(function(){
        showToast('Soal berhasil disimpan!');
        // Reset Form
        document.getElementById('cText').value = '';
        document.getElementById('cImgUrl').value = '';
        document.getElementById('cImgPrev').innerHTML = '';
        document.getElementById('cAnswer').value = '';
        if(document.getElementById('cTPManual')) document.getElementById('cTPManual').value = '';
        if(document.getElementById('cTPSelect')) document.getElementById('cTPSelect').value = '';
        
        // Reset Opsi
        if(type === 'pg'){
            var letters2 = getOptLetters(kelas);
            letters2.forEach(function(l){
                var optEl = document.getElementById('cOpt'+l);
                if(optEl) optEl.value = '';
                var optUrlEl = document.getElementById('cOptImgUrl'+l);
                if(optUrlEl) optUrlEl.value = '';
                var prevEl = document.getElementById('cOptImgPrev'+l);
                if(prevEl) prevEl.innerHTML = '';
            });
        }
    }).catch(function(e){ showToast('Error: '+(e.message||e),'error'); })
    .finally(function(){ btn.disabled=false; btn.innerHTML='<i class="fas fa-save mr-2"></i>Simpan Soal'; });
}

function processJSON(){
    var btn = document.getElementById('btnProcessJson');
    btn.disabled = true; btn.innerHTML = '<span class="loading-spinner mr-2"></span>Memproses...';
    var txt = document.getElementById('jsonInput').value;
    var defMapel = currentUser.isAdmin ? '' : currentUser.mapel;
    var defKelas = currentUser.isAdmin ? '' : currentUser.kelas;

    if(!txt.trim()){ showToast('JSON kosong','error'); btn.disabled=false; btn.innerHTML='<i class="fas fa-file-import mr-2"></i>Proses & Import JSON'; return; }

    try {
        var data = JSON.parse(txt);
        if(!Array.isArray(data)) throw new Error('Format harus Array JSON');

        var batch = db.batch();
        var count = 0;
        data.forEach(function(item){
            var qText = item.soal || item.text || '';
            if(!qText) return;
            // Ambil opsi dari format fleksibel
            var qOpts = item.options || [item.opsi_a, item.opsi_b, item.opsi_c, item.opsi_d, item.opsi_e].filter(Boolean);
            var docRef = db.collection('questions').doc();
            batch.set(docRef, {
                mapel: item.mapel || defMapel,
                kelas: item.kelas || defKelas,
                type: item.tipe || item.type || 'pg',
                text: qText,
                options: qOpts,
                answer: item.kunci || item.answer || '',
                difficulty: item.difficulty || 'Sedang',
                score: item.skor || item.score || 1,
                tp: item.tp || '',
                // Langsung pakai URL dari JSON
                image: item.image || '',
                optionImages: item.optionImages || [],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            count++;
        });
        batch.commit().then(function(){
            showToast(count + ' soal berhasil diimport!');
            document.getElementById('jsonInput').value = '';
        }).catch(function(e){ showToast('Gagal import: '+(e.message||e),'error'); });
    } catch(e){
        showToast('Format JSON Salah: '+(e.message||e),'error');
    }
    btn.disabled = false; btn.innerHTML='<i class="fas fa-file-import mr-2"></i>Proses & Import JSON';
}

        '</div>'
    );
}

function doUpdateQuestion(id){
    var updateData = {
        text: document.getElementById('eText').value,
        image: document.getElementById('eImg').value,
        tp: document.getElementById('eTP').value,
        answer: document.getElementById('eAnswer').value,
        score: parseInt(document.getElementById('eScore').value) || 1
    };
    var optEls = document.querySelectorAll('.eOptVal');
    if(optEls.length > 0){
        updateData.options = [];
        optEls.forEach(function(el){ updateData.options.push(el.value); });
    }
    db.collection('questions').doc(id).update(updateData).then(function(){
        showToast('Soal diperbarui!');
        closeModal();
    }).catch(function(){ showToast('Gagal update','error'); });
}

function deleteQuestion(id){
    if(!confirm('Hapus soal ini?')) return;
    db.collection('questions').doc(id).delete().then(function(){ showToast('Soal dihapus'); }).catch(function(){ showToast('Gagal menghapus','error'); });
}
