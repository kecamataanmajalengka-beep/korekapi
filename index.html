<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:#0f1923;color:#e8ecf1;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#182538}::-webkit-scrollbar-thumb{background:#2a3f5f;border-radius:3px}
.login-bg{background:linear-gradient(135deg,#0f1923 0%,#1a2744 40%,#182538 100%);position:relative;overflow:hidden}
.login-bg::before{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(201,168,76,0.08) 0%,transparent 70%);top:-100px;right:-100px;border-radius:50%;animation:floatBlob 8s ease-in-out infinite}
.login-bg::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(6,182,212,0.06) 0%,transparent 70%);bottom:-50px;left:-50px;border-radius:50%;animation:floatBlob 10s ease-in-out infinite reverse}
@keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.1)}}
.glass{background:rgba(24,37,56,0.8);backdrop-filter:blur(20px);border:1px solid rgba(42,63,95,0.5)}
.sidebar{width:260px;min-height:100vh;background:linear-gradient(180deg,#1a2744 0%,#0f1923 100%);border-right:1px solid #2a3f5f;position:fixed;left:0;top:0;z-index:40;transition:transform .3s ease}
.main-content{margin-left:260px;transition:margin-left .3s ease}
.nav-item{padding:10px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:12px;font-size:14px;color:#7a8ba5;user-select:none}
.nav-item:hover{background:rgba(42,63,95,0.3);color:#e8ecf1}
.nav-item.active{background:rgba(201,168,76,0.1);border-left-color:#c9a84c;color:#c9a84c}
.btn-primary{background:linear-gradient(135deg,#c9a84c,#b8943f);color:#1a2744;font-weight:700;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:14px;font-family:'Source Sans 3',sans-serif}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(201,168,76,0.3)}
.btn-secondary{background:transparent;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 24px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:14px;font-family:'Source Sans 3',sans-serif}
.btn-secondary:hover{border-color:#c9a84c;color:#c9a84c}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:white;font-weight:600;padding:8px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:13px}
.btn-danger:hover{box-shadow:0 4px 12px rgba(239,68,68,0.3)}
.input-field{background:#0f1923;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 14px;border-radius:8px;width:100%;font-size:14px;transition:border-color .2s}
.input-field:focus{outline:none;border-color:#c9a84c;box-shadow:0 0 0 2px rgba(201,168,76,0.15)}
.input-field::placeholder{color:#4a6080}
.card{background:#182538;border:1px solid #2a3f5f;border-radius:12px;padding:24px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-success{background:rgba(34,197,94,0.15);color:#22c55e}.badge-warning{background:rgba(245,158,11,0.15);color:#f59e0b}.badge-info{background:rgba(6,182,212,0.15);color:#06b6d4}.badge-danger{background:rgba(239,68,68,0.15);color:#ef4444}
.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:600;animation:slideIn .3s ease;max-width:400px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.toast-success{background:linear-gradient(135deg,#166534,#15803d);color:white;border:1px solid #22c55e}
.toast-error{background:linear-gradient(135deg,#7f1d1d,#991b1b);color:white;border:1px solid #ef4444}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-content{background:#182538;border:1px solid #2a3f5f;border-radius:16px;padding:32px;max-width:600px;width:100%;animation:fadeIn .3s ease;max-height:90vh;overflow-y:auto}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:35;display:none}.sidebar-overlay.active{display:block}
@media(max-width:1023px){.sidebar{transform:translateX(-260px)}.sidebar.mobile-open{transform:translateX(0)}.main-content{margin-left:0!important}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease}
.stat-card{background:linear-gradient(135deg,#182538,#1f3050);border:1px solid #2a3f5f;border-radius:12px;padding:20px;text-align:center}
.stat-card .stat-num{font-size:32px;font-weight:900;color:#c9a84c;font-family:'Playfair Display',serif}
.field-error{color:#ef4444;font-size:11px;margin-top:4px;display:none}.field-error.show{display:block}
.img-preview{max-width:100%;max-height:150px;border-radius:6px;margin-top:8px;border:1px solid #2a3f5f}
.loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:#c9a84c;animation:spin 1s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* PRINT STYLES - KHUSUS AGAR KOP SURAT TIDAK TERPOTONG */
@media print {
    body { background: white; color: black; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    #sidebar, #mainArea > header, #sidebarOverlay, .no-print { display: none !important; }
    #mainArea { margin: 0 !important; padding: 0 !important; width: 100%; }
    #pageContent { padding: 0 !important; }
    .card { border: none !important; padding: 0 !important; box-shadow: none !important; background: white !important; }
    
    /* Paper Layout */
    .print-page {
        width: 100%;
        padding: 20px 40px; /* Margin A4 standar */
        background: white;
        color: black;
        font-family: 'Times New Roman', serif;
    }
    
    /* Kop Surat */
    .kop-surat { text-align: center; border-bottom: 3px double black; padding-bottom: 10px; margin-bottom: 20px; position: relative; }
    .kop-surat img { height: 80px; vertical-align: middle; margin-bottom: 10px; }
    .kop-surat h1 { font-family: 'Times New Roman', serif; font-size: 18pt; font-weight: bold; margin: 0; text-transform: uppercase; }
    .kop-surat h2 { font-family: 'Times New Roman', serif; font-size: 14pt; font-weight: bold; margin: 0; text-transform: uppercase; }
    .kop-surat h3 { font-family: 'Times New Roman', serif; font-size: 11pt; font-weight: normal; margin: 0; font-style: italic; }
    .kop-surat p { font-family: 'Times New Roman', serif; font-size: 10pt; margin: 0; }

    /* Soal Styles */
    .soal-header { text-align: right; margin-bottom: 20px; font-size: 11pt; }
    .soal-container { margin-bottom: 15px; page-break-inside: avoid; }
    .soal-num { font-weight: bold; margin-right: 8px; }
    .soal-text { font-size: 11pt; line-height: 1.5; display: inline; vertical-align: top; }
    .soal-img { max-width: 200px; max-height: 150px; display: block; margin: 10px 0; }
    .opsi-box { margin-left: 30px; margin-top: 5px; display: flex; flex-direction: column; gap: 5px; font-size: 11pt; }
    .opsi-item { display: flex; align-items: flex-start; gap: 10px; }
    .opsi-img { max-width: 150px; display: inline-block; vertical-align: middle; }
    
    /* Table Styles for Kisi/Scoring */
    .print-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 11pt; }
    .print-table th, .print-table td { border: 1px solid black; padding: 8px; text-align: left; vertical-align: top; }
    .print-table th { background-color: #f0f0f0 !important; -webkit-print-color-adjust: exact; text-align: center; }
}
</style>
</head>

<!-- LOGIN -->
<div id="loginPage" class="login-bg min-h-screen flex items-center justify-center p-4">
<div class="glass rounded-2xl p-10 w-full max-w-md relative z-10 fade-in">
<div class="text-center mb-8">

    <img src="https://www.image2url.com/r2/default/images/1776680731558-aaedfd5c-6674-4989-a7a4-c15f6291acac.jpeg" alt="Logo" class="w-full h-full object-cover">

<script>
// ================================================================
// FIREBASE CONFIG & INIT
// ================================================================
const firebaseConfig = {
  apiKey: "AIzaSyC0Hs7SUgPAeQ_JaotHUJL5m6nIhCRif-8",
  authDomain: "pembuatan-soal.firebaseapp.com",
  projectId: "pembuatan-soal",
  storageBucket: "pembuatan-soal.firebasestorage.app",
  messagingSenderId: "56200686194",
  appId: "1:56200686194:web:eb2de00c9d152d87bcf0eb",
  measurementId: "G-5V2CLKCE5J"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

const MAPEL_LIST=[
    {id:'ppkn',nama:'Pendidikan Pancasila',singkat:'PPKn'},
    {id:'mat',nama:'Matematika',singkat:'Mat'},
    {id:'bin',nama:'Bahasa Indonesia',singkat:'B.Indo'},
    {id:'sbd',nama:'Seni Budaya',singkat:'Seni'},
    {id:'ipas',nama:'IPAS',singkat:'IPAS'},
    {id:'bsd',nama:'Bahasa Sunda',singkat:'B.Sunda'},
    {id:'bing',nama:'Bahasa Inggris',singkat:'B.Inggris'},
    {id:'pai',nama:'PAI',singkat:'PAI'},
    {id:'pjok',nama:'PJOK',singkat:'PJOK'}
];
const KELAS_LIST=['Kelas 1','Kelas 2','Kelas 3','Kelas 4','Kelas 5','Kelas 6'];

function getMaxOpt(kelas){ const n=parseInt(kelas.replace('Kelas ',''))||0; return n<=2?3:4; }
function getOptLetters(kelas){ return ['A','B','C','D'].slice(0,getMaxOpt(kelas)); }

// STATE
let currentUser=null;
let questions=[]; 
let tujuanPembelajaran=[];
let accounts=[];
let currentEditId=null;
let unsubQ=null;

// UTILS
function getMapelName(id){return MAPEL_LIST.find(m=>m.id===id)?.nama||id;}
function getMapelSingkat(id){return MAPEL_LIST.find(m=>m.id===id)?.singkat||id;}
function escHtml(s){if(!s)return '';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}

function showToast(msg,type='success'){ const c=document.getElementById('toastContainer'); const t=document.createElement('div'); t.className=`toast toast-${type}`; t.innerHTML=`<i class="fas fa-${type==='success'?'check':type==='error'?'times':'info'}-circle flex-shrink-0"></i><span>${msg}</span>`; c.appendChild(t); setTimeout(()=>{t.remove();},3000); }
function closeModal(){document.getElementById('modalOverlay').classList.add('hidden');document.getElementById('modalBody').innerHTML='';}
function openModal(html){document.getElementById('modalOverlay').classList.remove('hidden');document.getElementById('modalBody').innerHTML=html;}

// ================================================================
// FIREBASE LOGIC
// ================================================================
async function initApp(){
    const accSnap = await db.collection('accounts').limit(1).get();
    if(accSnap.empty){
        const batch = db.batch();
        batch.set(db.collection('accounts').doc('admin'), {mapel:'admin', kelas:'Semua', password:'admin123'});
        MAPEL_LIST.forEach(m=>{
            KELAS_LIST.forEach(k=>{
                batch.set(db.collection('accounts').doc(`${m.id}_${k.replace(' ','')}`), {mapel:m.id, kelas:k, password:'guru123'});
            });
        });
        await batch.commit();
    }
    db.collection('accounts').onSnapshot(snap => {
        accounts = snap.docs.map(d => ({id:d.id, ...d.data()}));
        populateLoginDropdown();
    });
}

function populateLoginDropdown(){
    const sel=document.getElementById('loginMapel');
    sel.innerHTML='<option value="">-- Pilih Mata Pelajaran --</option>';
    sel.innerHTML+='<option value="admin">Admin (Semua Akses)</option>';
    MAPEL_LIST.forEach(m=>{sel.innerHTML+=`<option value="${m.id}">${m.nama}</option>`;});
    sel.onchange=function(){
        const ks=document.getElementById('loginKelas');
        document.getElementById('loginError').classList.remove('show');
        if(this.value==='admin'){ks.innerHTML='<option value="Semua">Semua Kelas</option>';ks.disabled=false;}
        else if(this.value){ks.disabled=false;ks.innerHTML='<option value="">-- Pilih Kelas --</option>';KELAS_LIST.forEach(k=>{ks.innerHTML+=`<option value="${k}">${k}</option>`;});}
        else{ks.innerHTML='<option value="">-- Pilih Kelas --</option>';ks.disabled=true;}
    };
    sel.disabled = false;
}

function doLogin(){
    const mapel=document.getElementById('loginMapel').value;
    const kelas=document.getElementById('loginKelas').value;
    const pass=document.getElementById('loginPass').value;
    const errEl=document.getElementById('loginError');
    if(!mapel){errEl.textContent='Pilih mata pelajaran';errEl.classList.add('show');return;}
    if(!kelas){errEl.textContent='Pilih kelas';errEl.classList.add('show');return;}
    const acc = accounts.find(a => a.mapel === mapel && a.kelas === kelas && a.password === pass);
    if(!acc){errEl.textContent='Password salah';errEl.classList.add('show');return;}
    currentUser={mapel:acc.mapel,kelas:acc.kelas,isAdmin:acc.mapel==='admin'};
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('mainPage').classList.remove('hidden');
    initMainPage();
    showToast('Selamat datang, '+(currentUser.isAdmin?'Administrator':getMapelName(currentUser.mapel)));
}

function doLogout(){
    currentUser=null; currentEditId=null;
    if(unsubQ) unsubQ();
    document.getElementById('mainPage').classList.add('hidden');
    document.getElementById('loginPage').classList.remove('hidden');
    document.getElementById('loginPass').value='';
    closeSidebar();
}

function initMainPage(){
    document.getElementById('sidebarUser').textContent=currentUser.isAdmin?'Administrator':getMapelName(currentUser.mapel);
    document.getElementById('sidebarRole').textContent=currentUser.isAdmin?'Akses Semua':currentUser.kelas;
    document.getElementById('topbarInfo').innerHTML=currentUser.isAdmin?'<i class="fas fa-crown mr-1" style="color:#c9a84c"></i>Admin':`<i class="fas fa-graduation-cap mr-1"></i>${getMapelSingkat(currentUser.mapel)} - ${currentUser.kelas}`;
    
    let qRef = db.collection('questions');
    if(!currentUser.isAdmin) qRef = qRef.where('mapel','==',currentUser.mapel).where('kelas','==',currentUser.kelas);
    
    unsubQ = qRef.onSnapshot(snap => {
        questions = snap.docs.map(d => ({id:d.id, ...d.data()}));
        // Sort by creation date if available, or keep Firestore order
        questions.sort((a,b) => (a.createdAt || 0) - (b.createdAt || 0));
        navigateTo('dashboard');
    });
}

// ================================================================
// NAVIGASI
// ================================================================
function navigateTo(page){
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    const t=document.querySelector(`.nav-item[data-page="${page}"]`);
    if(t)t.classList.add('active');
    const titles={dashboard:'Dashboard', create:'Buat Soal Baru',questions:'Bank Soal',print:'Cetak Soal',kisi:'Kisi-Kisi Soal',scoring:'Kunci Jawaban & Penskoran'};
    document.getElementById('pageTitle').textContent=titles[page]||page;
    closeSidebar();
    const c=document.getElementById('pageContent');
    switch(page){
        case 'dashboard':renderDashboard(c);break;
        case 'create':renderCreate(c);break;
        case 'questions':renderQuestions(c);break;
        case 'print':renderPrint(c);break;
        case 'kisi':renderKisi(c);break;
        case 'scoring':renderScoring(c);break;
    }
}
document.getElementById('sidebarNav').addEventListener('click',e=>{const item=e.target.closest('.nav-item');if(item)navigateTo(item.dataset.page);});
function toggleSidebar(){const sb=document.getElementById('sidebar');const ov=document.getElementById('sidebarOverlay');sb.classList.toggle('mobile-open');ov.classList.toggle('active',sb.classList.contains('mobile-open'));}
function closeSidebar(){document.getElementById('sidebar').classList.remove('mobile-open');document.getElementById('sidebarOverlay').classList.remove('active');}

// ================================================================
// DASHBOARD
// ================================================================
function renderDashboard(c){
    const byType={pg:0,uraian:0}; const byDiff={Mudah:0,Sedang:0,Sulit:0};
    questions.forEach(q=>{ byType[q.type==='pg'?'pg':'uraian']++; byDiff[q.difficulty]=(byDiff[q.difficulty]||0)+1; });
    const totalSkor=questions.reduce((s,q)=>s+(q.score||0),0);

async function saveSingleQuestion(){
    // ... (Logic simpan sama seperti sebelumnya, dipersingkat untuk konteks)
    const btn = document.querySelector('button[onclick="saveSingleQuestion()"]');
    btn.disabled = true; btn.innerHTML = '<span class="loading-spinner mr-2"></span>Menyimpan...';
    try {
        const mapel=document.getElementById('cMapel').value;
        const kelas=document.getElementById('cKelas').value;
        const type=document.getElementById('cType').value;
        const text=document.getElementById('cText').value.trim();
        if(!text) throw new Error('Soal kosong');
        
        // Image handling (skip for brevity, assume text only or handle similarly)
        let qData = {
            mapel, kelas, type, text,
            tp: document.getElementById('cTPManual').value || document.getElementById('cTPSelect').value,
            difficulty: document.getElementById('cDiff').value,
            score: parseInt(document.getElementById('cScore').value)||1,
            answer: document.getElementById('cAnswer').value.trim(),
            options: [], createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        if(type==='pg'){
            getOptLetters(kelas).forEach(l=>qData.options.push(document.getElementById('cOpt'+l).value.trim()));
        }
        
        await db.collection('questions').add(qData);
        showToast('Soal disimpan!');
        // Reset form partial
        document.getElementById('cText').value='';
        getOptLetters(kelas).forEach(l=>{if(document.getElementById('cOpt'+l)) document.getElementById('cOpt'+l).value='';});
    } catch(e){ showToast('Error: '+e.message, 'error'); }
    btn.disabled=false; btn.innerHTML='<i class="fas fa-save mr-1"></i>Simpan Soal';
}

// Logic JSON Import
async function processJSON(){
    const btn = document.querySelector('button[onclick="processJSON()"]');
    const txt = document.getElementById('jsonInput').value;
    const defMapel = document.getElementById('jMapel').value;
    const defKelas = document.getElementById('jKelas').value;
    
    if(!txt.trim()){ showToast('JSON kosong','error'); return; }
    
    try {
        const data = JSON.parse(txt);
        if(!Array.isArray(data)) throw new Error('Format harus Array JSON [ ... ]');
        
        btn.disabled = true; btn.innerHTML = '<span class="loading-spinner mr-2"></span>Memproses...';
        
        let count=0;
        const batch = db.batch();
        
        data.forEach((item, idx) => {
            // Validate minimal fields
            if(!item.text) return;
            
            const docRef = db.collection('questions').doc();
            const qData = {
                mapel: item.mapel || defMapel,
                kelas: item.kelas || defKelas,
                type: item.type || 'pg',
                text: item.text,
                options: item.options || [],
                answer: item.answer || '',
                difficulty: item.difficulty || 'Sedang',
                score: item.score || 1,
                tp: item.tp || '',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            batch.set(docRef, qData);
            count++;
        });
        
        await batch.commit();
        showToast(`${count} soal berhasil diimport!`);
        document.getElementById('jsonInput').value = '';
    } catch(e){
        console.error(e);
        showToast('Format JSON Salah: '+e.message, 'error');
    }
    btn.disabled=false; btn.innerHTML='<i class="fas fa-file-import mr-1"></i>Proses JSON';
}
